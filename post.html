<!DOCTYPE html>
<html lang="id">
<head>
    <script>
      var password = "Anjing526"; 
      var input;
      while (input !== password) {
        input = prompt("Admin Area: Masukkan kata sandi:");
        if (input === null) { window.location.href = "https://pembri.github.io"; break; }
        if (input !== password) { alert("Sandi Salah! Akses ditolak."); }
      }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musik Anywhere - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; }
        .ql-container.ql-snow { border: 1px solid #27272a !important; border-radius: 0 0 1rem 1rem; }
        .ql-toolbar.ql-snow { background: #18181b; border-radius: 1rem 1rem 0 0; border: 1px solid #27272a; border-bottom: none; }
        .ql-toolbar button, .ql-toolbar .ql-picker { filter: invert(1); }
        .ql-editor { background: #0a0a0a; color: #e4e4e7; min-height: 500px; font-size: 1.1rem; border-radius: 0 0 1rem 1rem; }
        .ql-editor img { border-radius: 1rem; margin: 1rem 0; }
        /* Fix link color agar terlihat saat mengetik */
        .ql-editor a { color: #ef4444 !important; text-decoration: underline; }
    </style>
</head>
<body class="py-10 md:py-20">

    <div class="max-w-6xl mx-auto px-6">
        <header class="mb-12 flex flex-col md:flex-row md:justify-between md:items-end gap-6 border-b border-zinc-800 pb-8">
            <div><h1 class="text-4xl md:text-5xl font-black uppercase tracking-tighter text-white">ADMIN<span class="text-red-600">PANEL</span></h1></div>
            <a href="/" class="bg-zinc-900 px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-zinc-800 transition border border-zinc-800 w-max">Ke Beranda</a>
        </header>

        <div class="space-y-8 bg-[#0a0a0a] p-6 md:p-10 rounded-[2rem] border border-zinc-800 shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Token Github</label>
                    <input type="password" id="ghToken" placeholder="ghp_xxxx" class="w-full bg-[#111] border border-zinc-800 p-4 rounded-xl outline-none text-sm focus:border-red-600 text-white">
                </div>
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Pilih Kategori</label>
                    <select id="postCategory" class="w-full bg-[#111] border border-zinc-800 p-4 rounded-xl outline-none text-white font-bold focus:border-red-600">
                        <option value="Artikel">Artikel</option>
                        <option value="News">News</option>
                        <option value="Lirik Lagu">Lirik Lagu</option>
                    </select>
                </div>
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Judul Artikel</label>
                    <input type="text" id="postTitle" placeholder="Ketik Judul..." class="w-full bg-[#111] border border-zinc-800 p-4 rounded-xl outline-none font-bold text-white focus:border-red-600">
                </div>
            </div>

            <div class="space-y-3">
                <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Isi Konten (Toolbar lengkap: Link, Image, Video, Font Size)</label>
                <div id="editor"></div>
            </div>

            <button onclick="handlePublish()" id="pubBtn" class="w-full bg-red-600 text-white py-5 rounded-xl font-black text-xl uppercase tracking-widest hover:bg-red-700 transition-all shadow-[0_0_40px_rgba(220,38,38,0.3)]">Publikasikan Artikel</button>
        </div>

        <div class="mt-20 pt-10 border-t border-zinc-800">
            <div class="flex flex-col md:flex-row justify-between md:items-center gap-4 mb-8">
                <h2 class="text-2xl font-black uppercase tracking-tighter">Database <span class="text-red-600">Artikel</span></h2>
                <button onclick="loadArticleList()" class="text-[10px] font-bold uppercase tracking-widest bg-zinc-800 px-6 py-3 rounded-xl hover:bg-zinc-700 transition">Tarik Data Server</button>
            </div>
            <div id="articleList" class="grid grid-cols-1 gap-4">
                <div class="bg-[#111] border border-zinc-800 p-8 rounded-2xl text-center text-zinc-500 text-sm italic">
                    Masukkan Token Github di atas lalu klik "Tarik Data Server".
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // Toolbar Lengkap Macam Wikipedia
        var quill = new Quill('#editor', { 
            theme: 'snow', 
            modules: { 
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    [{ 'size': ['small', false, 'large', 'huge'] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    ['blockquote', 'code-block'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'align': [] }],
                    ['link', 'image', 'video'],
                    ['clean']
                ] 
            } 
        });
        
        // Custom Image Handler
        quill.getModule('toolbar').addHandler('image', () => { 
            const input = document.createElement('input'); 
            input.setAttribute('type', 'file'); input.setAttribute('accept', 'image/*'); input.click(); 
            input.onchange = () => { 
                const file = input.files[0]; 
                if (file) { 
                    const reader = new FileReader(); 
                    reader.onload = (e) => { 
                        const range = quill.getSelection(true); 
                        quill.insertEmbed(range.index, 'image', e.target.result); 
                    }; 
                    reader.readAsDataURL(file); 
                } 
            }; 
        });

        function getIndoDate() { const d = new Date(); return `${d.getDate()} ${["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"][d.getMonth()]} ${d.getFullYear()}`; }

        let isEditMode = false;
        let currentSha = null;
        let currentPath = null;
        let originalTimestamp = null; 

        async function handlePublish() {
            const token = document.getElementById('ghToken').value;
            const category = document.getElementById('postCategory').value;
            const title = document.getElementById('postTitle').value;
            const content = quill.root.innerHTML;
            const btn = document.getElementById('pubBtn');

            if(!token || !title) return alert("Token Github dan Judul wajib diisi!");
            btn.innerText = "PROSES UPLOAD KE SERVER..."; btn.disabled = true;

            const slug = title.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
            const filePath = isEditMode ? currentPath : `artikel/${slug}.html`;
            const publishTime = isEditMode && originalTimestamp ? originalTimestamp : Date.now();

            const fullTemplate = `<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="category" content="${category}">
    <meta name="publish-date" content="${publishTime}"> 
    <title>${title} - Musik Anywhere</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://pembri.github.io/#website",
          "url": "https://pembri.github.io",
          "name": "Musik Anywhere"
        },
        {
          "@type": "NewsArticle",
          "headline": "${title}",
          "image": ["https://pembri.github.io/android-icon-192x192.png"],
          "datePublished": "${new Date().toISOString()}",
          "author": [{ "@type": "Organization", "name": "Musik Anywhere", "url": "https://pembri.github.io" }],
          "isPartOf": { "@id": "https://pembri.github.io/#website" }
        }
      ]
    }
    <\/script>

    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#111111"/>
    <meta name="description" content="Baca artikel lengkap tentang ${title} hanya di Musik Anywhere.">
    <meta property="og:site_name" content="Musik Anywhere">
    <meta property="og:title" content="${title} - Musik Anywhere">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://pembri.github.io/artikel/${slug}">

    <script src="https://cdn.tailwindcss.com"><\/script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0a0a0a; color: #f4f4f5; display: flex; flex-direction: column; min-height: 100vh;}
        main { flex: 1; }
        .nav-glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .prose { max-width: none !important; }
        .prose img { border-radius: 1.5rem; margin: 2rem 0; width: 100%; border: 1px solid #27272a; }
        .prose a { color: #ef4444; font-weight: 800; border-bottom: 2px solid #7f1d1d; text-decoration: none;}
        .prose h1, .prose h2, .prose h3 { color: white; font-weight: 900; text-transform: uppercase; margin-top: 2rem; }
        .prose p { color: #d4d4d8; line-height: 1.8; margin-bottom: 0rem; font-size: 1.15rem;}
        #searchSuggestions, #mobileSearchSuggestions { display: none; }
        #searchSuggestions.active, #mobileSearchSuggestions.active { display: block; }
    </style>
</head>
<body onclick="closeSearch()">
    <header class="nav-glass sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
            <a href="/" class="text-xl md:text-2xl font-black tracking-tighter uppercase flex items-center z-50 text-white">MUSIK<span class="text-red-600">ANYWHERE</span></a>
            <nav class="hidden lg:flex gap-8 items-center text-[11px] font-black uppercase tracking-[0.15em] text-zinc-400">
                <a href="/" class="hover:text-red-500 transition">Home</a>
                <a href="/index?kategori=Artikel" class="hover:text-red-500 transition">Artikel</a>
                <a href="/index?kategori=News" class="hover:text-red-500 transition">News</a>
                <a href="/index?kategori=Lirik Lagu" class="hover:text-red-500 transition">Lirik Lagu</a>
            </nav>
            <div class="flex items-center gap-4 z-50">
                <button id="menuBtn" class="lg:hidden p-2 text-white" onclick="toggleMenu()"><svg id="icon-menu" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg></button>
            </div>
        </div>
    </header>

    <main class="w-full max-w-6xl mx-auto px-4 md:px-8 py-12 md:py-20">
        <article class="bg-[#0a0a0a] p-2 md:p-6 rounded-[2rem] border border-zinc-800">
            <div class="mb-12 text-center md:text-left">
                <span class="bg-red-900/50 text-red-500 border border-red-900 px-4 py-1.5 rounded-md text-[10px] font-black uppercase tracking-widest mb-6 inline-block">Kategori: ${category}</span>
                <h1 class="text-4xl md:text-5xl lg:text-6xl font-black uppercase tracking-tighter mb-8 text-white leading-tight">${title}</h1>
                <p class="text-zinc-500 text-[11px] font-bold uppercase tracking-widest border-t border-b border-zinc-800 py-4">Oleh Redaksi • ${getIndoDate()}</p>
            </div>
            <div class="prose prose-zinc max-w-none w-full">${content}</div>
        </article>
    </main>

    <footer class="bg-[#050505] text-white mt-20 pt-20 pb-10 border-t border-zinc-900 w-full text-center">
        <h2 class="text-2xl font-black uppercase mb-4 tracking-tighter">MUSIK<span class="text-red-600">ANYWHERE</span></h2>
        <p class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest">© 2026 Musik Anywhere Media.</p>
    </footer>
    <script>
        function toggleMenu() { const menu = document.getElementById('mobileMenu'); menu.classList.toggle('hidden'); menu.classList.toggle('flex'); }
    <\/script>
</body>
</html>`;

            const payload = { message: isEditMode ? `Update: ${title}` : `Publish: ${title}`, content: btoa(unescape(encodeURIComponent(fullTemplate))) };
            if(isEditMode) payload.sha = currentSha;

            try {
                const response = await fetch(`https://api.github.com/repos/pembri/pembri.github.io/contents/${filePath}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                if(response.ok) { alert(isEditMode ? "ARTIKEL BERHASIL DIUPDATE!" : "ARTIKEL BERHASIL DIPUBLIKASI!"); location.reload(); }
                else { alert("Gagal koneksi. Cek Token Github."); }
            } catch (e) { alert("Error: " + e.message); }
            btn.innerText = "Publikasikan Artikel"; btn.disabled = false;
        }

        async function loadArticleList() {
            const token = document.getElementById('ghToken').value;
            const listDiv = document.getElementById('articleList');
            if(!token) return alert("Masukkan token Github Anda.");
            listDiv.innerHTML = '<p class="text-center py-5">Menarik Data Server...</p>';
            try {
                const res = await fetch('https://api.github.com/repos/pembri/pembri.github.io/contents/artikel', { headers: { 'Authorization': `token ${token}` } });
                const files = await res.json();
                const articles = files.filter(f => f.name.endsWith('.html'));
                listDiv.innerHTML = '';
                articles.reverse().forEach(file => {
                    const cleanTitle = file.name.replace(/-/g, ' ').replace('.html', '').toUpperCase();
                    listDiv.innerHTML += `
                        <div class="bg-[#111] border border-zinc-800 p-5 rounded-2xl flex justify-between items-center group hover:border-red-600 transition">
                            <div><h3 class="font-black text-white">${cleanTitle}</h3></div>
                            <div class="flex gap-2">
                                <button onclick="editArticle('${file.path}', '${file.sha}')" class="bg-zinc-800 text-white text-[10px] font-black px-4 py-2 rounded-lg hover:bg-blue-600 transition uppercase">Edit</button>
                                <button onclick="deleteArticle('${file.path}', '${file.sha}')" class="bg-zinc-800 text-red-500 text-[10px] font-black px-4 py-2 rounded-lg hover:bg-red-600 hover:text-white transition uppercase">Hapus</button>
                            </div>
                        </div>`;
                });
            } catch (e) { listDiv.innerHTML = '<p class="text-red-500 font-bold text-center">Gagal memuat daftar artikel.</p>'; }
        }

        async function editArticle(path, sha) {
            const token = document.getElementById('ghToken').value;
            const btn = document.getElementById('pubBtn');
            try {
                const res = await fetch(`https://api.github.com/repos/pembri/pembri.github.io/contents/${path}`, { headers: { 'Authorization': `token ${token}` } });
                const data = await res.json();
                const htmlContent = decodeURIComponent(escape(atob(data.content)));
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, 'text/html');
                
                // FIX: Penyesuaian selektor DOM agar data judul dan isi benar-benar ditarik
                const title = doc.querySelector('h1')?.innerText || "";
                const contentBody = doc.querySelector('.prose')?.innerHTML || "";
                const categoryMeta = doc.querySelector('meta[name="category"]')?.getAttribute('content') || "Artikel";
                const dateMeta = doc.querySelector('meta[name="publish-date"]')?.getAttribute('content');
                
                document.getElementById('postTitle').value = title;
                document.getElementById('postCategory').value = categoryMeta;
                if(dateMeta) originalTimestamp = parseInt(dateMeta);
                
                quill.root.innerHTML = contentBody;
                
                isEditMode = true; currentSha = sha; currentPath = path;
                btn.innerText = "UPDATE ARTIKEL SEKARANG";
                btn.classList.replace('bg-red-600', 'bg-blue-600');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
                alert("Data berhasil ditarik! Kamu bisa mengedit sekarang.");
            } catch (e) { alert("Gagal mengambil file artikel."); }
        }

        async function deleteArticle(path, sha) {
            if(!confirm("Hapus permanen?")) return;
            const token = document.getElementById('ghToken').value;
            try {
                await fetch(`https://api.github.com/repos/pembri/pembri.github.io/contents/${path}`, {
                    method: 'DELETE', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: `Hapus Artikel`, sha: sha })
                });
                loadArticleList();
            } catch (e) { alert("Error"); }
        }
    </script>
</body>
</html>
