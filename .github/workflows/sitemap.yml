name: Auto Generate Sitemap Clean URLs Pro

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  sitemap_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Bikin Sitemap Otomatis
        uses: cicirello/generate-sitemap@v1
        with:
          base-url-path: https://musikanywhere.online/
          drop-github-md: true
          # Ini kunci utamanya buat ngilangin .html
          include-html-extension: false
          # Tambahkan ini biar robotnya makin yakin hapus ekstensi
          strip-extension: true

      - name: Rapikan Index dan Hapus Sisa HTML
        run: |
          # 1. Hilangkan sisa-sisa /index
          sed -i 's/\/index<\/loc>/<\/loc>/g' sitemap.xml
          
          # 2. Paksa hapus manual .html kalau robotnya masih bandel
          sed -i 's/\.html<\/loc>/<\/loc>/g' sitemap.xml
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitemap.xml
          git diff --quiet && git diff --staged --quiet || (git commit -m "SEO: Fix paksa Clean URLs sitemap" && git push)
