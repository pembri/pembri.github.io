<!DOCTYPE html>
<html lang="id">
<head>
    <script>
      var password = "Anjing526"; 
      var input;
      while (input !== password) {
        input = prompt("Admin Area: Masukkan kata sandi:");
        if (input === null) { window.location.href = "https://pembri.github.io"; break; }
        if (input !== password) { alert("Sandi Salah! Akses ditolak."); }
      }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musik Anywhere - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; }
        .ql-container.ql-snow { border: none !important; }
        .ql-toolbar.ql-snow { background: #18181b; border-radius: 1rem 1rem 0 0; border: 1px solid #27272a; border-bottom: none; }
        .ql-toolbar button { filter: invert(1); }
        .ql-editor { background: #0a0a0a; color: #e4e4e7; min-height: 500px; border-radius: 0 0 1rem 1rem; font-size: 1.1rem; border: 1px solid #27272a; }
        .ql-editor img { border-radius: 1rem; margin: 1rem 0; }
    </style>
</head>
<body class="py-10 md:py-20">

    <div class="max-w-5xl mx-auto px-6">
        <header class="mb-12 flex flex-col md:flex-row md:justify-between md:items-end gap-6 border-b border-zinc-800 pb-8">
            <div><h1 class="text-4xl md:text-5xl font-black uppercase tracking-tighter text-white">ADMIN<span class="text-red-600">PANEL</span></h1></div>
            <a href="/index.html" class="bg-zinc-900 px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-zinc-800 transition border border-zinc-800 w-max">Ke Beranda</a>
        </header>

        <div class="space-y-8 bg-[#0a0a0a] p-6 md:p-10 rounded-[2rem] border border-zinc-800 shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Token Github</label>
                    <input type="password" id="ghToken" placeholder="ghp_xxxx" class="w-full bg-[#111] border border-zinc-800 p-4 rounded-xl outline-none text-sm focus:border-red-600 text-white">
                </div>
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Pilih Kategori</label>
                    <select id="postCategory" class="w-full bg-[#111] border border-zinc-800 p-4 rounded-xl outline-none text-white font-bold focus:border-red-600">
                        <option value="Artikel">Artikel</option>
                        <option value="News">News</option>
                        <option value="Lirik Lagu">Lirik Lagu</option>
                    </select>
                </div>
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Judul Artikel</label>
                    <input type="text" id="postTitle" placeholder="Ketik Judul..." class="w-full bg-[#111] border border-zinc-800 p-4 rounded-xl outline-none font-bold text-white focus:border-red-600">
                </div>
            </div>

            <div class="space-y-3">
                <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Isi Konten (Bisa Upload Gambar Langsung)</label>
                <div id="editor"></div>
            </div>

            <button onclick="handlePublish()" id="pubBtn" class="w-full bg-red-600 text-white py-5 rounded-xl font-black text-xl uppercase tracking-widest hover:bg-red-700 transition-all">Publikasikan Artikel</button>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        var quill = new Quill('#editor', { theme: 'snow', modules: { toolbar: { container: [['bold', 'italic', 'underline'], ['link', 'image', 'video'], [{'header': 1}, {'header': 2}, 'blockquote'], [{'list': 'ordered'}, {'list': 'bullet'}], ['clean']] } } });
        quill.getModule('toolbar').addHandler('image', () => { const input = document.createElement('input'); input.setAttribute('type', 'file'); input.setAttribute('accept', 'image/*'); input.click(); input.onchange = () => { const file = input.files[0]; if (file) { const reader = new FileReader(); reader.onload = (e) => { const range = quill.getSelection(true); quill.insertEmbed(range.index, 'image', e.target.result); }; reader.readAsDataURL(file); } }; });
        function getIndoDate() { const d = new Date(); return `${d.getDate()} ${["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"][d.getMonth()]} ${d.getFullYear()}`; }

        async function handlePublish() {
            const token = document.getElementById('ghToken').value;
            const category = document.getElementById('postCategory').value;
            const title = document.getElementById('postTitle').value;
            const content = quill.root.innerHTML;
            const btn = document.getElementById('pubBtn');

            if(!token || !title) return alert("Token dan Judul wajib diisi!");
            btn.innerText = "PROSES UPLOAD..."; btn.disabled = true;

            const slug = title.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
            const filePath = `artikel/${slug}.html`;

            // TEMPLATE ARTIKEL YANG DIGENERATE (DILENGKAPI METADATA FILTER & MENU LINK AKTIF)
            const fullTemplate = `<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="category" content="` + category + `">
    <title>` + title + ` - Musik Anywhere</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0a0a0a; color: #f4f4f5; display: flex; flex-direction: column; min-height: 100vh;}
        main { flex: 1; }
        .nav-glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .prose img { border-radius: 1.5rem; margin: 2rem 0; width: 100%; border: 1px solid #27272a; }
        .prose a { color: #ef4444; font-weight: 800; border-bottom: 2px solid #7f1d1d; text-decoration: none;}
        .prose h1, .prose h2, .prose h3 { color: white; font-weight: 900; text-transform: uppercase; margin-top: 2rem; }
        .prose p { color: #d4d4d8; line-height: 1.8; margin-bottom: 1.5rem; font-size: 1.1rem;}
        #searchSuggestions, #mobileSearchSuggestions { display: none; }
        #searchSuggestions.active, #mobileSearchSuggestions.active { display: block; }
    </style>
</head>
<body onclick="closeSearch()">

    <header class="nav-glass sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
            <a href="/index.html" class="text-xl md:text-2xl font-black tracking-tighter uppercase flex items-center z-50 text-white">MUSIK<span class="text-red-600">ANYWHERE</span></a>
            <nav class="hidden lg:flex gap-8 items-center text-[11px] font-black uppercase tracking-[0.15em] text-zinc-400">
                <a href="/index.html" class="hover:text-red-500 transition">Home</a>
                <a href="/index.html?kategori=Artikel" class="hover:text-red-500 transition">Artikel</a>
                <a href="/index.html?kategori=News" class="hover:text-red-500 transition">News</a>
                <a href="/index.html?kategori=Lirik Lagu" class="hover:text-red-500 transition">Lirik Lagu</a>
            </nav>
            <div class="flex items-center gap-4 z-50">
                <button id="menuBtn" class="lg:hidden p-2 text-white focus:outline-none" onclick="toggleMenu()"><svg id="icon-menu" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg><svg id="icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
        </div>
        <div id="mobileMenu" class="fixed inset-0 bg-[#0a0a0a] z-40 hidden flex-col pt-24 px-6 pb-8 h-screen overflow-y-auto transition-all">
            <nav class="flex flex-col gap-6 text-xl font-black uppercase tracking-tighter mt-10">
                <a href="/index.html" class="text-white hover:text-red-600">Home</a>
                <a href="/index.html?kategori=Artikel" class="text-white hover:text-red-600">Artikel</a>
                <a href="/index.html?kategori=News" class="text-white hover:text-red-600">News</a>
                <a href="/index.html?kategori=Lirik Lagu" class="text-white hover:text-red-600">Lirik Lagu</a>
                <hr class="border-zinc-800 my-2">
                <a href="/about.html" class="text-zinc-500 hover:text-white text-sm">About</a>
                <a href="/contact.html" class="text-zinc-500 hover:text-white text-sm">Contact</a>
            </nav>
        </div>
    </header>

    <main class="w-full max-w-4xl mx-auto px-6 py-12 md:py-20">
        <article class="bg-zinc-900/50 p-6 md:p-12 rounded-[2rem] border border-zinc-800">
            <div class="mb-10 text-center md:text-left">
                <span class="bg-red-900/50 text-red-500 border border-red-900 px-4 py-1.5 rounded-md text-[10px] font-black uppercase tracking-widest mb-6 inline-block">Kategori: ` + category + `</span>
                <h1 class="text-4xl md:text-5xl lg:text-6xl font-black uppercase tracking-tighter mb-8 text-white leading-tight">` + title + `</h1>
                <p class="text-zinc-500 text-[11px] font-bold uppercase tracking-widest border-t border-b border-zinc-800 py-4">Oleh Redaksi • ` + getIndoDate() + `</p>
            </div>
            <div class="prose prose-zinc max-w-none">
                ` + content + `
            </div>
        </article>
    </main>

    <footer class="bg-[#050505] text-white mt-20 pt-20 pb-10 border-t border-zinc-900 w-full"><div class="max-w-7xl mx-auto px-8"><div class="grid grid-cols-1 md:grid-cols-3 gap-12 border-b border-zinc-900 pb-12 mb-8"><div class="md:col-span-1"><h2 class="text-2xl font-black uppercase mb-4 tracking-tighter">MUSIK<span class="text-red-600">ANYWHERE</span></h2><p class="text-zinc-500 text-sm leading-relaxed mb-6">Sumber berita musik independen untuk audiens Indonesia.</p></div><div><h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-600 mb-6">Kategori</h4><ul class="space-y-3 text-sm font-bold text-zinc-400"><li><a href="/index.html?kategori=Artikel" class="hover:text-red-500 transition">Artikel</a></li><li><a href="/index.html?kategori=News" class="hover:text-red-500 transition">News</a></li><li><a href="/index.html?kategori=Lirik Lagu" class="hover:text-red-500 transition">Lirik Lagu</a></li></ul></div><div><h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-600 mb-6">Perusahaan</h4><ul class="space-y-3 text-sm font-bold text-zinc-400"><li><a href="/about.html" class="hover:text-red-500 transition">About</a></li><li><a href="/contact.html" class="hover:text-red-500 transition">Contact</a></li><li><a href="/privacy.html" class="hover:text-red-500 transition">Privacy Policy</a></li></ul></div></div><p class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest text-center"> © 2026 Musik Anywhere Media. </p></div></footer>

    <script>
        function toggleMenu() { const menu = document.getElementById('mobileMenu'); const iconMenu = document.getElementById('icon-menu'); const iconClose = document.getElementById('icon-close'); if(menu.classList.contains('hidden')) { menu.classList.remove('hidden'); menu.classList.add('flex'); document.body.style.overflow = 'hidden'; iconMenu.classList.add('hidden'); iconClose.classList.remove('hidden'); } else { menu.classList.add('hidden'); menu.classList.remove('flex'); document.body.style.overflow = 'auto'; iconMenu.classList.remove('hidden'); iconClose.classList.add('hidden'); } }
    <\/script>
</body>
</html>`;

            const payload = { message: `Publish: ${title}`, content: btoa(unescape(encodeURIComponent(fullTemplate))) };

            try {
                const response = await fetch(`https://api.github.com/repos/pembri/pembri.github.io/contents/${filePath}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                if(response.ok) { alert("ARTIKEL BERHASIL DIPUBLIKASI!"); location.reload(); }
                else { alert("Gagal koneksi. Cek Token."); }
            } catch (e) { alert("Error: " + e.message); }
            btn.innerText = "Publikasikan Artikel"; btn.disabled = false;
        }
    </script>
</body>
</html>
