<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Nada - Eksplorasi Dunia Musik Tanpa Batas</title>
    
    <meta name="description" content="Portal Nada adalah media musik independen yang menyajikan berita, review, dan jadwal konser paling akurat.">
    <meta property="og:title" content="Portal Nada - Berita Musik Terkini">
    <meta property="og:site_name" content="Portal Nada">
    <meta property="og:url" content="https://pembri.github.io">
    <meta property="og:type" content="website">
    <link rel="icon" href="/favicon.png" type="image/png">

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --brand-red: #E11D48; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; }
        .hero-overlay { background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.85) 100%); }
        .line-clamp { display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
        .search-bar:focus { width: 300px; }
        .article-card:hover img { transform: scale(1.05); }
    </style>
</head>
<body class="text-zinc-900">

    <nav class="sticky top-0 bg-white/95 backdrop-blur-md z-[100] border-b border-zinc-100">
        <div class="max-w-7xl mx-auto px-4 md:px-8">
            <div class="flex flex-col md:flex-row md:items-center justify-between py-4 gap-4">
                <div class="flex items-center justify-between">
                    <a href="/" class="text-3xl font-extrabold tracking-tighter text-black uppercase">
                        PORTAL<span class="text-red-600">NADA</span>
                    </a>
                </div>
                
                <div class="flex flex-1 items-center justify-end gap-6">
                    <div class="relative w-full md:w-auto">
                        <input type="text" id="mainSearch" onkeyup="searchEngine()" placeholder="Cari artis, band, atau berita..." 
                               class="w-full md:w-64 bg-zinc-100 border-none rounded-full py-2.5 px-6 text-sm outline-none focus:ring-2 focus:ring-red-500 transition-all">
                    </div>
                    <div class="hidden lg:flex gap-6 font-bold text-[11px] uppercase tracking-[0.2em] text-zinc-500">
                        <a href="#" class="hover:text-red-600">News</a>
                        <a href="#" class="hover:text-red-600">Review</a>
                        <a href="#" class="hover:text-red-600">Jadwal</a>
                    </div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 md:px-8 py-8">
        
        <div id="hero-section" class="mb-20 hidden">
            </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <div class="lg:col-span-8">
                <div class="flex items-center gap-4 mb-10">
                    <h2 class="text-2xl font-black uppercase italic">Artikel Terbaru</h2>
                    <div class="h-1 flex-1 bg-zinc-100"></div>
                </div>
                
                <div id="article-feed" class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    </div>
                <div id="empty-state" class="py-20 text-center text-zinc-400 font-bold uppercase tracking-widest">
                    Belum ada artikel yang diterbitkan.
                </div>
            </div>

            <aside class="lg:col-span-4 space-y-12">
                <div class="bg-zinc-950 rounded-[2.5rem] p-8 text-white">
                    <h3 class="text-red-600 font-black uppercase text-xs tracking-widest mb-8 italic">Paling Populer</h3>
                    <div id="trending-feed" class="space-y-8">
                        </div>
                </div>
            </aside>
        </div>
    </main>

    <footer class="bg-white border-t border-zinc-100 mt-40 py-20">
        <div class="max-w-7xl mx-auto px-8 text-center md:text-left">
            <div class="flex flex-col md:flex-row justify-between items-center gap-10">
                <div>
                    <h2 class="text-3xl font-black uppercase tracking-tighter mb-2">PORTAL<span class="text-red-600">NADA</span></h2>
                    <p class="text-zinc-400 text-sm">Media Informasi Musik Terbesar di Indonesia.</p>
                </div>
                <div class="text-xs font-bold text-zinc-400 uppercase tracking-[0.3em]">
                    &copy; 2026 Portal Nada Media Group - pembri.github.io
                </div>
            </div>
        </div>
    </footer>

    <script>
        const repoPath = "https://api.github.com/repos/pembri/pembri.github.io/contents/artikel";

        async function initPortal() {
            try {
                const response = await fetch(repoPath);
                const files = await response.json();
                if (!files || files.length === 0) return;

                document.getElementById('empty-state').classList.add('hidden');
                const articles = files.filter(f => f.name.endsWith('.html')).reverse();
                
                renderContent(articles);
            } catch (e) { console.error("Error loading articles"); }
        }

        async function renderContent(articles) {
            const feed = document.getElementById('article-feed');
            const hero = document.getElementById('hero-section');
            const trending = document.getElementById('trending-feed');

            for (let i = 0; i < articles.length; i++) {
                const file = articles[i];
                const rawUrl = `https://pembri.github.io/artikel/${file.name}`;
                
                // Fetch content untuk ambil judul & gambar pertama
                const res = await fetch(rawUrl);
                const htmlText = await res.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlText, 'text/html');
                
                const title = doc.querySelector('h1')?.innerText || file.name.replace('.html', '');
                const firstImg = doc.querySelector('img')?.src || 'https://via.placeholder.com/800x600/111/fff?text=Portal+Nada';

                // Render Hero (Artikel ke-1)
                if (i === 0) {
                    hero.classList.remove('hidden');
                    hero.innerHTML = `
                        <a href="${rawUrl}" class="group relative block w-full h-[600px] rounded-[3rem] overflow-hidden shadow-2xl">
                            <img src="${firstImg}" class="absolute inset-0 w-full h-full object-cover group-hover:scale-105 transition duration-700">
                            <div class="absolute inset-0 hero-overlay"></div>
                            <div class="absolute bottom-0 left-0 p-8 md:p-16 z-20">
                                <span class="bg-red-600 text-white px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest mb-6 inline-block">Sorotan Utama</span>
                                <h2 class="text-4xl md:text-7xl font-extrabold text-white leading-[1.1] uppercase group-hover:text-red-500 transition">${title}</h2>
                            </div>
                        </a>
                    `;
                } else {
                    // Render Grid Feed (Artikel ke 2-7)
                    if(i < 7) {
                        feed.innerHTML += `
                        <article class="article-card group cursor-pointer" onclick="location.href='${rawUrl}'">
                            <div class="relative aspect-[16/10] rounded-[2rem] overflow-hidden mb-6 bg-zinc-100">
                                <img src="${firstImg}" class="w-full h-full object-cover transition duration-500">
                            </div>
                            <h3 class="text-xl font-bold uppercase leading-tight group-hover:text-red-600 transition mb-3">${title}</h3>
                            <div class="text-[10px] font-black text-zinc-400 uppercase tracking-widest">Postingan Terbaru</div>
                        </article>`;
                    } else {
                        // Render Trending (Sisanya)
                        trending.innerHTML += `
                        <div class="flex gap-4 cursor-pointer group" onclick="location.href='${rawUrl}'">
                            <span class="text-3xl font-black text-zinc-800">0${i}</span>
                            <p class="font-bold text-sm uppercase leading-snug group-hover:text-red-600 transition">${title}</p>
                        </div>`;
                    }
                }
            }
        }

        function searchEngine() {
            let val = document.getElementById('mainSearch').value.toUpperCase();
            document.querySelectorAll('article, #trending-feed div').forEach(el => {
                el.style.display = el.innerText.toUpperCase().includes(val) ? "" : "none";
            });
        }

        window.onload = initPortal;
    </script>
</body>
</html>
