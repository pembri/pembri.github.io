<script>
function toggleMenu(){
document.getElementById('mobileMenu').classList.toggle('show');
}

function copyLink(){
navigator.clipboard.writeText(location.href);
alert('Link berhasil disalin');
}

/* SEARCH CERDAS */
async function smartSearch(q){
const box=document.getElementById('mobileSearchSuggestions');
if(!q){box.innerHTML='';return;}

try{
const res=await fetch('https://api.github.com/repos/pembri/musikanywhere.online/contents/artikel');
const files=await res.json();

let hasil=files
.filter(x=>x.name.toLowerCase().includes(q.toLowerCase()))
.slice(0,5);

box.innerHTML=hasil.map(x=>'
<a href="/artikel/'+x.name.replace('.html','')+'" style="display:block;padding:12px;color:#fff;text-decoration:none;border-bottom:1px solid #222">'+x.name.replace('.html','').replace(/-/g,' ')+'</a>
').join('');

}catch(e){}
}

/* REKOMENDASI */
async function loadRekomendasi(){
try{
const res=await fetch('https://api.github.com/repos/pembri/musikanywhere.online/contents/artikel');
const files=await res.json();

const box=document.getElementById('rec-container');

files
.filter(x=>x.name.endsWith('.html'))
.slice(0,3)
.forEach(x=>{
box.innerHTML+=
'<a class="card" href="/artikel/'+x.name.replace('.html','')+'">'+
x.name.replace('.html','').replace(/-/g,' ')+'</a>';
});

}catch(e){}
}

loadRekomendasi();
</script>
