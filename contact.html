<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="msapplication-TileImage" content="/ms-icon-144x144.png" />
    <meta name="theme-color" content="#ffffff"/>
            
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontak Kami - Portal Nada</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; color: #1a1a1a; }
        .nav-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .chat-input { background: #f4f4f5; border: 2px solid transparent; transition: all 0.2s ease; }
        .chat-input:focus { background: white; border-color: #ef4444; outline: none; box-shadow: 0 10px 30px rgba(239, 68, 68, 0.1); }
        
        /* FIX POP-UP TENGAH PRESISI */
        #success-pop { 
            display: none; 
            position: fixed; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 1000; 
            width: 90%; 
            max-width: 400px;
        }
        .overlay { 
            display: none; 
            position: fixed; 
            inset: 0; 
            background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(8px); 
            z-index: 999; 
        }
    </style>
</head>
<body class="antialiased">

    <div id="overlay" class="overlay" onclick="closePop()"></div>
    <div id="success-pop" class="bg-white p-8 md:p-12 rounded-[2.5rem] shadow-2xl text-center border-[6px] border-red-600">
        <div class="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
            <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"></polyline></svg>
        </div>
        <h3 class="text-3xl font-black uppercase tracking-tighter mb-3">TERKIRIM!</h3>
        <p class="text-zinc-500 font-bold text-sm leading-relaxed mb-10">Pesan Anda Berhasil Terkirim.</p>
        <button onclick="closePop()" class="w-full bg-black text-white py-5 rounded-2xl font-black uppercase tracking-[0.2em] text-xs hover:bg-red-600 transition-all active:scale-95">Tutup</button>
    </div>

    <header class="nav-glass sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="/" class="text-zinc-400 hover:text-black transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </a>
                <a href="/" class="text-2xl font-black tracking-tighter uppercase">PORTAL<span class="text-red-600">NADA</span></a>
            </div>
        </div>
    </header>

    <main class="py-12 md:py-20">
        <div class="max-w-5xl mx-auto px-6">
            <div class="mb-16 text-center">
                <span class="bg-red-600 text-white px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest mb-6 inline-block shadow-lg shadow-red-600/20">Direct Chat</span>
                <h1 class="text-5xl md:text-7xl font-black uppercase tracking-tighter leading-none mb-6">Punya Saran <br>Atau <span class="text-red-600">Masukan?</span></h1>
                <p class="text-zinc-500 font-bold text-sm uppercase tracking-[0.2em]">Pesan Anda akan terkirim langsung ke admin.</p>
            </div>

            <form id="contact-form" action="https://formspree.io/f/meevrpqe" method="POST" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400 ml-2">Nama Pengirim</label>
                        <input type="text" name="Nama" placeholder="Masukan nama lengkap..." required class="chat-input p-6 rounded-[2rem] font-bold text-base w-full">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400 ml-2">Email Aktif</label>
                        <input type="email" name="Email" placeholder="Masukan email..." required class="chat-input p-6 rounded-[2rem] font-bold text-base w-full">
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-400 ml-2">Isi Pesan / Masukan</label>
                    <textarea name="message" placeholder="Tulis saran atau masukan..." rows="10" required class="chat-input p-8 rounded-[2.5rem] font-bold text-base w-full resize-none"></textarea>
                </div>
                
                <button type="submit" id="submit-btn" class="w-full bg-black text-white p-8 rounded-[2.5rem] font-black uppercase tracking-[0.3em] text-sm hover:bg-red-600 transition-all shadow-2xl shadow-red-600/10 active:scale-[0.98]">
                    Kirim
                </button>
            </form>
        </div>
    </main>

     <footer class="bg-zinc-950 text-white mt-32 pt-20 pb-10">
    <div class="max-w-7xl mx-auto px-8">
        <div class="flex flex-col items-center text-center border-b border-zinc-800 pb-12 mb-8">
            <div>
                <h2 class="text-2xl font-black uppercase mb-4 tracking-tighter">Portal<span class="text-red-600">Nada</span></h2>
                <p class="text-zinc-500 text-sm max-w-sm leading-relaxed mx-auto">
                    Media berita musik independen paling akurat dan terpercaya untuk audiens Indonesia.
                </p>
            </div>
            
            <div class="flex gap-8 text-[11px] font-black uppercase tracking-[0.2em] mt-8">
                <a href="/about" class="hover:text-red-600 transition">About</a>
                <a href="/contact" class="hover:text-red-600 transition">Contact</a>
            </div>
        </div>

        <div class="flex justify-center items-center">
            <p class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest text-center">
                © 2026 Portal Nada Media
            </p>
        </div>
    </div>
</footer>

    <script>
        const form = document.getElementById("contact-form");
        const btn = document.getElementById("submit-btn");
        const pop = document.getElementById("success-pop");
        const overlay = document.getElementById("overlay");

        async function handleSubmit(event) {
            event.preventDefault();
            const originalText = btn.innerHTML;
            btn.innerHTML = "MENGIRIM...";
            btn.disabled = true;
            
            const data = new FormData(event.target);
            fetch(event.target.action, {
                method: form.method,
                body: data,
                headers: { 'Accept': 'application/json' }
            }).then(response => {
                if (response.ok) {
                    pop.style.display = "block";
                    overlay.style.display = "block";
                    form.reset();
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                } else {
                    alert("Gagal nengirim.");
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            }).catch(error => {
                alert("Masalah koneksi.");
                btn.innerHTML = originalText;
                btn.disabled = false;
            });
        }

        function closePop() {
            pop.style.display = "none";
            overlay.style.display = "none";
        }

        form.addEventListener("submit", handleSubmit);
    </script>
</body>
</html>
