name: Ganti Domain Massal Pro

on:
  workflow_dispatch:
    inputs:
      domain_lama:
        description: 'Domain lama'
        required: true
      domain_baru:
        description: 'Domain baru'
        required: true

jobs:
  replace:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Ganti Teks (Hanya File Web)
        run: |
          # Hanya mencari di file html, js, css, json, xml, dan md agar tidak nabrak file gambar/audio
          find . -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.json" -o -name "*.xml" -o -name "*.md" \) -exec sed -i "s|${{ github.event.inputs.domain_lama }}|${{ github.event.inputs.domain_baru }}|g" {} +

      - name: Cek Perubahan dan Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          # Paksa commit hanya jika ada file yang berubah
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto Pro: Ganti domain ${{ github.event.inputs.domain_lama }} ke ${{ github.event.inputs.domain_baru }}" && git push)
