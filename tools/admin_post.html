<!DOCTYPE html>
<html lang="id">
<head>
    <script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Writer Dashboard - Portal Nada</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #0a0a0a; color: white; overflow-x: hidden; }
        
        /* --- Kustomisasi Quill Editor --- */
        .ql-container.ql-snow { border: 1px solid #27272a !important; border-top: none !important; border-radius: 0 0 12px 12px; }
        .ql-toolbar.ql-snow { background: #18181b; border: 1px solid #27272a; border-radius: 12px 12px 0 0; }
        .ql-toolbar.ql-snow .ql-stroke { stroke: #d4d4d8; }
        .ql-toolbar.ql-snow .ql-fill { fill: #d4d4d8; }
        .ql-toolbar.ql-snow .ql-picker { color: #d4d4d8; }
        .ql-editor { background: #0a0a0a; color: #f4f4f5; min-height: 60vh; font-size: 1.15rem; line-height: 1.8; padding: 2rem; }
        
        /* --- PERBAIKAN FORMAT EDITOR AGAR MIRIP HASIL JADI --- */
        .ql-editor h1, .ql-editor h2 { color: white; font-weight: 900; text-transform: uppercase; margin-top: 2rem; margin-bottom: 1rem; }
        .ql-editor blockquote { 
            border-left: 4px solid #dc2626 !important; /* Warna Merah */
            padding: 1rem 1.5rem !important;
            margin-left: 0 !important;
            color: #d4d4d8 !important;
            font-style: italic !important;
            background-color: #18181b !important; /* Background agak gelap */
            border-radius: 0 0.5rem 0.5rem 0 !important;
            font-size: 1.1rem;
        }
        .ql-editor img { border-radius: 1.5rem; border: 1px solid #27272a; margin: 2rem 0; width: 100%; }
        .ql-editor iframe.ql-video { width: 100%; height: 400px; border-radius: 1rem; margin: 2rem 0; border: 1px solid #27272a; }
        @media (max-width: 768px) { .ql-editor iframe.ql-video { height: 250px; } }

        /* --- PREVIEW MODAL --- */
        #previewModal { display: none; }
        #previewModal.active { display: flex; }
    </style>
</head>
<body class="py-6 md:py-12 relative">

    <div class="max-w-6xl mx-auto px-4 md:px-8">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-end gap-4 border-b border-zinc-800 pb-6">
            <div>
                <h1 class="text-3xl md:text-4xl font-black uppercase tracking-tighter">WRITER <span class="text-red-600">DASHBOARD</span></h1>
                <p class="text-zinc-500 mt-2 text-xs md:text-sm">Posting artikel Musik Anywhere dengan mudah.</p>
            </div>
            <a href="index.html" class="bg-zinc-800 px-6 py-3 rounded-full text-[10px] font-black uppercase tracking-widest hover:bg-red-600 transition text-center w-full md:w-auto">Lihat Website</a>
        </header>

        <div class="space-y-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Akses Token Github</label>
                    <input type="password" id="ghToken" placeholder="ghp_xxxxxxxxx" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl outline-none focus:border-red-600 transition text-white">
                </div>
                <div class="space-y-2">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Kategori Artikel</label>
                    <select id="postCategory" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl outline-none focus:border-red-600 transition text-white cursor-pointer appearance-none">
                        <option value="Artikel">Artikel</option>
                        <option value="News">News</option>
                        <option value="Lirik Lagu">Lirik Lagu</option>
                    </select>
                </div>
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Judul Artikel</label>
                <input type="text" id="postTitle" placeholder="Ketik Judul Artikel Di Sini..." class="w-full bg-zinc-900 border border-zinc-800 p-4 md:p-5 rounded-xl outline-none focus:border-red-600 transition font-black text-white text-lg md:text-2xl">
            </div>

            <div class="space-y-2">
                <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500 flex justify-between">
                    <span>Isi Artikel (Gunakan Toolbar untuk variasi)</span>
                    <span class="text-red-500">Mendukung Embed YouTube!</span>
                </label>
                <div id="editor"></div>
            </div>

            <div class="flex flex-col md:flex-row gap-4 pt-4">
                <button onclick="togglePreview()" class="w-full md:w-1/3 bg-zinc-800 p-4 rounded-2xl font-black text-sm uppercase tracking-widest hover:bg-zinc-700 transition flex items-center justify-center gap-2 border border-zinc-700">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                    Preview
                </button>
                <button onclick="handlePublish()" id="pubBtn" class="w-full md:w-2/3 bg-red-600 p-4 rounded-2xl font-black text-sm uppercase tracking-[0.2em] hover:bg-red-700 transition shadow-xl flex items-center justify-center gap-2">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
                    Terbitkan Sekarang
                </button>
            </div>

            <div class="mt-20 pt-10 border-t border-zinc-800">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                    <h2 class="text-xl md:text-2xl font-black uppercase tracking-tighter">Manajemen <span class="text-red-600">Artikel</span></h2>
                    <button onclick="loadArticleList()" class="bg-zinc-800 px-5 py-2 rounded-lg text-[10px] font-bold uppercase tracking-widest hover:bg-zinc-700 transition w-full md:w-auto">Refresh List Data</button>
                </div>
                <div id="articleList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <p class="text-zinc-500 text-sm italic col-span-2">Masukkan Token Github lalu klik Refresh List untuk memuat artikel.</p>
                </div>
            </div>
        </div>
    </div>

    <div id="previewModal" class="fixed inset-0 bg-black/95 z-[999] overflow-y-auto backdrop-blur-md pt-4 pb-20 px-4 md:px-0">
        <div class="max-w-4xl mx-auto w-full relative">
            <div class="sticky top-0 bg-black/80 backdrop-blur-md py-4 border-b border-zinc-800 mb-8 flex justify-between items-center z-10 px-2">
                <span class="text-red-500 font-black tracking-widest text-[10px] uppercase">Mode Preview</span>
                <button onclick="togglePreview()" class="bg-white text-black px-4 py-2 rounded-full font-bold text-xs uppercase tracking-widest hover:bg-red-600 hover:text-white transition">Tutup Preview</button>
            </div>

            <article class="bg-[#0a0a0a] p-4 md:p-8 rounded-[2rem] border border-zinc-800">
                <div class="mb-10 text-center md:text-left">
                    <span id="prevCat" class="bg-red-900 text-white px-4 py-1.5 rounded-md text-[10px] font-black uppercase tracking-widest mb-6 inline-block">Kategori</span>
                    <h1 id="prevTitle" class="text-3xl md:text-5xl lg:text-6xl font-black uppercase tracking-tighter mb-6 leading-tight text-white">Judul Artikel</h1>
                </div>
                
                <div id="prevContent" class="ql-editor !p-0"></div>
            </article>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // --- KONFIGURASI TOOLBAR SUPER LENGKAP ---
        var toolbarOptions = [
            [{ 'font': [] }, { 'size': ['small', false, 'large', 'huge'] }], // Font & Ukuran
            ['bold', 'italic', 'underline', 'strike'], // Format Teks Dasar
            [{ 'color': [] }, { 'background': [] }], // Warna Teks & Background
            [{ 'script': 'sub'}, { 'script': 'super' }], // Subscript / Superscript
            [{ 'header': 1 }, { 'header': 2 }, 'blockquote', 'code-block'], // Heading & Kutipan
            [{ 'list': 'ordered'}, { 'list': 'bullet' }], // List Numerik & Titik
            [{ 'align': [] }], // Rata Kanan, Kiri, Tengah, Justify
            [{ 'indent': '-1'}, { 'indent': '+1' }], // Indentasi
            ['link', 'image', 'video'], // Link, Upload Gambar, Embed YouTube
            ['clean'] // Tombol Hapus Format
        ];

        var quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: 'Tulis lirik, berita, atau embed link YouTube di sini...',
            modules: { toolbar: toolbarOptions }
        });

        // Handler untuk mengubah Gambar menjadi Base64 Otomatis
        quill.getModule('toolbar').addHandler('image', () => {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'image/*');
            input.click();
            input.onchange = async () => {
                const file = input.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            const scale = 1200 / img.width; // Resize lebar max 1200px
                            canvas.width = 1200;
                            canvas.height = img.height * scale;
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            const base64 = canvas.toDataURL('image/jpeg', 0.8);
                            const range = quill.getSelection();
                            quill.insertEmbed(range.index, 'image', base64);
                        };
                    };
                    reader.readAsDataURL(file);
                }
            };
        });

        // Variabel Sistem
        let isEditMode = false;
        let currentSha = null;
        let currentPath = null;

        function getIndoDate() {
            const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            const d = new Date();
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
        }

        // --- FITUR PREVIEW ---
        function togglePreview() {
            const modal = document.getElementById('previewModal');
            if (modal.classList.contains('active')) {
                modal.classList.remove('active');
                document.body.style.overflow = 'auto'; // Kembalikan scroll body
            } else {
                document.getElementById('prevTitle').innerText = document.getElementById('postTitle').value || "JUDUL ARTIKEL KOSONG";
                document.getElementById('prevCat').innerText = `Kategori: ${document.getElementById('postCategory').value}`;
                document.getElementById('prevContent').innerHTML = quill.root.innerHTML;
                modal.classList.add('active');
                document.body.style.overflow = 'hidden'; // Kunci scroll body biar fokus di modal
            }
        }

        // --- PUBLISH KE GITHUB ---
        async function handlePublish() {
            const token = document.getElementById('ghToken').value;
            const title = document.getElementById('postTitle').value;
            const content = quill.root.innerHTML;
            const category = document.getElementById('postCategory').value; 
            const publishTime = new Date().toISOString();
            const btn = document.getElementById('pubBtn');

            if(!token || !title) return alert("Oops! Token Github atau Judul Artikel belum diisi.");

            btn.innerHTML = `<svg class="animate-spin w-5 h-5 mr-2" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> MEMPROSES...`;
            btn.disabled = true;

            const slug = title.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
            const filePath = isEditMode ? currentPath : `artikel/${slug}.html`;

            // =========================================================================
            // TEMPEL CONST FULLTEMPLATE LAMA KAMU DI BAWAH INI
            // =========================================================================
            
            const fullTemplate = ``; // <--- PASTE ISI CADANGAN.HTML DISINI!
            
            // =========================================================================
            // BATAS TEMPEL
            // =========================================================================

            if(fullTemplate === ``) {
                alert("WOY! const fullTemplate nya masih kosong! Ingat, paste isi dari cadangan.html ke dalam variabel fullTemplate di baris kode.");
                btn.innerHTML = "Terbitkan Sekarang";
                btn.disabled = false;
                return;
            }

            const payload = {
                message: isEditMode ? `Update: ${title}` : `Publish: ${title}`,
                content: btoa(unescape(encodeURIComponent(fullTemplate)))
            };
            if(isEditMode) payload.sha = currentSha;

            try {
                // Catatan: URL Repo sudah dikoreksi menjadi musikanywhere.online
                const response = await fetch(`https://api.github.com/repos/pembri/musikanywhere.online/contents/${filePath}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(response.ok) {
                    alert(isEditMode ? "BERHASIL! Artikel sukses diupdate." : "MANTAP! Artikel sukses diterbitkan.");
                    location.reload();
                } else { alert("Gagal terhubung ke Github. Pastikan Token kamu valid dan memiliki izin 'repo'."); }
            } catch (e) { alert("Error: " + e.message); }
            
            btn.innerHTML = "Terbitkan Sekarang";
            btn.disabled = false;
        }

        // --- MANAJEMEN ARTIKEL ---
        async function loadArticleList() {
            const token = document.getElementById('ghToken').value;
            const listDiv = document.getElementById('articleList');
            if(!token) return alert("Masukkan token Github terlebih dahulu!");
            
            listDiv.innerHTML = '<p class="text-zinc-500 text-xs font-bold uppercase tracking-widest animate-pulse col-span-2">Memuat Data Artikel...</p>';
            
            try {
                const res = await fetch('https://api.github.com/repos/pembri/musikanywhere.online/contents/artikel', {
                    headers: { 'Authorization': `token ${token}` }
                });
                const files = await res.json();
                const articles = files.filter(f => f.name.endsWith('.html'));
                
                listDiv.innerHTML = '';
                articles.reverse().forEach(file => {
                    const cleanTitle = file.name.replace(/-/g, ' ').replace('.html', '').toUpperCase();
                    listDiv.innerHTML += `
                        <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl flex flex-col justify-between hover:border-red-600 transition">
                            <div class="mb-4">
                                <h3 class="font-bold text-sm tracking-tight text-white line-clamp-2">${cleanTitle}</h3>
                                <p class="text-[9px] text-zinc-500 uppercase mt-1 truncate">${file.name}</p>
                            </div>
                            <div class="flex gap-2 w-full">
                                <button onclick="editArticle('${file.path}', '${file.sha}')" class="flex-1 bg-blue-600/10 text-blue-500 border border-blue-600/20 text-[10px] font-black py-2 rounded-lg hover:bg-blue-600 hover:text-white transition uppercase">Edit</button>
                                <button onclick="deleteArticle('${file.path}', '${file.sha}')" class="flex-1 bg-red-600/10 text-red-500 border border-red-600/20 text-[10px] font-black py-2 rounded-lg hover:bg-red-600 hover:text-white transition uppercase">Hapus</button>
                            </div>
                        </div>`;
                });
            } catch (e) { listDiv.innerHTML = '<p class="text-red-500 text-xs col-span-2">Gagal memuat list. Cek apakah Token valid.</p>'; }
        }

        async function editArticle(path, sha) {
            const token = document.getElementById('ghToken').value;
            const btn = document.getElementById('pubBtn');
            try {
                const res = await fetch(`https://api.github.com/repos/pembri/musikanywhere.online/contents/${path}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const data = await res.json();
                const htmlContent = decodeURIComponent(escape(atob(data.content)));
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, 'text/html');
                
                const title = doc.querySelector('h1')?.innerText || "";
                const content = doc.querySelector('.prose')?.innerHTML || doc.querySelector('.ql-editor')?.innerHTML || "";
                
                // Set Judul & Konten
                document.getElementById('postTitle').value = title;
                quill.root.innerHTML = content;
                
                // Set Kategori jika ada
                const catMeta = doc.querySelector('meta[name="category"]');
                if(catMeta) {
                    const catVal = catMeta.getAttribute('content');
                    const selectCat = document.getElementById('postCategory');
                    for(let i=0; i<selectCat.options.length; i++){
                        if(selectCat.options[i].value === catVal) selectCat.selectedIndex = i;
                    }
                }

                // Ubah status ke Edit Mode
                isEditMode = true;
                currentSha = sha;
                currentPath = path;
                btn.innerHTML = `<svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg> UPDATE ARTIKEL SEKARANG`;
                btn.classList.replace('bg-red-600', 'bg-blue-600');
                btn.classList.replace('hover:bg-red-700', 'hover:bg-blue-700');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
                alert("Mode Edit Diaktifkan! Silakan ubah konten dan klik Update.");
            } catch (e) { alert("Gagal mengambil isi artikel dari Github."); }
        }

        async function deleteArticle(path, sha) {
            if(!confirm("PERINGATAN: Kamu yakin ingin menghapus artikel ini secara permanen dari Website?")) return;
            const token = document.getElementById('ghToken').value;
            try {
                const res = await fetch(`https://api.github.com/repos/pembri/musikanywhere.online/contents/${path}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Hapus Artikel: ${path}`, sha: sha })
                });
                if(res.ok) { 
                    alert("Berhasil Terhapus!"); 
                    loadArticleList(); 
                } else {
                    alert("Gagal menghapus. Periksa Token kamu.");
                }
            } catch (e) { alert("Error: " + e.message); }
        }
    </script>
</body>
