name: Ganti Domain Massal

on:
  workflow_dispatch:
    inputs:
      domain_lama:
        description: 'Domain lama (contoh: pembri.github.io)'
        required: true
      domain_baru:
        description: 'Domain baru (contoh: musikanywhere.online)'
        required: true

jobs:
  replace:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Ganti Teks Massal
        run: |
          find . -type f -not -path '*/\.git/*' -exec sed -i "s|${{ github.event.inputs.domain_lama }}|${{ github.event.inputs.domain_baru }}|g" {} +

      - name: Commit dan Push Perubahan
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto: Ganti domain ${{ github.event.inputs.domain_lama }} ke ${{ github.event.inputs.domain_baru }}" && git push)
