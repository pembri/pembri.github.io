    <script>
        // PAKSA QUILL PAKAI INLINE STYLE (Biar gak rusak/hilang pas di render di web)
        var Size = Quill.import('attributors/style/size');
        var Align = Quill.import('attributors/style/align');
        var Color = Quill.import('attributors/style/color');
        var Background = Quill.import('attributors/style/background');
        var Font = Quill.import('attributors/style/font');
        
        Size.whitelist = ['10px', '12px', '14px', '16px', '18px', '24px', '32px', '48px'];
        Quill.register(Size, true);
        Quill.register(Align, true);
        Quill.register(Color, true);
        Quill.register(Background, true);
        Quill.register(Font, true);

        var toolbarOptions = [
            [{ 'font': [] }, { 'size': Size.whitelist }], 
            ['bold', 'italic', 'underline', 'strike'], 
            [{ 'color': [] }, { 'background': [] }], 
            [{ 'script': 'sub'}, { 'script': 'super' }], 
            [{ 'header': 1 }, { 'header': 2 }, 'blockquote', 'code-block'], 
            [{ 'list': 'ordered'}, { 'list': 'bullet' }], 
            [{ 'align': [] }], 
            [{ 'indent': '-1'}, { 'indent': '+1' }], 
            ['link', 'image', 'video'], 
            ['clean'] 
        ];

        var quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: 'Tulis lirik, berita, atau embed link YouTube di sini...',
            modules: { toolbar: toolbarOptions }
        });

        quill.getModule('toolbar').addHandler('image', () => {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'image/*');
            input.click();
            input.onchange = async () => {
                const file = input.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            const scale = 1200 / img.width; 
                            canvas.width = 1200;
                            canvas.height = img.height * scale;
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            const base64 = canvas.toDataURL('image/jpeg', 0.8);
                            const range = quill.getSelection();
                            quill.insertEmbed(range.index, 'image', base64);
                        };
                    };
                    reader.readAsDataURL(file);
                }
            };
        });

            const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            const d = new Date();
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
        }

        // FUNGSI INJEKSI CSS PERMANEN UNTUK HASIL AKHIR
        function getProcessedContent() {
            let html = quill.root.innerHTML;
            // Suntik inline style ke blockquote biar hasilnya sama persis dengan editor
            html = html.replace(/<blockquote>/g, '<blockquote style="border-left: 4px solid #dc2626; padding-left: 1.5rem; margin-left: 0; color: #a1a1aa; font-style: italic; background-color: #18181b; padding-top: 1rem; padding-bottom: 1rem; border-radius: 0 0.5rem 0.5rem 0; margin-bottom: 1rem;">');
            // Suntik inline style ke iframe youtube biar responsive di HP dan PC
            html = html.replace(/<iframe class="ql-video"/g, '<iframe style="width:100%; aspect-ratio:16/9; border-radius:1rem; border:1px solid #27272a; margin: 2rem 0;"');
            return html;
        }

        function togglePreview() {
            const modal = document.getElementById('previewModal');
            if (modal.classList.contains('active')) {
                modal.classList.remove('active');
                document.body.style.overflow = 'auto'; 
            } else {
                document.getElementById('prevTitle').innerText = document.getElementById('postTitle').value || "JUDUL ARTIKEL KOSONG";
                document.getElementById('prevCat').innerText = `Kategori: ${document.getElementById('postCategory').value}`;
                
                // Gunakan processed content untuk preview
                document.getElementById('prevContent').innerHTML = getProcessedContent();
                
                modal.classList.add('active');
                document.body.style.overflow = 'hidden'; 
            }
        }

            <h2 class="text-2xl font-black uppercase mb-4 tracking-tighter text-white">MUSIK<span class="text-red-600">ANYWHERE</span></h2>
            <p class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest py-4 uppercase"> © 2026 Musik Anywhere Media. </p>
        </div>
    </footer>
    <script>
        let allArticles = [];
        function toggleMenu() { const m = document.getElementById('mobileMenu'); const im = document.getElementById('icon-menu'); const ic = document.getElementById('icon-close'); m.classList.toggle('hidden'); im.classList.toggle('hidden'); ic.classList.toggle('hidden'); }
        function handleSearch(inputId, suggestionsId, listId) {
            const query = document.getElementById(inputId).value.toLowerCase().trim();
            const suggestions = document.getElementById(suggestionsId);
            if (query.length < 2) { suggestions.classList.remove('active'); return; }
            const filtered = allArticles.filter(art => art.title.toLowerCase().includes(query)).slice(0, 6);
            if (filtered.length > 0) {
                document.getElementById(listId).innerHTML = filtered.map(art => \`<a href=\"/artikel/\${art.name}\" class=\"block px-5 py-4 hover:bg-zinc-800 border-b border-zinc-800 uppercase font-bold text-xs text-white\">\${art.title}</a>\`).join('');
                suggestions.classList.add('active');
            } else { suggestions.classList.remove('active'); }
        }
        function closeSearch() { document.querySelectorAll('[id$=\"Suggestions\"]').forEach(s => s.classList.remove('active')); }
        function copyToClipboard() { navigator.clipboard.writeText(window.location.href); alert("Link berhasil disalin!"); }
        async function initPage() { 
            try { 
                const res = await fetch('https://api.github.com/repos/pembri/musikanywhere.online/contents/artikel'); 
                const files = await res.json(); 
                const htmlFiles = files.filter(f => f.name.endsWith('.html')).reverse();
                const container = document.getElementById('rec-container');
                const currentFile = window.location.pathname.split('/').pop();
                let loaded = [];
                for(let file of htmlFiles) {
                    try {
                        const r = await fetch('/artikel/' + file.name);
                        const t = await r.text();
                        const doc = new DOMParser().parseFromString(t, 'text/html');
                        const title = doc.querySelector('h1')?.innerText || file.name;
                        let thumb = '/android-icon-192x192.png';
                        const firstImg = doc.querySelector('.prose img') || doc.querySelector('img');
                        if(firstImg) thumb = firstImg.getAttribute('src');
                        const artData = { name: file.name.replace('.html',''), title: title, thumb: thumb };
                        loaded.push(artData);
                        if (file.name !== currentFile && container.children.length < 3) {
                            container.innerHTML += \`<a href=\"/artikel/\${artData.name}\" class=\"group flex flex-col bg-zinc-900 rounded-2xl border border-zinc-800 hover:border-zinc-700 transition overflow-hidden\">
                                <div class=\"aspect-[16/10] bg-zinc-950 relative overflow-hidden\"><img src=\"\${thumb}\" class=\"absolute inset-0 w-full h-full object-contain p-2 opacity-80 group-hover:scale-110 group-hover:opacity-100 transition duration-700\"></div>
                                <div class=\"p-4 text-left\"><h4 class=\"text-white font-black uppercase text-sm leading-tight tracking-tight group-hover:text-red-500 transition line-clamp-2\">\${title}</h4></div>
                            </a>\`;
                        }
                    } catch(e){}
                }
                allArticles = loaded;
            } catch(e) {} 
        } 
        window.onload = initPage;
    <\/script>
</body>
</html>`;
            
            // =========================================================================
            // BATAS TEMPEL
            // =========================================================================

            if(fullTemplate === ``) {
                alert("WOY! const fullTemplate nya masih kosong! Jangan lupa paste isi cadangan.html ke dalam variabel fullTemplate.");
                btn.innerHTML = "🚀 Terbitkan Sekarang";
                btn.disabled = false;
                return;
            }

            const payload = {
                message: isEditMode ? `Update: ${title}` : `Publish: ${title}`,
                content: btoa(unescape(encodeURIComponent(fullTemplate)))
            };
            if(isEditMode) payload.sha = currentSha;

            try {
                // REPO BENAR: pembri/musikanywhere.online
                const response = await fetch(`https://api.github.com/repos/pembri/musikanywhere.online/contents/${filePath}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(response.ok) {
                    alert(isEditMode ? "BERHASIL! Artikel sukses diupdate." : "MANTAP! Artikel sukses diterbitkan.");
                    location.reload();
                } else { alert("Gagal terhubung ke Github. Cek Token lu bang!"); }
            } catch (e) { alert("Error: " + e.message); }
            
            btn.innerHTML = "🚀 Terbitkan Sekarang";
            btn.disabled = false;
        }

        async function loadArticleList() {
            const token = document.getElementById('ghToken').value;
            const listDiv = document.getElementById('articleList');
            if(!token) return alert("Masukkan token Github terlebih dahulu!");
            
            listDiv.innerHTML = '<p class="text-zinc-500 text-xs font-bold uppercase tracking-widest animate-pulse col-span-2">Memuat Data Artikel...</p>';
            
            try {
                const res = await fetch('https://api.github.com/repos/pembri/musikanywhere.online/contents/artikel', {
                    headers: { 'Authorization': `token ${token}` }
                });
                const files = await res.json();
                const articles = files.filter(f => f.name.endsWith('.html'));
                
                listDiv.innerHTML = '';
                articles.reverse().forEach(file => {
                    // Bersihkan kode 'z-timestamp-' biar list di admin tetap rapi dan enak dibaca
                    const cleanName = file.name.replace(/^z-\d+-/, '').replace(/-/g, ' ').replace('.html', '').toUpperCase();
                    listDiv.innerHTML += `
                        <div class="bg-zinc-900 border border-zinc-800 p-4 rounded-xl flex flex-col justify-between hover:border-red-600 transition">
                            <div class="mb-4">
                                <h3 class="font-bold text-sm tracking-tight text-white line-clamp-2">${cleanName}</h3>
                                <p class="text-[9px] text-zinc-500 uppercase mt-1 truncate">${file.name}</p>
                            </div>
                            <div class="flex gap-2 w-full">
                                <button onclick="editArticle('${file.path}', '${file.sha}')" class="flex-1 bg-blue-600/10 text-blue-500 border border-blue-600/20 text-[10px] font-black py-2 rounded-lg hover:bg-blue-600 hover:text-white transition uppercase">Edit</button>
                                <button onclick="deleteArticle('${file.path}', '${file.sha}')" class="flex-1 bg-red-600/10 text-red-500 border border-red-600/20 text-[10px] font-black py-2 rounded-lg hover:bg-red-600 hover:text-white transition uppercase">Hapus</button>
                            </div>
                        </div>`;
                });
            } catch (e) { listDiv.innerHTML = '<p class="text-red-500 text-xs col-span-2">Gagal memuat list. Cek apakah Token valid.</p>'; }
        }

        async function editArticle(path, sha) {
            const token = document.getElementById('ghToken').value;
            const btn = document.getElementById('pubBtn');
            try {
                const res = await fetch(`https://api.github.com/repos/pembri/musikanywhere.online/contents/${path}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const data = await res.json();
                const htmlContent = decodeURIComponent(escape(atob(data.content)));
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, 'text/html');
                
                const title = doc.querySelector('h1')?.innerText || "";
                const content = doc.querySelector('.prose')?.innerHTML || doc.querySelector('.ql-editor')?.innerHTML || "";
                
                document.getElementById('postTitle').value = title;
                quill.root.innerHTML = content;
                
                const catMeta = doc.querySelector('meta[name="category"]');
                if(catMeta) {
                    const catVal = catMeta.getAttribute('content');
                    const selectCat = document.getElementById('postCategory');
                    for(let i=0; i<selectCat.options.length; i++){
                        if(selectCat.options[i].value === catVal) selectCat.selectedIndex = i;
                    }
                }

                isEditMode = true;
                currentSha = sha;
                currentPath = path;
                btn.innerHTML = `UPDATE ARTIKEL SEKARANG`;
                btn.classList.replace('bg-red-600', 'bg-blue-600');
                btn.classList.replace('hover:bg-red-700', 'hover:bg-blue-700');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
                alert("Mode Edit Diaktifkan! Silakan ubah konten dan klik Update.");
            } catch (e) { alert("Gagal mengambil isi artikel dari Github."); }
        }

        async function deleteArticle(path, sha) {
            if(!confirm("PERINGATAN: Kamu yakin ingin menghapus artikel ini secara permanen dari Website?")) return;
            const token = document.getElementById('ghToken').value;
            try {
                const res = await fetch(`https://api.github.com/repos/pembri/musikanywhere.online/contents/${path}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Hapus Artikel: ${path}`, sha: sha })
                });
                if(res.ok) { 
                    alert("Berhasil Terhapus!"); 
                    loadArticleList(); 
                } else {
                    alert("Gagal menghapus. Periksa Token kamu.");
                }
            } catch (e) { alert("Error: " + e.message); }
        }
    </script>
</body>
</html>
