<!DOCTYPE html>
<html lang="id">
<head>
    <script>
      var password = "Anjing526"; 
      var input;
      while (input !== password) {
        input = prompt("Admin Area: Masukkan kata sandi:");
        if (input === null) { window.location.href = "https://musikanywhere.online"; break; }
        if (input !== password) { alert("Sandi Salah! Akses ditolak."); }
      }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musik Anywhere - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; }
        .ql-container.ql-snow { border: none !important; }
        .ql-toolbar.ql-snow { background: #18181b; border-radius: 1rem 1rem 0 0; border: 1px solid #27272a; border-bottom: none; }
        .ql-toolbar button { filter: invert(1); }
        .ql-editor { background: #0a0a0a; color: #e4e4e7; min-height: 500px; border-radius: 0 0 1rem 1rem; font-size: 1.1rem; border: 1px solid #27272a; }
        .ql-editor img { border-radius: 1rem; margin: 1rem 0; }
    </style>
</head>
<body class="py-10 md:py-20">

    <div class="max-w-6xl mx-auto px-6">
        <header class="mb-12 flex flex-col md:flex-row md:justify-between md:items-end gap-6 border-b border-zinc-800 pb-8">
            <div><h1 class="text-4xl md:text-5xl font-black uppercase tracking-tighter text-white">ADMIN<span class="text-red-600">PANEL</span></h1></div>
            <a href="/" class="bg-zinc-900 px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-zinc-800 transition border border-zinc-800 w-max">Ke Beranda</a>
        </header>

        <div class="space-y-8 bg-[#0a0a0a] p-6 md:p-10 rounded-[2rem] border border-zinc-800 shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Token Github</label>
                    <input type="password" id="ghToken" placeholder="ghp_xxxx" class="w-full bg-[#111] border border-zinc-800 p-4 rounded-xl outline-none text-sm focus:border-red-600 text-white">
                </div>
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Pilih Kategori</label>
                    <select id="postCategory" class="w-full bg-[#111] border border-zinc-800 p-4 rounded-xl outline-none text-white font-bold focus:border-red-600">
                        <option value="Artikel">Artikel</option>
                        <option value="News">News</option>
                        <option value="Lirik Lagu">Lirik Lagu</option>
                    </select>
                </div>
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Judul Artikel</label>
                    <input type="text" id="postTitle" placeholder="Ketik Judul..." class="w-full bg-[#111] border border-zinc-800 p-4 rounded-xl outline-none font-bold text-white focus:border-red-600">
                </div>
            </div>

            <div class="space-y-3">
                <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Isi Konten (Klik icon gambar untuk upload)</label>
                <div id="editor"></div>
            </div>

            <button onclick="handlePublish()" id="pubBtn" class="w-full bg-red-600 text-white py-5 rounded-xl font-black text-xl uppercase tracking-widest hover:bg-red-700 transition-all shadow-[0_0_40px_rgba(220,38,38,0.3)]">Publikasikan Artikel</button>
        </div>

        <div class="mt-20 pt-10 border-t border-zinc-800">
            <div class="flex flex-col md:flex-row justify-between md:items-center gap-4 mb-8">
                <h2 class="text-2xl font-black uppercase tracking-tighter">Database <span class="text-red-600">Artikel</span></h2>
                <button onclick="loadArticleList()" class="text-[10px] font-bold uppercase tracking-widest bg-zinc-800 px-6 py-3 rounded-xl hover:bg-zinc-700 transition">Tarik Data Server</button>
            </div>
            <div id="articleList" class="grid grid-cols-1 gap-4">
                <div class="bg-[#111] border border-zinc-800 p-8 rounded-2xl text-center text-zinc-500 text-sm italic">
                    Masukkan Token Github di atas lalu klik "Tarik Data Server".
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        var quill = new Quill('#editor', { theme: 'snow', modules: { toolbar: { container: [['bold', 'italic', 'underline'], ['link', 'image', 'video'], [{'header': 1}, {'header': 2}, 'blockquote'], [{'list': 'ordered'}, {'list': 'bullet'}], ['clean']] } } });
        
        quill.getModule('toolbar').addHandler('image', () => { 
            const input = document.createElement('input'); 
            input.setAttribute('type', 'file'); input.setAttribute('accept', 'image/*'); input.click(); 
            input.onchange = () => { 
                const file = input.files[0]; 
                if (file) { 
                    const reader = new FileReader(); 
                    reader.onload = (e) => { 
                        const range = quill.getSelection(true); 
                        quill.insertEmbed(range.index, 'image', e.target.result); 
                    }; 
                    reader.readAsDataURL(file); 
                } 
            }; 
        });

        function getIndoDate() { const d = new Date(); return `${d.getDate()} ${["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"][d.getMonth()]} ${d.getFullYear()}`; }

        let isEditMode = false;
        let currentSha = null;
        let currentPath = null;
        let originalTimestamp = null; 

        async function processImages(content, token) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(content, 'text/html');
            const images = doc.querySelectorAll('img');
            for (let img of images) {
                const src = img.getAttribute('src');
                if (src && src.startsWith('data:')) {
                    const fileName = `img_${Date.now()}_${Math.floor(Math.random() * 1000)}.png`;
                    const base64Data = src.split(',')[1];
                    try {
                        const res = await fetch(`https://api.github.com/repos/pembri/musikanywhere.online/contents/asset_gambar/${fileName}`, {
                            method: 'PUT',
                            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: `Upload image: ${fileName}`, content: base64Data })
                        });
                        if (res.ok) { img.setAttribute('src', `/asset_gambar/${fileName}`); }
                    } catch (e) { console.error(e); }
                }
            }
            return doc.body.innerHTML;
        }

        async function handlePublish() {
            const token = document.getElementById('ghToken').value;
            const category = document.getElementById('postCategory').value;
            const title = document.getElementById('postTitle').value;
            let content = quill.root.innerHTML;
            const btn = document.getElementById('pubBtn');

            if(!token || !title) return alert("Wajib isi!");
            btn.innerText = "MENGOLAH GAMBAR..."; btn.disabled = true;

            content = await processImages(content, token);

            const slug = title.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
            const filePath = isEditMode ? currentPath : `artikel/${slug}.html`;
            const publishTime = isEditMode && originalTimestamp ? originalTimestamp : Date.now();

            const fullTemplate = `<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="category" content="${category}">
    <meta name="publish-date" content="${publishTime}"> 
    <title>${title} - Musik Anywhere</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0a0a0a; color: #f4f4f5; display: flex; flex-direction: column; min-height: 100vh;}
        main { flex: 1; }
        .nav-glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .prose { max-width: none !important; }
        .prose img { border-radius: 1.5rem; margin: 2rem 0; width: 100%; border: 1px solid #27272a; }
        .prose h1, .prose h2 { color: white; font-weight: 900; text-transform: uppercase; margin-top: 2rem; }
        .prose p { color: #d4d4d8; line-height: 1.8; margin-bottom: 1rem; font-size: 1.15rem;}
        #searchSuggestions, #mobileSearchSuggestions { display: none; }
        #searchSuggestions.active, #mobileSearchSuggestions.active { display: block; }
    </style>
</head>
<body onclick=\"closeSearch()\">
    <header class=\"nav-glass sticky top-0 z-[100]\">
        <div class=\"max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between\">
            <a href=\"/\" class=\"text-xl md:text-2xl font-black tracking-tighter uppercase flex items-center gap-3 z-50 text-white\">
                <img src=\"/favicon-192x192.png\" alt=\"Logo\" class=\"w-8 h-8 md:w-9 md:h-9 rounded-full border border-zinc-800\">
                <span>MUSIK<span class=\"text-red-600\">ANYWHERE</span></span>
            </a>
            <nav class=\"hidden lg:flex gap-8 items-center text-[11px] font-black uppercase tracking-[0.15em] text-zinc-400\">
                <a href=\"/\" class=\"hover:text-red-500 transition\">Home</a>
                <a href=\"/index?kategori=Artikel\" class=\"hover:text-red-500 transition\">Artikel</a>
                <a href=\"/index?kategori=News\" class=\"hover:text-red-500 transition\">News</a>
                <a href=\"/index?kategori=Lirik Lagu\" class=\"hover:text-red-500 transition\">Lirik Lagu</a>
            </nav>
            <div class=\"flex items-center gap-4 z-50\">
                <div class=\"relative group hidden lg:block\" onclick=\"event.stopPropagation()\">
                    <div class=\"flex items-center bg-zinc-900 rounded-full px-4 py-2 border border-zinc-800 focus-within:border-red-500 transition-all\">
                        <svg class=\"w-4 h-4 text-zinc-500\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\"><path d=\"M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"></path></svg>
                        <input type=\"text\" id=\"searchInput\" oninput=\"handleSearch('searchInput', 'searchSuggestions', 'suggestionsList')\" placeholder=\"Cari...\" autocomplete=\"off\" class=\"bg-transparent border-none outline-none text-xs ml-2 w-48 text-white\">
                    </div>
                    <div id=\"searchSuggestions\" class=\"absolute top-full right-0 mt-3 w-80 bg-zinc-900 rounded-2xl shadow-2xl border border-zinc-800 overflow-hidden z-[110]\"><div id=\"suggestionsList\" class=\"max-h-[350px] overflow-y-auto\"></div></div>
                </div>
                <button id=\"menuBtn\" class=\"lg:hidden p-2 text-white\" onclick=\"toggleMenu()\">
                    <svg id=\"icon-menu\" class=\"w-6 h-6\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\" d=\"M4 6h16M4 12h16M4 18h16\"></path></svg>
                    <svg id=\"icon-close\" class=\"w-6 h-6 hidden\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\" d=\"M6 18L18 6M6 6l12 12\"></path></svg>
                </button>
            </div>
        </div>
        <div id=\"mobileMenu\" class=\"fixed inset-0 bg-[#0a0a0a] z-40 hidden flex-col pt-24 px-6 pb-8 h-screen overflow-y-auto px-6\">
            <div class=\"relative w-full mb-8 lg:hidden\" onclick=\"event.stopPropagation()\">
                <div class=\"flex items-center bg-zinc-900 rounded-full px-5 py-3 border border-zinc-800\">
                    <svg class=\"w-5 h-5 text-zinc-500\" fill=\"none\" stroke=\"currentColor\" viewBox=\"0 0 24 24\"><path stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"2\" d=\"M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z\"></path></svg>
                    <input type=\"text\" id=\"mobileSearchInput\" oninput=\"handleSearch('mobileSearchInput', 'mobileSearchSuggestions', 'mobileSuggestionsList')\" placeholder=\"Cari artikel...\" class=\"bg-transparent border-none outline-none text-sm ml-3 w-full text-white\">
                </div>
                <div id=\"mobileSearchSuggestions\" class=\"absolute top-full left-0 right-0 mt-2 bg-zinc-900 rounded-2xl border border-zinc-800 overflow-hidden z-[110]\"><div id=\"mobileSuggestionsList\" class=\"max-h-[300px] overflow-y-auto\"></div></div>
            </div>
            <nav class=\"flex flex-col gap-6 text-xl font-black uppercase tracking-tighter\">
                <a href=\"/\" class=\"text-white hover:text-red-600\">Home</a>
                <a href=\"/index?kategori=Artikel\" class=\"text-white hover:text-red-600\">Artikel</a>
                <a href=\"/index?kategori=News\" class=\"text-white hover:text-red-600\">News</a>
                <a href=\"/index?kategori=Lirik Lagu\" class=\"text-white hover:text-red-600\">Lirik Lagu</a>
                <hr class=\"border-zinc-800 my-2\">
                <a href=\"/about\" class=\"text-zinc-500 text-sm\">About</a>
                <a href=\"/contact\" class=\"text-zinc-500 text-sm\">Contact</a>
                <a href=\"/privacy\" class=\"text-zinc-500 text-sm\">Privacy Policy</a>
            </nav>
        </div>
    </header>

    <main class=\"w-full max-w-6xl mx-auto px-4 md:px-8 py-12 md:py-20\">
        <article class=\"bg-[#0a0a0a] p-2 md:p-6 rounded-[2rem] border-0 md:border border-zinc-800\">
            <div class=\"mb-12 text-center md:text-left text-white\">
                <span class=\"bg-red-900 text-white px-4 py-1.5 rounded-md text-[10px] font-black uppercase tracking-widest mb-6 inline-block\">Kategori: ${category}</span>
                <h1 class=\"text-4xl md:text-5xl lg:text-6xl font-black uppercase tracking-tighter mb-8 leading-tight\">${title}</h1>
                <p class=\"text-zinc-500 text-[11px] font-bold uppercase tracking-widest border-t border-b border-zinc-800 py-4\">Oleh Redaksi • ${getIndoDate()}</p>
            </div>
            <div class=\"prose prose-zinc max-w-none w-full\">${content}</div>
            <section class=\"mt-20 border-t border-zinc-800 pt-16\">
                <h2 class=\"text-2xl font-black uppercase mb-10 tracking-tighter flex items-center gap-3 text-white\"><span class=\"w-2 h-8 bg-red-600 rounded-sm\"></span> BACA JUGA</h2>
                <div id=\"rec-container\" class=\"grid grid-cols-1 md:grid-cols-3 gap-6\"></div>
            </section>
        </article>
    </main>
    <footer class=\"bg-[#050505] text-white mt-20 pt-20 pb-10 border-t border-zinc-900 w-full text-center uppercase text-[10px] tracking-widest\">© 2026 Musik Anywhere Media.</footer>
    <script>
        let allArticles = [];
        function toggleMenu() { const m = document.getElementById('mobileMenu'); const im = document.getElementById('icon-menu'); const ic = document.getElementById('icon-close'); m.classList.toggle('hidden'); im.classList.toggle('hidden'); ic.classList.toggle('hidden'); }
        function handleSearch(inputId, suggestionsId, listId) {
            const query = document.getElementById(inputId).value.toLowerCase().trim();
            const suggestions = document.getElementById(suggestionsId);
            if (query.length < 2) { suggestions.classList.remove('active'); return; }
            const filtered = allArticles.filter(art => art.title.toLowerCase().includes(query)).slice(0, 6);
            if (filtered.length > 0) {
                document.getElementById(listId).innerHTML = filtered.map(art => \`<a href=\"/artikel/\${art.name}\" class=\"block px-5 py-4 hover:bg-zinc-800 border-b border-zinc-800 uppercase font-bold text-xs text-white\">\${art.title}</a>\`).join('');
                suggestions.classList.add('active');
            } else { suggestions.classList.remove('active'); }
        }
        function closeSearch() { document.querySelectorAll('[id$=\"Suggestions\"]').forEach(s => s.classList.remove('active')); }
        async function initPage() { 
            try { 
                const res = await fetch('https://api.github.com/repos/pembri/musikanywhere.online/contents/artikel'); 
                const files = await res.json(); 
                const htmlFiles = files.filter(f => f.name.endsWith('.html')).reverse();
                const container = document.getElementById('rec-container');
                const currentFile = window.location.pathname.split('/').pop();
                let loaded = [];
                for(let file of htmlFiles) {
                    try {
                        const r = await fetch('/artikel/' + file.name);
                        const t = await r.text();
                        const doc = new DOMParser().parseFromString(t, 'text/html');
                        const title = doc.querySelector('h1')?.innerText || file.name;
                        let thumb = '/android-icon-192x192.png';
                        const firstImg = doc.querySelector('.prose img') || doc.querySelector('img');
                        if(firstImg) thumb = firstImg.getAttribute('src');
                        const artData = { name: file.name.replace('.html',''), title: title, thumb: thumb };
                        loaded.push(artData);
                        if (file.name !== currentFile && container.children.length < 3) {
                            container.innerHTML += \`<a href=\"/artikel/\${artData.name}\" class=\"group flex flex-col bg-zinc-900 rounded-2xl border border-zinc-800 hover:border-zinc-700 transition overflow-hidden\">
                                <div class=\"aspect-[16/10] bg-zinc-950 relative overflow-hidden\"><img src=\"\${thumb}\" class=\"absolute inset-0 w-full h-full object-contain p-2 opacity-80 group-hover:scale-110 group-hover:opacity-100 transition duration-700\"></div>
                                <div class=\"p-4 text-left\"><h4 class=\"text-white font-black uppercase text-sm leading-tight tracking-tight group-hover:text-red-500 transition line-clamp-2\">\${title}</h4></div>
                            </a>\`;
                        }
                    } catch(e){}
                }
                allArticles = loaded;
            } catch(e) {} 
        } 
        window.onload = initPage;
    <\/script>
</body>
</html>`;

            const payload = { message: isEditMode ? `Update: ${title}` : `Publish: ${title}`, content: btoa(unescape(encodeURIComponent(fullTemplate))), sha: isEditMode ? currentSha : undefined };
            try {
                const response = await fetch(`https://api.github.com/repos/pembri/musikanywhere.online/contents/${filePath}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                if(response.ok) { alert("SUKSES!"); location.reload(); }
            } catch (e) { alert("Error"); }
            btn.disabled = false;
        }

        async function loadArticleList() {
            const token = document.getElementById('ghToken').value;
            const listDiv = document.getElementById('articleList');
            if(!token) return alert("Wajib Token!");
            try {
                const res = await fetch('https://api.github.com/repos/pembri/musikanywhere.online/contents/artikel', { headers: { 'Authorization': `token ${token}` } });
                const files = await res.json();
                listDiv.innerHTML = '';
                for (let file of files.filter(f => f.name.endsWith('.html')).reverse()) {
                    let cleanTitle = file.name;
                    try {
                        const r = await fetch('/artikel/' + file.name);
                        const t = await r.text();
                        const doc = new DOMParser().parseFromString(t, 'text/html');
                        cleanTitle = doc.querySelector('h1')?.innerText || file.name;
                    } catch(e){}
                    listDiv.innerHTML += `
                        <div class="bg-[#111] border border-zinc-800 p-5 rounded-2xl flex justify-between items-center gap-4 group hover:border-red-600 transition">
                            <div class="text-left"><h3 class="font-black text-sm text-white">${cleanTitle}</h3><p class="text-[10px] text-zinc-500 font-mono">${file.name}</p></div>
                            <div class="flex gap-2">
                                <button onclick="editArticle('${file.path}', '${file.sha}')" class="bg-zinc-800 text-white text-[10px] font-black px-4 py-2 rounded-lg hover:bg-blue-600 transition">EDIT</button>
                                <button onclick="deleteArticle('${file.path}', '${file.sha}')" class="bg-zinc-800 text-red-500 text-[10px] font-black px-4 py-2 rounded-lg hover:bg-red-600 hover:text-white transition">HAPUS</button>
                            </div>
                        </div>`;
                }
            } catch (e) {}
        }

        async function editArticle(path, sha) {
            const token = document.getElementById('ghToken').value;
            const btn = document.getElementById('pubBtn');
            try {
                const res = await fetch(`https://api.github.com/repos/pembri/musikanywhere.online/contents/${path}`, { headers: { 'Authorization': `token ${token}` } });
                const data = await res.json();
                const html = decodeURIComponent(escape(atob(data.content)));
                const doc = new DOMParser().parseFromString(html, 'text/html');
                document.getElementById('postTitle').value = doc.querySelector('h1')?.innerText || "";
                quill.root.innerHTML = doc.querySelector('.prose')?.innerHTML || "";
                
                const catMeta = doc.querySelector('meta[name="category"]');
                const dateMeta = doc.querySelector('meta[name="publish-date"]');
                if(catMeta) document.getElementById('postCategory').value = catMeta.getAttribute('content');
                if(dateMeta) originalTimestamp = parseInt(dateMeta.getAttribute('content'));

                isEditMode = true; currentSha = sha; currentPath = path;
                btn.innerText = "UPDATE ARTIKEL";
                btn.classList.replace('bg-red-600', 'bg-blue-600');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                alert("Mode Edit Aktif");
            } catch (e) {}
        }

        async function deleteArticle(path, sha) {
            if(!confirm("Hapus?")) return;
            const token = document.getElementById('ghToken').value;
            try {
                const res = await fetch(`https://api.github.com/repos/pembri/musikanywhere.online/contents/${path}`, {
                    method: 'DELETE', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: `Hapus: ${path}`, sha: sha })
                });
                if(res.ok) { alert("Dihapus!"); loadArticleList(); }
            } catch (e) {}
        }
    </script>
</body>
</html>
