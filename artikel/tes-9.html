                    <span class="w-2 h-8 bg-red-600 rounded-full"></span>
                    Rekomendasi Untuk Kamu
                </h2>
                <div id="rec-container" class="grid grid-cols-2 md:grid-cols-4 gap-8"></div>
            </div>
        </section>
    </main>

    

    <script>
        let allArticles = [];
        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert("Link berhasil disalin!");
            });
        }

        async function getThumb(path) {
            try {
                const res = await fetch(`../artikel/${path}`);
                const text = await res.text();
                const imgRegex = /<img[^>]+src="([^">]+)"/;
                const match = text.match(imgRegex);
                return match ? match[1] : 'https://images.unsplash.com/photo-1514525253344-8846bbd97d6c?q=80&w=500';
            } catch(e) { return 'https://images.unsplash.com/photo-1514525253344-8846bbd97d6c?q=80&w=500'; }
        }

        async function handleSearch() {
            const input = document.getElementById('innerSearch');
            const suggestions = document.getElementById('searchSuggestions');
            const list = document.getElementById('suggestionsList');
            const query = input.value.toLowerCase();
            if (query.length < 1) { suggestions.classList.remove('active'); return; }
            
            const filtered = allArticles.filter(art => {
                const titleText = art.name.replace(/-/g, ' ').toLowerCase();
                return titleText.includes(query);
            }).slice(0, 8);

            if (filtered.length > 0) {
                list.innerHTML = filtered.map(art => {
                    const title = art.name.replace(/-/g, ' ').replace('.html', '');
                    return `<a href="${art.name}" class="block px-5 py-4 hover:bg-zinc-50 border-b border-zinc-50 transition flex items-center gap-3">
                        <div class="w-1.5 h-1.5 bg-red-600 rounded-full"></div>
                        <span class="text-[11px] font-black text-zinc-800 uppercase truncate tracking-tight">${title}</span>
                    </a>`;
                }).join('');
                suggestions.classList.add('active');
            } else {
                list.innerHTML = `<div class="px-5 py-4 text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Tidak ditemukan</div>`;
                suggestions.classList.add('active');
            }
        }

        function closeSearch() { document.getElementById('searchSuggestions').classList.remove('active'); }

        async function initPage() {
            try {
                const res = await fetch('https://api.github.com/repos/pembri/pembri.github.io/contents/artikel');
                allArticles = await res.json();
                const container = document.getElementById('rec-container');
                const currentFile = window.location.pathname.split('/').pop();
                const filtered = allArticles.filter(f => f.name !== currentFile && f.name.endsWith('.html')).reverse().slice(0, 4);
                
                for(let item of filtered) {
                    const thumb = await getThumb(item.name);
                    const t = item.name.replace(/-/g, ' ').replace('.html', '');
                    container.innerHTML += `
                        <a href="${item.name}" class="group block">
                            <div class="aspect-square bg-zinc-100 rounded-3xl mb-4 overflow-hidden shadow-sm">
                                <img src="${thumb}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                            </div>
                            <h4 class="font-bold uppercase text-[11px] leading-tight group-hover:text-red-600 transition tracking-tighter">${t}</h4>
                        </a>`;
                }
            } catch (e) { console.log(e); }
        }
        window.onload = initPage;
    </script>
