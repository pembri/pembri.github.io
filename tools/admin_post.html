                toolbar: {
                    container: [
                        [{ 'header': [1, 2, 3, false] }],
                        ['bold', 'italic', 'underline', 'strike'],
                        [{ 'color': [] }, { 'background': [] }],
                        [{ 'align': [] }],
                        ['blockquote', 'code-block'],
                        [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                        ['link', 'image', 'video'],
                        ['clean']
                    ]
                }
            }
        });

        // Wikipedia Style Tooltips logic
        const tooltips = {
            '.ql-header': 'Ukuran Judul (H1-H3)',
            '.ql-bold': 'Tebalkan Teks (Ctrl+B)',
            '.ql-italic': 'Miringkan Teks (Ctrl+I)',
            '.ql-underline': 'Garis Bawah (Ctrl+U)',
            '.ql-strike': 'Teks Dicoret',
            '.ql-color': 'Warna Tulisan',
            '.ql-background': 'Warna Latar Teks',
            '.ql-align': 'Perataan Paragraf',
            '.ql-blockquote': 'Kutipan Kata',
            '.ql-code-block': 'Blok Kode Program',
            '.ql-list[value="ordered"]': 'Daftar Angka',
            '.ql-list[value="bullet"]': 'Daftar Poin',
            '.ql-link': 'Sisipkan Tautan Link',
            '.ql-image': 'Unggah Gambar ke Server',
            '.ql-video': 'Sematkan Video Youtube',
            '.ql-clean': 'Hapus Semua Format'
        };

        Object.keys(tooltips).forEach(selector => {
            const el = document.querySelector(selector);
            if(el) el.setAttribute('data-title', tooltips[selector]);
        });

        // SMART YOUTUBE EMBED HANDLER
        quill.getModule('toolbar').addHandler('video', () => {
            const url = prompt('Tempel Link Video Youtube Anda:');
            if (url) {
                let embedUrl = url;
                if (url.includes('youtube.com') || url.includes('youtu.be')) {
                    const idMatch = url.match(/(?:youtu\.be\/|youtube\.com\/(?:embed\/|v\/|watch\?v=|watch\?.+&v=))([^&?]+)/);
                    if (idMatch) embedUrl = `https://www.youtube.com/embed/${idMatch[1]}`;
                }
                const range = quill.getSelection(true);
                quill.insertEmbed(range.index, 'video', embedUrl);
            }
        });

        // AUTO-SAVE DRAFT & COUNTER
        quill.on('text-change', () => {
            const text = quill.getText().trim();
            const words = text ? text.split(/\s+/).length : 0;
            const chars = text.length;
            document.getElementById('wordCount').innerText = words;
            document.getElementById('charCount').innerText = chars;
            localStorage.setItem('musikanywhere_draft', quill.root.innerHTML);
            document.getElementById('saveStatus').innerText = 'Draft tersimpan otomatis: ' + new Date().toLocaleTimeString();
        });

        window.onload = () => {
            const draft = localStorage.getItem('musikanywhere_draft');
            if(draft) quill.root.innerHTML = draft;
        };

        // PREVIEW MODE
        function togglePreview() {
            const modal = document.getElementById('previewModal');
            const body = document.getElementById('previewBody');
            const title = document.getElementById('postTitle').value || 'Tanpa Judul';
            const cat = document.getElementById('postCategory').value;
            
            body.innerHTML = `
                <div class="mb-10 text-left">
                    <span class="bg-red-600 px-3 py-1 rounded text-[9px] font-black uppercase text-white mb-4 inline-block">${cat}</span>
                    <h1 class="text-4xl font-black uppercase text-white mb-4 tracking-tighter">${title}</h1>
                    <hr class="border-zinc-800">
                </div>
                <div class="prose prose-zinc prose-invert max-w-none">
                    ${quill.root.innerHTML}
                </div>
            `;
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }

        // --- GITHUB PUBLISH LOGIC ---
        async function processImages(content, token) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(content, 'text/html');
            const images = doc.querySelectorAll('img');
            for (let img of images) {
                const src = img.getAttribute('src');
                if (src && src.startsWith('data:')) {
                    const fileName = `img_${Date.now()}_${Math.floor(Math.random() * 1000)}.png`;
                    const base64Data = src.split(',')[1];
                    try {
                        const res = await fetch(`https://api.github.com/repos/pembri/musikanywhere.online/contents/asset_gambar/${fileName}`, {
                            method: 'PUT',
                            headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                            body: JSON.stringify({ message: `Upload image: ${fileName}`, content: base64Data })
                        });
                        if (res.ok) { img.setAttribute('src', `/asset_gambar/${fileName}`); }
                    } catch (e) { console.error("Img error", e); }
                }
            }
            return doc.body.innerHTML;
        }

        async function handlePublish() {
            const token = document.getElementById('ghToken').value;
            const category = document.getElementById('postCategory').value;
            const title = document.getElementById('postTitle').value;
            let content = quill.root.innerHTML;
            const btn = document.getElementById('pubBtn');

            if(!token || !title) return alert("Wajib Token & Judul!");
            btn.innerHTML = '<span class="animate-spin mr-3">⌛</span> Memproses Konten...'; btn.disabled = true;

            content = await processImages(content, token);

            const slug = title.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
            const filePath = isEditMode ? currentPath : `artikel/${slug}.html`;
            const publishTime = isEditMode && originalTimestamp ? originalTimestamp : Date.now();

            const fullTemplate = `<!DOCTYPE html>

    <footer class=\"bg-[#050505] text-white mt-20 pt-20 pb-10 border-t border-zinc-900 w-full\"><div class=\"max-w-7xl mx-auto px-8\"><div class=\"grid grid-cols-1 md:grid-cols-3 gap-12 border-b border-zinc-900 pb-12 mb-8\"><div class=\"md:col-span-1 text-left\"><h2 class=\"text-2xl font-black uppercase mb-4 tracking-tighter text-white\">MUSIK<span class=\"text-red-600\">ANYWHERE</span></h2><p class=\"text-zinc-500 text-sm leading-relaxed mb-6\">Menyajikan informasi musik, ulasan rilisan terbaru, dan kumpulan lirik lagu.</p></div><div><h4 class=\"text-[10px] font-black uppercase tracking-[0.2em] text-zinc-600 mb-6\">Kategori</h4><ul class=\"space-y-3 text-sm font-bold text-zinc-400\"><li><a href=\"/index?kategori=Artikel\" class=\"hover:text-red-500 transition\">Artikel</a></li><li><a href=\"/index?kategori=News\" class=\"hover:text-red-500 transition\">News</a></li><li><a href=\"/index?kategori=Lirik Lagu\" class=\"hover:text-red-500 transition\">Lirik Lagu</a></li></ul></div><div><h4 class=\"text-[10px] font-black uppercase tracking-[0.2em] text-zinc-600 mb-6\">Perusahaan</h4><ul class=\"space-y-3 text-sm font-bold text-zinc-400 uppercase\"><li><a href=\"/about\" class=\"hover:text-red-500 transition\">About</a></li><li><a href=\"/contact\" class=\"hover:text-red-500 transition\">Contact</a></li><li><a href=\"/privacy\" class=\"hover:text-red-500 transition\">Privacy Policy</a></li></ul></div></div><p class=\"text-zinc-600 text-[10px] font-bold uppercase tracking-widest text-center\"> © 2026 Musik Anywhere Media.</p></div></footer>

    <script>
        let allArticles = [];
        function toggleMenu() { const m = document.getElementById('mobileMenu'); m.classList.toggle('hidden'); }
        function handleSearch(inputId, suggestionsId, listId) {
            const query = document.getElementById(inputId).value.toLowerCase().trim();
            const suggestions = document.getElementById(suggestionsId);
            if (query.length < 2) { suggestions.classList.remove('active'); return; }
            const filtered = allArticles.filter(art => art.title.toLowerCase().includes(query)).slice(0, 6);
            if (filtered.length > 0) {
                document.getElementById(listId).innerHTML = filtered.map(art => \`<a href=\"/artikel/\${art.name}\" class=\"block px-5 py-4 hover:bg-zinc-800 border-b border-zinc-800 uppercase font-bold text-xs text-white\">\${art.title}</a>\`).join('');
                suggestions.classList.add('active');
            } else { suggestions.classList.remove('active'); }
        }
        function closeSearch() { document.querySelectorAll('[id$=\"Suggestions\"]').forEach(s => s.classList.remove('active')); }
        async function initPage() { 
            try { 
                const res = await fetch('https://api.github.com/repos/pembri/musikanywhere.online/contents/artikel'); 
                const data = await res.json(); 
                const htmlFiles = data.filter(f => f.name.endsWith('.html')).reverse();
                const container = document.getElementById('rec-container');
                const currentFile = window.location.pathname.split('/').pop();
                let loaded = [];
                for(let file of htmlFiles) {
                    try {
                        const r = await fetch('/artikel/' + file.name);
                        const t = await r.text();
                        const doc = new DOMParser().parseFromString(t, 'text/html');
                        const title = doc.querySelector('h1')?.innerText || file.name;
                        let thumb = '/android-icon-192x192.png';
                        const firstImg = doc.querySelector('.prose img') || doc.querySelector('img');
                        if(firstImg) thumb = firstImg.getAttribute('src');
                        const artData = { name: file.name.replace('.html',''), title: title, thumb: thumb };
                        loaded.push(artData);
                        if (file.name !== currentFile && container.children.length < 3) {
                            container.innerHTML += \`<a href=\"/artikel/\${artData.name}\" class=\"group flex flex-col bg-zinc-900 rounded-2xl border border-zinc-800 hover:border-zinc-700 transition overflow-hidden\">
                                <div class=\"aspect-[16/10] bg-zinc-950 relative overflow-hidden\"><img src=\"\${thumb}\" class=\"absolute inset-0 w-full h-full object-contain p-2 opacity-80 group-hover:scale-110 group-hover:opacity-100 transition duration-700\"></div>
                                <div class=\"p-4\"><h4 class=\"text-white font-black uppercase text-sm leading-tight tracking-tight group-hover:text-red-500 transition line-clamp-2\">\${title}</h4></div>
                            </a>\`;
                        }
                    } catch(e){}
                }
                allArticles = loaded;
            } catch(e) {} 
        } 
        window.onload = initPage;
    <\/script>
</body>
</html>`;

            const payload = { 
                message: isEditMode ? `Update: ${title}` : `Publish: ${title}`, 
                content: btoa(unescape(encodeURIComponent(fullTemplate))), 
                sha: isEditMode ? currentSha : undefined 
            };

            try {
                const response = await fetch(`https://api.github.com/repos/pembri/musikanywhere.online/contents/${filePath}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                if(response.ok) { 
                    localStorage.removeItem('musikanywhere_draft');
                    alert("ARTIKEL BERHASIL TERBIT!"); 
                    location.reload(); 
                }
                else { alert("Gagal. Cek Token Github."); }
            } catch (e) { alert("Error"); }
            btn.innerText = "Terbitkan ke Server"; btn.disabled = false;
        }

        async function loadArticleList() {
            const token = document.getElementById('ghToken').value;
            const listDiv = document.getElementById('articleList');
            if(!token) return alert("Wajib Token!");
            listDiv.innerHTML = '<div class="md:col-span-2 py-10"><div class="animate-spin w-8 h-8 border-4 border-red-600 border-t-transparent rounded-full mx-auto"></div></div>';
            try {
                const res = await fetch('https://api.github.com/repos/pembri/musikanywhere.online/contents/artikel', { headers: { 'Authorization': `token ${token}` } });
                const files = await res.json();
                listDiv.innerHTML = '';
                for (let file of files.filter(f => f.name.endsWith('.html')).reverse()) {
                    let cleanTitle = file.name;
                    try {
                        const r = await fetch('/artikel/' + file.name);
                        const t = await r.text();
                        const doc = new DOMParser().parseFromString(t, 'text/html');
                        cleanTitle = doc.querySelector('h1')?.innerText || file.name;
                    } catch(e){}
                    listDiv.innerHTML += `
                        <div class="bg-zinc-900 border border-zinc-800 p-6 rounded-3xl flex flex-col md:flex-row justify-between items-center gap-4 group hover:border-red-600 transition">
                            <div class="text-left flex-1"><h3 class="font-black text-sm text-white uppercase line-clamp-1">${cleanTitle}</h3><p class="text-[9px] text-zinc-500 font-mono mt-1">${file.name}</p></div>
                            <div class="flex gap-2">
                                <button onclick="editArticle('${file.path}', '${file.sha}')" class="bg-zinc-800 text-white text-[10px] font-black px-5 py-2 rounded-xl hover:bg-blue-600 transition">EDIT</button>
                                <button onclick="deleteArticle('${file.path}', '${file.sha}')" class="bg-zinc-800 text-red-500 text-[10px] font-black px-5 py-2 rounded-xl hover:bg-red-600 hover:text-white transition">HAPUS</button>
                            </div>
                        </div>`;
                }
            } catch (e) { alert("Gagal!"); }
        }

        async function editArticle(path, sha) {
            const token = document.getElementById('ghToken').value;
            const btn = document.getElementById('pubBtn');
            try {
                const res = await fetch(`https://api.github.com/repos/pembri/musikanywhere.online/contents/${path}`, { headers: { 'Authorization': `token ${token}` } });
                const data = await res.json();
                const html = decodeURIComponent(escape(atob(data.content)));
                const doc = new DOMParser().parseFromString(html, 'text/html');
                document.getElementById('postTitle').value = doc.querySelector('h1')?.innerText || "";
                quill.root.innerHTML = doc.querySelector('.prose')?.innerHTML || "";
                const catMeta = doc.querySelector('meta[name="category"]');
                const dateMeta = doc.querySelector('meta[name="publish-date"]');
                if(catMeta) document.getElementById('postCategory').value = catMeta.getAttribute('content');
                if(dateMeta) originalTimestamp = parseInt(dateMeta.getAttribute('content'));
                isEditMode = true; currentSha = sha; currentPath = path;
                btn.innerText = "SIMPAN PERUBAHAN ARTIKEL";
                btn.classList.replace('bg-red-600', 'bg-blue-600');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                alert("Mode Edit Aktif!");
            } catch (e) { alert("Gagal!"); }
        }

        async function deleteArticle(path, sha) {
            if(!confirm("Hapus?")) return;
            const token = document.getElementById('ghToken').value;
            try {
                const res = await fetch(`https://api.github.com/repos/pembri/musikanywhere.online/contents/${path}`, {
                    method: 'DELETE', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: `Hapus: ${path}`, sha: sha })
                });
                if(res.ok) { alert("Dihapus!"); loadArticleList(); }
            } catch (e) { alert("Gagal!"); }
        }
    </script>
</body>
