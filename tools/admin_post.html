<html lang="id">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
<script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>

<style>
@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap');

body{
font-family:'Plus Jakarta Sans',sans-serif;
background:#050505;
color:#fff;
}

.ql-toolbar.ql-snow{
background:#18181b;
border:1px solid #27272a;
border-radius:1rem 1rem 0 0;
border-bottom:none;
}

.ql-container.ql-snow{
border:none!important;
}

.ql-editor{
background:#0a0a0a;
color:#e4e4e7;
min-height:520px;
font-size:1.08rem;
border:1px solid #27272a;
border-radius:0 0 1rem 1rem;
resize:vertical;
overflow:auto;
}

.ql-editor img{
border-radius:1rem;
margin:1rem 0;
max-width:100%;
}

.ql-toolbar button{
filter:invert(1);
}

.fullscreen-editor{
position:fixed!important;
inset:0!important;
z-index:9999!important;
padding:20px!important;
background:#050505!important;
overflow:auto!important;
}

.fullscreen-editor #editor{
height:calc(100vh - 180px);
}

.helper-box{
background:#111;
border:1px solid #27272a;
border-radius:1rem;

</head>

<body class="py-10 md:py-20">

<div class="max-w-6xl mx-auto px-6" id="adminWrap">

<header class="mb-12 flex flex-col md:flex-row md:justify-between md:items-end gap-6 border-b border-zinc-800 pb-8">

<div>
<h1 class="text-4xl md:text-5xl font-black uppercase tracking-tighter text-white">
ADMIN<span class="text-red-600">PANEL</span>
</h1>
</div>

<a href="/"
class="bg-zinc-900 px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-zinc-800 transition border border-zinc-800 w-max">
Ke Beranda
</a>

</header>

<div class="space-y-8 bg-[#0a0a0a] p-6 md:p-10 rounded-[2rem] border border-zinc-800 shadow-2xl">

<div class="grid grid-cols-1 md:grid-cols-3 gap-6">

<div class="space-y-3">
<label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">
Token Github
</label>

<input
type="password"
id="ghToken"
placeholder="ghp_xxxx"
class="w-full bg-[#111] border border-zinc-800 p-4 rounded-xl outline-none text-sm focus:border-red-600 text-white">
</div>

<div class="space-y-3">
<label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">
Pilih Kategori
</label>

<select
id="postCategory"
class="w-full bg-[#111] border border-zinc-800 p-4 rounded-xl outline-none text-white font-bold focus:border-red-600">

<option value="Artikel">Artikel</option>
<option value="News">News</option>
<option value="Lirik Lagu">Lirik Lagu</option>

</select>
</div>

<div class="space-y-3">
<label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">
Judul Artikel
</label>

<input
type="text"
id="postTitle"
placeholder="Ketik Judul..."
class="w-full bg-[#111] border border-zinc-800 p-4 rounded-xl outline-none font-bold text-white focus:border-red-600">
</div>

</div>

<div class="grid grid-cols-1 md:grid-cols-3 gap-4">

<button
onclick="toggleFullscreen()"
class="bg-zinc-900 border border-zinc-800 py-3 rounded-xl text-xs font-black uppercase hover:bg-zinc-800">
Fullscreen Editor
</button>

<button
onclick="insertYoutubePrompt()"
class="bg-zinc-900 border border-zinc-800 py-3 rounded-xl text-xs font-black uppercase hover:bg-zinc-800">
Embed YouTube
</button>

<button
onclick="previewHTML()"
class="bg-zinc-900 border border-zinc-800 py-3 rounded-xl text-xs font-black uppercase hover:bg-zinc-800">
Preview Artikel
</button>

</div>

<div class="space-y-3">

<label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">
Isi Konten
</label>

<div id="editor"></div>

</div>

<div class="helper-box">
Tips:
Paste URL YouTube lalu klik tombol Embed YouTube.
Editor bisa diperbesar manual dari sudut bawah kanan.
</div>

<button
onclick="handlePublish()"
id="pubBtn"
class="w-full bg-red-600 text-white py-5 rounded-xl font-black text-xl uppercase tracking-widest hover:bg-red-700 transition-all">
Publikasikan Artikel
</button>

</div>

<div class="mt-20 pt-10 border-t border-zinc-800">

<div class="flex flex-col md:flex-row justify-between md:items-center gap-4 mb-8">

<h2 class="text-2xl font-black uppercase tracking-tighter">
Database <span class="text-red-600">Artikel</span>
</h2>

<button
onclick="loadArticleList()"
class="text-[10px] font-bold uppercase tracking-widest bg-zinc-800 px-6 py-3 rounded-xl hover:bg-zinc-700 transition">
Tarik Data Server
</button>

</div>

<div id="articleList" class="grid grid-cols-1 gap-4">

<div class="bg-[#111] border border-zinc-800 p-8 rounded-2xl text-center text-zinc-500 text-sm italic">
Masukkan Token Github di atas lalu klik "Tarik Data Server".
</div>

</div>

</div>
</div>

<script>
let isEditMode = false;
let currentSha = null;
let currentPath = null;
let originalTimestamp = null;

/* ======================
   QUILL FULL TOOLBAR
====================== */
var quill = new Quill('#editor',{
theme:'snow',
modules:{
toolbar:[
[{header:[1,2,3,false]}],
[{font:[]}],
[{size:['small',false,'large','huge']}],
['bold','italic','underline','strike'],
[{color:[]},{background:[]}],
[{align:[]}],
[{list:'ordered'},{list:'bullet'}],
['blockquote','code-block'],
['link','image','video'],
['clean']
]
}
});

/* upload image local preview */
quill.getModule('toolbar').addHandler('image', function(){

const input = document.createElement('input');
input.type='file';
input.accept='image/*';
input.click();

input.onchange = ()=>{

const file = input.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = e => {
const range = quill.getSelection(true);
quill.insertEmbed(range.index,'image',e.target.result);
};

reader.readAsDataURL(file);

};

});

/* paste youtube auto detect */
quill.root.addEventListener('paste', function(e){

const text = (e.clipboardData || window.clipboardData).getData('text');

if(text.includes('youtube.com') || text.includes('youtu.be')){
setTimeout(()=>{
autoEmbedYoutube(text);
},100);
}

});
/* ======================
   FULLSCREEN
====================== */
function toggleFullscreen(){

const wrap = document.getElementById('adminWrap');

wrap.classList.toggle('fullscreen-editor');

}

/* ======================
   YOUTUBE EMBED
====================== */
function insertYoutubePrompt(){

const url = prompt("Tempel URL YouTube:");

if(url){
autoEmbedYoutube(url);
}

}

function autoEmbedYoutube(url){

let id = '';

if(url.includes('youtu.be/')){
id = url.split('youtu.be/')[1].split('?')[0];
}

if(url.includes('watch?v=')){
id = url.split('watch?v=')[1].split('&')[0];
}

if(!id) return;

const range = quill.getSelection(true);

quill.insertEmbed(
range.index,
'video',
'https://www.youtube.com/embed/' + id
);

quill.insertText(range.index + 1, '\n');

}

/* ======================
   PREVIEW
====================== */
function previewHTML(){

const html = quill.root.innerHTML;

const w = window.open('', '_blank');

w.document.write(`
<html>
<head>
<title>Preview</title>
<style>
body{
font-family:Arial,sans-serif;
max-width:900px;
margin:auto;
padding:30px;
line-height:1.7;
}
img{
max-width:100%;
border-radius:14px;
}
iframe{
width:100%;
height:420px;
border:none;
border-radius:14px;
}
</style>
</head>
<body>
<h1>${document.getElementById('postTitle').value || 'Preview Artikel'}</h1>
${html}
</body>
</html>
`);

}

/* ======================
   HELPERS
====================== */
function getIndoDate(){

const d = new Date();

const month = [
"Januari","Februari","Maret","April","Mei","Juni",
"Juli","Agustus","September","Oktober","November","Desember"
];

return d.getDate() + ' ' + month[d.getMonth()] + ' ' + d.getFullYear();

}

function slugify(text){

return text
.toLowerCase()
.trim()
.replace(/\s+/g,'-')
.replace(/[^\w\-]+/g,'');

}

/* ======================
   PUBLISH
====================== */
async function handlePublish(){

const token = document.getElementById('ghToken').value.trim();
const category = document.getElementById('postCategory').value;
const title = document.getElementById('postTitle').value.trim();
const content = quill.root.innerHTML;
const btn = document.getElementById('pubBtn');

if(!token || !title){
alert("Token Github dan Judul wajib diisi!");
return;
}

btn.innerText = "PROSES UPLOAD...";
btn.disabled = true;

const slug = slugify(title);

const filePath = isEditMode
? currentPath
: 'artikel/' + slug + '.html';

const publishTime = isEditMode && originalTimestamp
? originalTimestamp
: Date.now();

const fullTemplate = `<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="category" content="${category}">
<meta name="publish-date" content="${publishTime}">
<title>${title} - Musik Anywhere</title>

<meta property="og:title" content="${title}">
<meta property="og:type" content="article">
<meta property="og:url" content="https://musikanywhere.online/${filePath}">

</head>
<body style="font-family:Arial,sans-serif;max-width:900px;margin:auto;padding:20px;background:#fff;color:#111;line-height:1.8;">

<h1>${title}</h1>
<p><b>Kategori:</b> ${category}</p>
<p><b>Tanggal:</b> ${getIndoDate()}</p>
<hr>

${content}

</body>
</html>`;

const payload = {
message: isEditMode ? 'Update: ' + title : 'Publish: ' + title,
content: btoa(unescape(encodeURIComponent(fullTemplate)))
};

if(isEditMode){
payload.sha = currentSha;
}

try{

const res = await fetch(
'https://api.github.com/repos/pembri/musikanywhere.online/contents/' + filePath,
{
method:'PUT',
headers:{
'Authorization':'token ' + token,
'Content-Type':'application/json'
},
body:JSON.stringify(payload)
}
);

if(res.ok){
alert(isEditMode ? 'ARTIKEL BERHASIL DIUPDATE!' : 'ARTIKEL BERHASIL DIPUBLIKASI!');
location.reload();
}else{
alert('Gagal upload. Token salah / akses ditolak.');
}

}catch(e){
alert('Error: ' + e.message);
}

btn.innerText = "Publikasikan Artikel";
btn.disabled = false;

}

/* ======================
   LOAD LIST
====================== */
async function loadArticleList(){

const token = document.getElementById('ghToken').value.trim();
const list = document.getElementById('articleList');

if(!token){
alert("Masukkan token Github dahulu.");
return;
}

list.innerHTML =
'<div class="text-center text-zinc-500 py-8">Memuat data server...</div>';

try{

const res = await fetch(
'https://api.github.com/repos/pembri/musikanywhere.online/contents/artikel',
{
headers:{'Authorization':'token ' + token}
}
);

const files = await res.json();

const articles = files.filter(x=>x.name.endsWith('.html'));

list.innerHTML = '';

articles.reverse().forEach(file=>{

const clean = file.name
.replace(/-/g,' ')
.replace('.html','')
.toUpperCase();

list.innerHTML += `
<div class="bg-[#111] border border-zinc-800 p-5 rounded-2xl flex flex-col md:flex-row md:justify-between md:items-center gap-4">

<div>
<h3 class="font-black text-sm md:text-base tracking-tight text-white">
${clean}
</h3>
<p class="text-[10px] text-zinc-500 font-mono mt-1">
${file.name}
</p>
</div>

<div class="flex gap-2">

<button
onclick="editArticle('${file.path}','${file.sha}')"
class="bg-zinc-800 text-white text-[10px] font-black px-4 py-2 rounded-lg hover:bg-blue-600 transition uppercase">
Edit
</button>

<button
onclick="deleteArticle('${file.path}','${file.sha}')"
class="bg-zinc-800 text-red-500 text-[10px] font-black px-4 py-2 rounded-lg hover:bg-red-600 hover:text-white transition uppercase">
Hapus
</button>

</div>
</div>
`;

});

}catch(e){

list.innerHTML =
'<div class="text-center text-red-500 py-8">Gagal memuat data.</div>';

}

}

/* ======================
   EDIT
====================== */
async function editArticle(path,sha){

const token = document.getElementById('ghToken').value.trim();

try{

const res = await fetch(
'https://api.github.com/repos/pembri/musikanywhere.online/contents/' + path,
{
headers:{'Authorization':'token ' + token}
}
);

const data = await res.json();

const html = decodeURIComponent(escape(atob(data.content)));

const parser = new DOMParser();
const doc = parser.parseFromString(html,'text/html');

document.getElementById('postTitle').value =
doc.querySelector('h1')?.innerText || '';

quill.root.innerHTML =
doc.body.innerHTML;

isEditMode = true;
currentSha = sha;
currentPath = path;

alert("Mode Edit Aktif!");

window.scrollTo({top:0,behavior:'smooth'});

}catch(e){
alert("Gagal ambil artikel.");
}

}

/* ======================
   DELETE
====================== */
async function deleteArticle(path,sha){

if(!confirm("Hapus artikel permanen?")) return;

const token = document.getElementById('ghToken').value.trim();

try{

const res = await fetch(
'https://api.github.com/repos/pembri/musikanywhere.online/contents/' + path,
{
method:'DELETE',
headers:{
'Authorization':'token ' + token,
'Content-Type':'application/json'
},
body:JSON.stringify({
message:'Delete ' + path,
sha:sha
})
}
);

if(res.ok){
alert("Artikel dihapus.");
loadArticleList();
}

}catch(e){
alert("Gagal hapus.");
}

}
</script>

</body>
</html>
