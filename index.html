<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="msapplication-TileImage" content="/ms-icon-144x144.png" />
    <meta name="theme-color" content="#ffffff"/>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Nada - Media Informasi Seputar Musik</title>
    
    <meta name="description" content="Portal Nada menyajikan berita musik terbaru, review album, dan jadwal konser secara mendalam dan terpercaya.">
    <meta name="keywords" content="musik, berita musik, konser, review album, portal nada">
    <meta property="og:site_name" content="Portal Nada">
    <meta property="og:title" content="Portal Nada - Media Musik Terkini">
    <meta property="og:description" content="Update dunia musik global dan lokal setiap hari.">
    <meta property="og:url" content="https://pembri.github.io">
    <meta property="og:type" content="website">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Portal Nada",
      "url": "https://pembri.github.io"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NewsMediaOrganization",
      "name": "Portal Nada",
      "url": "https://pembri.github.io",
      "logo": "https://pembri.github.io/android-icon-192x192.png",
      "description": "Media berita musik independen paling akurat dan terpercaya untuk audiens Indonesia."
    }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; scroll-behavior: smooth; }
        .hero-overlay { background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); }
        .nav-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .trending-number { -webkit-text-stroke: 1px #3f3f46; color: transparent; min-width: 50px; }
        .group:hover .trending-number { -webkit-text-stroke: 1px #ef4444; }
        
        /* Slider Styling */
        .pop-slider { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; }
        .pop-slider::-webkit-scrollbar { display: none; }
        .slide-item { flex: 0 0 100%; scroll-snap-align: start; }
    </style>
</head>
<body class="text-zinc-900">

    <header class="nav-glass sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
            <a href="/" class="text-2xl font-black tracking-tighter uppercase flex items-center">
                PORTAL<span class="text-red-600">NADA</span>
            </a>
            <div class="flex-1 max-w-sm ml-4 md:ml-10 relative group">
                <input type="text" id="searchInput" onkeyup="searchGlobal()" placeholder="Cari musik..." class="w-full bg-zinc-100 border-none rounded-xl py-2.5 px-5 text-sm focus:ring-2 focus:ring-red-600 transition-all outline-none">
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-8 py-8">
        <section id="hero-section" class="mb-16">
            <div id="hero-loader" class="h-[400px] md:h-[500px] bg-zinc-200 animate-pulse rounded-[2.5rem]"></div>
            <div id="hero-content" class="hidden"></div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <div class="lg:col-span-8">
                <h2 class="text-2xl font-black uppercase tracking-tight flex items-center gap-3 mb-10">
                    <span class="w-1.5 h-7 bg-red-600"></span>
                    Artikel Terbaru
                </h2>
                <div id="post-grid" class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-12"></div>
                <div id="empty-state" class="hidden py-20 text-center text-zinc-400 italic">Belum ada konten publikasi.</div>
            </div>

            <aside class="lg:col-span-4">
                <div class="bg-zinc-950 p-8 rounded-[2.5rem] text-white shadow-2xl sticky top-28">
                    <div class="flex justify-between items-center mb-8 border-b border-zinc-800 pb-4">
                        <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-red-600">Terpopuler</h3>
                        <div class="flex gap-2">
                            <button onclick="prevSlide()" class="w-6 h-6 rounded-full bg-zinc-800 flex items-center justify-center text-xs hover:bg-red-600 transition">←</button>
                            <button onclick="nextSlide()" class="w-6 h-6 rounded-full bg-zinc-800 flex items-center justify-center text-xs hover:bg-red-600 transition">→</button>
                        </div>
                    </div>
                    
                    <div id="sidebar-trending" class="pop-slider">
                        <p class="text-zinc-600 text-xs italic">Memuat berita populer...</p>
                    </div>
                </div>
            </aside>
        </div>

        <section class="mt-24 border-t border-zinc-100 pt-16">
            <h2 class="text-xl font-black uppercase mb-10 tracking-widest flex items-center gap-3">
                 <span class="w-1.5 h-6 bg-zinc-900"></span>
                 Pilihan Redaksi
            </h2>
            <div id="bottom-recs" class="grid grid-cols-2 md:grid-cols-4 gap-8"></div>
        </section>
    </main>

    <footer class="bg-zinc-950 text-white mt-32 pt-20 pb-10">
        <div class="max-w-7xl mx-auto px-8">
            <div class="flex flex-col items-center text-center border-b border-zinc-800 pb-12 mb-8">
                <div>
                    <h2 class="text-2xl font-black uppercase mb-4 tracking-tighter">Portal<span class="text-red-600">Nada</span></h2>
                    <p class="text-zinc-500 text-sm max-w-sm leading-relaxed mx-auto"> Media berita musik independen paling akurat dan terpercaya untuk audiens Indonesia. </p>
                </div>
                <div class="flex gap-8 text-[11px] font-black uppercase tracking-[0.2em] mt-8">
                    <a href="/about" class="hover:text-red-600 transition">About</a>
                    <a href="/contact" class="hover:text-red-600 transition">Contact</a>
                </div>
            </div>
            <div class="flex justify-center items-center">
                <p class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest text-center"> © 2026 Portal Nada Media </p>
            </div>
        </div>
    </footer>

    <script>
        let slideIndex = 0;

        async function initPortal() {
            try {
                const res = await fetch('https://api.github.com/repos/pembri/pembri.github.io/contents/artikel');
                const data = await res.json();
                
                if(!data || data.length === 0 || data.message === "Not Found") {
                    document.getElementById('hero-loader').style.display = 'none';
                    document.getElementById('empty-state').classList.remove('hidden');
                    return;
                }

                const articles = data.filter(f => f.name.endsWith('.html')).reverse();
                
                // 1. Render Hero (Artikel Paling Baru)
                if(articles.length > 0) renderHero(articles[0]);

                // 2. Artikel Terbaru (Urutan 2-7)
                if(articles.length > 1) renderGrid(articles.slice(1, 7));

                // 3. Terpopuler (Slider - Urutan Acak dari semua artikel)
                const popular = [...articles].sort(() => 0.5 - Math.random()).slice(0, 5);
                renderTrending(popular);

                // 4. Pilihan Redaksi (Acak 4 artikel)
                const editorChoice = [...articles].sort(() => 0.5 - Math.random()).slice(0, 4);
                renderBottom(editorChoice);

                document.getElementById('hero-loader').style.display = 'none';
                document.getElementById('hero-content').classList.remove('hidden');
            } catch (err) { console.error("Gagal load data", err); }
        }

        async function fetchImage(path) {
            try {
                const res = await fetch(`artikel/${path}`);
                const html = await res.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const img = doc.querySelector('article img') || doc.querySelector('img');
                return img ? img.src : 'https://images.unsplash.com/photo-1514525253344-8846bbd97d6c?q=80&w=800';
            } catch (e) { return 'https://images.unsplash.com/photo-1514525253344-8846bbd97d6c?q=80&w=800'; }
        }

        async function renderHero(art) {
            const img = await fetchImage(art.name);
            const title = art.name.replace(/-/g, ' ').replace('.html', '');
            document.getElementById('hero-content').innerHTML = `
                <a href="artikel/${art.name}" class="group relative block h-[400px] md:h-[500px] rounded-[2.5rem] overflow-hidden bg-zinc-900">
                    <img src="${img}" class="absolute inset-0 w-full h-full object-cover opacity-70 group-hover:scale-105 transition duration-1000">
                    <div class="absolute inset-0 hero-overlay"></div>
                    <div class="absolute bottom-0 p-8 md:p-12 w-full">
                        <span class="bg-red-600 text-white px-3 py-1 rounded text-[9px] font-black uppercase tracking-widest mb-4 inline-block shadow-xl">Sorotan Utama</span>
                        <h1 class="text-3xl md:text-5xl font-black text-white leading-[1.1] uppercase group-hover:text-red-500 transition">${title}</h1>
                    </div>
                </a>
            `;
        }

        async function renderGrid(items) {
            const grid = document.getElementById('post-grid');
            for(let item of items) {
                const img = await fetchImage(item.name);
                const title = item.name.replace(/-/g, ' ').replace('.html', '');
                grid.innerHTML += `
                    <article class="group animate-fade-in">
                        <a href="artikel/${item.name}">
                            <div class="aspect-[16/10] bg-zinc-100 rounded-[2rem] mb-6 overflow-hidden">
                                <img src="${img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                            </div>
                            <h3 class="text-lg font-black uppercase leading-tight group-hover:text-red-600 transition">${title}</h3>
                            <div class="w-10 h-1 bg-red-600 mt-4 group-hover:w-20 transition-all"></div>
                        </a>
                    </article>
                `;
            }
        }

        function renderTrending(items) {
            const list = document.getElementById('sidebar-trending');
            list.innerHTML = '';
            items.forEach((item, i) => {
                const title = item.name.replace(/-/g, ' ').replace('.html', '');
                list.innerHTML += `
                    <div class="slide-item">
                        <a href="artikel/${item.name}" class="flex flex-col gap-4 group">
                            <span class="text-6xl font-black trending-number block">0${i+1}</span>
                            <p class="text-xl font-black uppercase leading-tight group-hover:text-red-500 transition">${title}</p>
                            <p class="text-[10px] text-zinc-500 font-bold uppercase tracking-widest mt-2 italic">Trending di Portal Nada</p>
                        </a>
                    </div>
                `;
            });
        }

        async function renderBottom(items) {
            const container = document.getElementById('bottom-recs');
            for(let item of items) {
                const img = await fetchImage(item.name);
                const title = item.name.replace(/-/g, ' ').replace('.html', '');
                container.innerHTML += `
                    <a href="artikel/${item.name}" class="group block">
                        <div class="aspect-square rounded-[2rem] overflow-hidden mb-4 shadow-lg border border-zinc-100">
                            <img src="${img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                        </div>
                        <h4 class="text-[11px] font-black uppercase leading-tight text-center px-2 group-hover:text-red-600 transition">${title}</h4>
                    </a>
                `;
            }
        }

        // SLIDER FUNCTIONS
        function nextSlide() {
            const slider = document.getElementById('sidebar-trending');
            const slides = slider.querySelectorAll('.slide-item');
            slideIndex = (slideIndex + 1) % slides.length;
            slider.scrollTo({ left: slider.clientWidth * slideIndex, behavior: 'smooth' });
        }

        function prevSlide() {
            const slider = document.getElementById('sidebar-trending');
            const slides = slider.querySelectorAll('.slide-item');
            slideIndex = (slideIndex - 1 + slides.length) % slides.length;
            slider.scrollTo({ left: slider.clientWidth * slideIndex, behavior: 'smooth' });
        }

        // Search Functionality
        function searchGlobal() {
            let filter = document.getElementById('searchInput').value.toUpperCase();
            let items = document.querySelectorAll('#post-grid article, #bottom-recs a');
            items.forEach(item => {
                let text = item.innerText || item.textContent;
                item.style.display = text.toUpperCase().indexOf(filter) > -1 ? "" : "none";
            });
        }

        window.onload = initPortal;
    </script>
</body>
</html>
