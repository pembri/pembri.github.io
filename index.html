<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="msapplication-TileImage" content="/ms-icon-144x144.png" />
    <meta name="theme-color" content="#ffffff"/>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Nada - Media Informasi Seputar Musik</title>
    
    <meta name="description" content="Portal Nada menyajikan berita musik terbaru, review album, dan jadwal konser secara mendalam dan terpercaya.">
    <meta name="keywords" content="musik, berita musik, konser, review album, portal nada">
    <meta property="og:site_name" content="Portal Nada">
    <meta property="og:title" content="Portal Nada - Media Musik Terkini">
    <meta property="og:description" content="Update dunia musik global dan lokal setiap hari.">
    <meta property="og:url" content="https://pembri.github.io">
    <meta property="og:type" content="website">

    <script type="application/ld+json">
        {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Portal Nada",
      "url": "https://pembri.github.io"
       }
    },
      "@context": "https://schema.org",
      "@type": "NewsMediaOrganization",
      "name": "Portal Nada",
      "url": "https://pembri.github.io",
      "logo": "https://pembri.github.io/android-icon-192x192.png",
      "sameAs": [],
      "description": "Media berita musik independen paling akurat dan terpercaya untuk audiens Indonesia.",
      "contactPoint": {
        "@type": "ContactPoint",
        "email": "admin@pembri.github.io",
        "contactType": "customer service"
      }
    }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; }
        .hero-overlay { background: linear-gradient(0deg, rgba(0,0,0,0.95) 10%, rgba(0,0,0,0) 100%); }
        .article-card:hover img { transform: scale(1.05); }
        .nav-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
    </style>
</head>
<body class="text-zinc-900">

    <header class="nav-glass sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center">
                <a href="/" class="text-2xl font-black tracking-tighter uppercase flex items-center">
                    PORTAL<span class="text-red-600">NADA</span>
                </a>
            </div>

            <div class="flex-1 max-w-sm ml-4 md:ml-10">
                <div class="relative group">
                    <input type="text" id="searchInput" onkeyup="searchGlobal()" placeholder="Cari musik..." class="w-full bg-zinc-100 border-none rounded-xl py-2.5 px-5 text-sm focus:ring-2 focus:ring-red-600 transition-all outline-none">
                    <div class="absolute right-4 top-2.5 text-zinc-400 group-hover:text-red-600 transition">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-8 py-8">
        <section id="hero-section" class="mb-16">
            <div id="hero-loader" class="h-[500px] bg-zinc-200 animate-pulse rounded-[2.5rem]"></div>
            <div id="hero-content" class="hidden"></div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <div class="lg:col-span-8">
                <div class="flex items-center justify-between mb-10">
                    <h2 class="text-2xl font-black uppercase tracking-tight flex items-center gap-3">
                        <span class="w-2 h-8 bg-red-600 rounded-full"></span>
                        Artikel Terbaru
                    </h2>
                </div>
                
                <div id="post-grid" class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-12"></div>
                
                <div id="empty-state" class="hidden py-20 text-center">
                    <p class="text-zinc-400 italic">Belum ada konten publikasi.</p>
                </div>
            </div>

            <aside class="lg:col-span-4 space-y-10">
                <div class="bg-zinc-950 p-8 rounded-[2rem] text-white">
                    <h3 class="text-xs font-black uppercase tracking-[0.3em] text-red-600 mb-8 border-b border-zinc-800 pb-4">Terpopuler</h3>
                    <div id="sidebar-trending" class="space-y-8"></div>
                </div>
            </aside>
        </div>

        <section class="mt-24 border-t border-zinc-100 pt-16">
            <h2 class="text-xl font-black uppercase mb-10 tracking-widest">Pilihan Redaksi</h2>
            <div id="bottom-recs" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </section>
    </main>

    <footer class="bg-zinc-950 text-white mt-32 py-20">
        <div class="max-w-7xl mx-auto px-8 grid grid-cols-1 md:grid-cols-3 gap-12 border-b border-zinc-800 pb-16">
            <div>
                <h2 class="text-xl font-black uppercase mb-6">Portal<span class="text-red-600">Nada</span></h2>
                <p class="text-zinc-400 text-sm leading-relaxed">Media berita musik independen paling akurat dan terpercaya untuk audiens Indonesia.</p>
            </div>
            <div class="flex flex-col gap-4 text-sm font-bold uppercase tracking-widest">
                <a href="/about" class="hover:text-red-600 transition">About</a>
                <a href="/contact" class="hover:text-red-600 transition">Contact</a>
            </div>
            <div class="text-sm text-zinc-500">
                &copy; 2026 Portal Nada Media - pembri.github.io
            </div>
        </div>
    </footer>

    <script>
        // Penghilang akhiran .html pada URL browser
        if (window.location.pathname.endsWith(".html")) {
            const cleanUrl = window.location.pathname.replace(".html", "");
            window.history.replaceState(null, "", cleanUrl);
        }

        async function initPortal() {
            try {
                const res = await fetch('https://api.github.com/repos/pembri/pembri.github.io/contents/artikel');
                const data = await res.json();
                
                if(!data || data.length === 0 || data.message === "Not Found") {
                    document.getElementById('hero-loader').style.display = 'none';
                    document.getElementById('empty-state').classList.remove('hidden');
                    return;
                }

                const articles = data.filter(f => f.name.endsWith('.html')).reverse();
                renderHero(articles[0]);
                renderGrid(articles.slice(1, 7));
                renderTrending(articles.slice(7, 11));
                renderBottom(articles.slice(11, 15));

                document.getElementById('hero-loader').style.display = 'none';
                document.getElementById('hero-content').classList.remove('hidden');
            } catch (err) { console.error("Gagal load data Github", err); }
        }

        async function fetchImageFromArticle(path) {
            try {
                const res = await fetch(`artikel/${path}`);
                const html = await res.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(html, 'text/html');
                const firstImg = doc.querySelector('img');
                return firstImg ? firstImg.src : 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?q=80&w=1000&auto=format&fit=crop';
            } catch (e) { return 'https://images.unsplash.com/photo-1511671782779-c97d3d27a1d4?q=80&w=1000&auto=format&fit=crop'; }
        }

        async function renderHero(art) {
            const img = await fetchImageFromArticle(art.name);
            const title = art.name.replace(/-/g, ' ').replace('.html', '');
            document.getElementById('hero-content').innerHTML = `
                <a href="artikel/${art.name}" class="group relative block h-[500px] rounded-[2.5rem] overflow-hidden bg-zinc-900">
                    <img src="${img}" class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:scale-105 transition duration-1000">
                    <div class="absolute inset-0 hero-overlay z-10"></div>
                    <div class="absolute bottom-0 p-10 z-20 w-full md:w-3/4">
                        <span class="bg-red-600 text-white px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em] mb-6 inline-block">Sorotan Utama</span>
                        <h1 class="text-4xl md:text-6xl font-black text-white leading-tight uppercase group-hover:text-red-500 transition duration-500">${title}</h1>
                    </div>
                </a>
            `;
        }

        async function renderGrid(items) {
            const grid = document.getElementById('post-grid');
            for(let item of items) {
                const img = await fetchImageFromArticle(item.name);
                const title = item.name.replace(/-/g, ' ').replace('.html', '');
                grid.innerHTML += `
                    <article class="group article-card">
                        <a href="artikel/${item.name}">
                            <div class="aspect-video bg-zinc-100 rounded-[1.5rem] mb-5 overflow-hidden shadow-sm">
                                <img src="${img}" class="w-full h-full object-cover transition duration-700">
                            </div>
                            <h3 class="text-xl font-bold uppercase leading-tight group-hover:text-red-600 transition">${title}</h3>
                            <p class="text-zinc-400 text-xs font-bold mt-3 uppercase tracking-widest">Baca Selengkapnya →</p>
                        </a>
                    </article>
                `;
            }
        }

        async function renderTrending(items) {
            const list = document.getElementById('sidebar-trending');
            items.forEach((item, i) => {
                const title = item.name.replace(/-/g, ' ').replace('.html', '');
                list.innerHTML += `
                    <a href="artikel/${item.name}" class="flex gap-5 group items-start">
                        <span class="text-3xl font-black text-zinc-800 group-hover:text-red-600 transition">0${i+1}</span>
                        <p class="text-sm font-bold uppercase leading-snug group-hover:text-zinc-300 transition">${title}</p>
                    </a>
                `;
            });
        }

        async function renderBottom(items) {
            const container = document.getElementById('bottom-recs');
            for(let item of items) {
                const img = await fetchImageFromArticle(item.name);
                const title = item.name.replace(/-/g, ' ').replace('.html', '');
                container.innerHTML += `
                    <a href="artikel/${item.name}" class="group">
                        <div class="aspect-square rounded-2xl overflow-hidden mb-3">
                            <img src="${img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                        </div>
                        <h4 class="text-xs font-bold uppercase leading-tight group-hover:text-red-600">${title}</h4>
                    </a>
                `;
            }
        }

        function searchGlobal() {
            let filter = document.getElementById('searchInput').value.toUpperCase();
            let cards = document.querySelectorAll('#post-grid article, #sidebar-trending a');
            cards.forEach(card => {
                let text = card.innerText || card.textContent;
                card.style.display = text.toUpperCase().indexOf(filter) > -1 ? "" : "none";
            });
        }

        window.onload = initPortal;
    </script>
</body>
</html>
