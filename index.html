<!DOCTYPE html>
<html lang="id">
<head>
    <script type="application/ld+json">{"@context": "https://schema.org", "@type": "WebSite", "name": "Musik Anywhere", "url": "https://musikanywhere.online"}</script>
    <script type="application/ld+json">{"@context": "https://schema.org", "@type": "NewsMediaOrganization", "name": "Musik Anywhere", "url": "https://musikanywhere.online", "logo": "https://musikanywhere.online/android-icon-192x192.png", "description": "Media informasi tentang musik untuk audiens Indonesia."}</script>
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="msapplication-TileColor" content="#111111" />
    <meta name="msapplication-TileImage" content="/ms-icon-144x144.png" />
    <meta name="theme-color" content="#111111"/>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musik Anywhere - Berita Musik & Lirik Lagu Terupdate</title>
    <meta name="description" content="Musik Anywhere menyajikan informasi musik terbaru, ulasan rilisan, News, dan lirik lagu favorit Anda.">
    <meta property="og:title" content="Musik Anywhere - Portal Musik Indonesia">
    <meta property="og:description" content="Update berita musik, info konser, dan lirik lagu terbaru setiap hari.">
    <meta property="og:image" content="https://musikanywhere.online/android-icon-192x192.png">
    <meta property="og:url" content="https://musikanywhere.online">
    <meta property="og:type" content="website">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #f4f4f5; }
        .nav-glass { background: rgba(5, 5, 5, 0.8); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .card-shadow { box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        #searchSuggestions, #mobileSearchSuggestions { display: none; }
        #searchSuggestions.active, #mobileSearchSuggestions.active { display: block; }
    </style>
</head>
<body onclick="closeSearch()">

    <header class="nav-glass sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
            <a href="/" class="text-xl md:text-2xl font-black tracking-tighter uppercase flex items-center gap-3 z-50">
                <img src="/favicon-192x192.png" alt="Logo" class="w-8 h-8 md:w-9 md:h-9 rounded-full object-cover border border-zinc-800">
                <span>MUSIK<span class="text-red-600">ANYWHERE</span></span>
            </a>
            <nav class="hidden lg:flex gap-8 items-center text-[11px] font-black uppercase tracking-[0.15em] text-zinc-400">
                <a href="/" class="hover:text-red-500 transition">Home</a>
                <a href="?kategori=Artikel" class="hover:text-red-500 transition">Artikel</a>
                <a href="?kategori=News" class="hover:text-red-500 transition">News</a>
                <a href="?kategori=Lirik Lagu" class="hover:text-red-500 transition">Lirik Lagu</a>
            </nav>
            <div class="flex items-center gap-4 z-50">
                <div class="relative group hidden lg:block" onclick="event.stopPropagation()">
                    <div class="flex items-center bg-zinc-900 rounded-full px-4 py-2 border border-zinc-800 focus-within:border-red-500 transition-all">
                        <svg class="w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" id="searchInput" oninput="handleSearch('searchInput', 'searchSuggestions', 'suggestionsList')" placeholder="Cari musik..." autocomplete="off" class="bg-transparent border-none outline-none text-xs ml-2 w-48">
                    </div>
                    <div id="searchSuggestions" class="absolute top-full right-0 mt-3 w-80 bg-zinc-900 rounded-2xl shadow-2xl border border-zinc-800 overflow-hidden"><div id="suggestionsList" class="max-h-[350px] overflow-y-auto"></div></div>
                </div>
                <button id="menuBtn" class="lg:hidden p-2 text-white focus:outline-none" onclick="toggleMenu()">
                    <svg id="icon-menu" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
                    <svg id="icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
                </button>
            </div>
        </div>
        <div id="mobileMenu" class="fixed inset-0 bg-[#050505] z-40 hidden flex-col pt-24 px-6 pb-8 h-screen overflow-y-auto">
            <div class="relative w-full mb-8 lg:hidden" onclick="event.stopPropagation()">
                <div class="flex items-center bg-zinc-900 rounded-full px-5 py-3 border border-zinc-800">
                    <svg class="w-5 h-5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    <input type="text" id="mobileSearchInput" oninput="handleSearch('mobileSearchInput', 'mobileSearchSuggestions', 'mobileSuggestionsList')" placeholder="Cari artikel..." autocomplete="off" class="bg-transparent border-none outline-none text-sm ml-3 w-full">
                </div>
                <div id="mobileSearchSuggestions" class="absolute top-full left-0 right-0 mt-2 bg-zinc-900 rounded-2xl shadow-xl border border-zinc-800 overflow-hidden"><div id="mobileSuggestionsList" class="max-h-[300px] overflow-y-auto"></div></div>
            </div>
            <nav class="flex flex-col gap-6 text-xl font-black uppercase tracking-tighter">
                <a href="/" class="text-white hover:text-red-600">Home</a>
                <a href="?kategori=Artikel" class="text-white hover:text-red-600">Artikel</a>
                <a href="?kategori=News" class="text-white hover:text-red-600">News</a>
                <a href="?kategori=Lirik Lagu" class="text-white hover:text-red-600">Lirik Lagu</a>
            </nav>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-8 py-10">
        <section id="featured-section" class="mb-20">
            <div class="flex items-end justify-between mb-8">
                <div>
                    <h2 class="text-xs font-black uppercase tracking-[0.4em] text-red-600 mb-2">Editor's Pick</h2>
                    <h3 class="text-3xl md:text-5xl font-black uppercase tracking-tighter">TER<span class="text-zinc-700">POPULER</span></h3>
                </div>
            </div>
            <div id="featured-container" class="grid grid-cols-1 lg:grid-cols-12 gap-6">
                </div>
        </section>

        <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4 mb-12">
            <div>
                <h2 id="currentCategory" class="text-4xl md:text-6xl font-black uppercase tracking-tighter leading-none mb-2">TERBARU</h2>
                <p class="text-zinc-500 text-[10px] md:text-xs font-bold uppercase tracking-[0.3em]">Update Harian Musik Anywhere</p>
            </div>
        </div>

        <div id="post-container" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-10">
            </div>

        <div class="mt-20 flex justify-center border-t border-zinc-900 pt-12">
            <div id="pagination" class="flex gap-3"></div>
        </div>
    </main>

    <footer class="bg-[#050505] text-white mt-20 pt-20 pb-10 border-t border-zinc-900">
        <div class="max-w-7xl mx-auto px-8">
            <p class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest text-center">© 2026 Musik Anywhere Media.</p>
        </div>
    </footer>

    <script>
        let allArticles = [];
        let itemsPerPage = 9;
        let currentPage = 1;

        async function initPortal() {
            try {
                const params = new URLSearchParams(window.location.search);
                const filterKategori = params.get('kategori');
                if(filterKategori) document.getElementById('currentCategory').innerText = filterKategori.toUpperCase();

                const response = await fetch('https://api.github.com/repos/pembri/musikanywhere.online/contents/artikel');
                const files = await response.json();
                const htmlFiles = files.filter(f => f.name.endsWith('.html')).reverse();
                
                let loadedData = [];
                for (let file of htmlFiles) {
                    try {
                        const r = await fetch('/artikel/' + file.name);
                        const t = await r.text();
                        const doc = new DOMParser().parseFromString(t, 'text/html');
                        
                        const title = doc.querySelector('h1')?.innerText || file.name.replace(/-/g, ' ').replace('.html', '');
                        const category = doc.querySelector('meta[name="category"]')?.getAttribute('content') || "Artikel";
                        const dateRaw = doc.querySelector('meta[name="publish-date"]')?.getAttribute('content');
                        
                        let thumb = "/android-icon-192x192.png";
                        const firstImg = doc.querySelector('.prose img');
                        if(firstImg) thumb = firstImg.getAttribute('src');

                        const articleData = {
                            name: file.name,
                            title: title,
                            category: category,
                            thumb: thumb,
                            date: dateRaw ? parseInt(dateRaw) : 0
                        };

                        if (!filterKategori || category.toLowerCase() === filterKategori.toLowerCase()) {
                            loadedData.push(articleData);
                        }
                    } catch (e) {}
                }

                allArticles = loadedData;
                
                // Tampilkan Featured (Hanya di Home/Tanpa Filter)
                if(!filterKategori) {
                    displayFeatured();
                } else {
                    document.getElementById('featured-section').style.display = 'none';
                }
                
                displayPosts();
            } catch (error) {
                console.log(error);
            }
        }

        function displayFeatured() {
            const container = document.getElementById('featured-container');
            const feat = allArticles.slice(0, 3);
            if(feat.length < 1) return;

            // Item Utama (Besar)
            let html = `
            <div class="lg:col-span-8 group cursor-pointer" onclick="window.location.href='/artikel/${feat[0].name.replace('.html','')}'">
                <div class="relative aspect-[16/9] overflow-hidden rounded-[2.5rem] bg-zinc-900 border border-zinc-800 shadow-2xl">
                    <img src="${feat[0].thumb}" class="w-full h-full object-cover opacity-60 group-hover:scale-105 group-hover:opacity-100 transition duration-1000">
                    <div class="absolute inset-0 bg-gradient-to-t from-[#050505] via-[#050505]/20 to-transparent"></div>
                    <div class="absolute bottom-0 left-0 p-8 md:p-12 w-full">
                        <span class="bg-red-600 text-white text-[10px] font-black px-4 py-1.5 rounded-md uppercase tracking-widest mb-6 inline-block">${feat[0].category}</span>
                        <h3 class="text-3xl md:text-5xl font-black uppercase tracking-tighter leading-[0.9] text-white line-clamp-2">${feat[0].title}</h3>
                    </div>
                </div>
            </div>
            <div class="lg:col-span-4 flex flex-col gap-6">`;

            // Item Samping
            feat.slice(1).forEach(post => {
                html += `
                <div class="flex-1 group cursor-pointer" onclick="window.location.href='/artikel/${post.name.replace('.html','')}'">
                    <div class="relative h-full min-h-[200px] overflow-hidden rounded-[2rem] bg-zinc-900 border border-zinc-800 shadow-xl">
                        <img src="${post.thumb}" class="w-full h-full object-cover opacity-40 group-hover:scale-110 group-hover:opacity-80 transition duration-700">
                        <div class="absolute inset-0 bg-gradient-to-t from-[#050505] to-transparent opacity-80"></div>
                        <div class="absolute bottom-0 left-0 p-6">
                            <span class="text-red-500 text-[9px] font-black uppercase tracking-widest mb-2 block">${post.category}</span>
                            <h4 class="text-lg font-black uppercase tracking-tighter leading-tight text-white line-clamp-2">${post.title}</h4>
                        </div>
                    </div>
                </div>`;
            });

            html += `</div>`;
            container.innerHTML = html;
        }

        function displayPosts() {
            const container = document.getElementById('post-container');
            container.innerHTML = '';
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const paginatedItems = allArticles.slice(start, end);

            paginatedItems.forEach(post => {
                container.innerHTML += `
                    <article class="group cursor-pointer" onclick="window.location.href='/artikel/${post.name.replace('.html','')}'">
                        <div class="relative aspect-[16/10] mb-6 overflow-hidden rounded-[2rem] bg-zinc-900 border border-zinc-800">
                            <img src="${post.thumb}" class="w-full h-full object-cover opacity-80 group-hover:scale-110 group-hover:opacity-100 transition duration-700">
                            <span class="absolute top-6 left-6 bg-red-600 text-white text-[9px] font-black px-3 py-1 rounded-md uppercase tracking-widest">${post.category}</span>
                        </div>
                        <h3 class="text-xl font-black uppercase tracking-tighter leading-tight group-hover:text-red-500 transition line-clamp-2">${post.title}</h3>
                    </article>`;
            });
            setupPagination();
        }

        function setupPagination() {
            const pagination = document.getElementById('pagination');
            const pageCount = Math.ceil(allArticles.length / itemsPerPage);
            pagination.innerHTML = '';
            if (pageCount <= 1) return;
            for (let i = 1; i <= pageCount; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = `w-10 h-10 rounded-lg font-black text-xs ${i === currentPage ? 'bg-red-600 text-white' : 'bg-zinc-900 text-zinc-500 hover:bg-zinc-800'}`;
                btn.onclick = () => { currentPage = i; displayPosts(); window.scrollTo({top: 0, behavior: 'smooth'}); };
                pagination.appendChild(btn);
            }
        }

        function handleSearch(inputId, suggestionsId, listId) {
            const input = document.getElementById(inputId);
            const suggestions = document.getElementById(suggestionsId);
            const list = document.getElementById(listId);
            const query = input.value.toLowerCase().trim();
            if (query.length < 2) { suggestions.classList.remove('active'); return; }
            const filtered = allArticles.filter(art => art.title.toLowerCase().includes(query)).slice(0, 6);
            if (filtered.length > 0) {
                list.innerHTML = filtered.map(art => `<a href="/artikel/${art.name.replace('.html','')}" class="block px-5 py-4 hover:bg-zinc-800 border-b border-zinc-800 transition group"><span class="text-sm font-bold text-zinc-300 uppercase tracking-tight block truncate">${art.title}</span></a>`).join('');
                suggestions.classList.add('active');
            } else {
                list.innerHTML = `<div class="px-5 py-8 text-center text-xs text-zinc-600 font-bold uppercase tracking-widest">Tidak ditemukan</div>`;
                suggestions.classList.add('active');
            }
        }

        function closeSearch() {
            document.getElementById('searchSuggestions')?.classList.remove('active');
            document.getElementById('mobileSearchSuggestions')?.classList.remove('active');
        }
        function toggleMenu() {
            const menu = document.getElementById('mobileMenu');
            if(menu.classList.contains('hidden')) menu.classList.remove('hidden');
            else menu.classList.add('hidden');
        }

        window.onload = initPortal;
    </script>
</body>
</html>
