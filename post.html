<head>
    <script>

<body class="py-10 md:py-20">

    <div class="max-w-6xl mx-auto px-6">

                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Judul Artikel</label>
                    <input type="text" id="postTitle" placeholder="Ketik Judul..." class="w-full bg-[#111] border border-zinc-800 p-4 rounded-xl outline-none font-bold text-white focus:border-red-600">

            </div>

            <div class="space-y-3">

            <button onclick="handlePublish()" id="pubBtn" class="w-full bg-red-600 text-white py-5 rounded-xl font-black text-xl uppercase tracking-widest hover:bg-red-700 transition-all shadow-[0_0_40px_rgba(220,38,38,0.3)]">Publikasikan Artikel</button>

            </div>

                </div>
            </div>
        </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        var quill = new Quill('#editor', { theme: 'snow', modules: { toolbar: { container: [['bold', 'italic', 'underline'], ['link', 'image', 'video'], [{'header': 1}, {'header': 2}, 'blockquote'], [{'list': 'ordered'}, {'list': 'bullet'}], ['clean']] } } });
        
        quill.getModule('toolbar').addHandler('image', () => { 
            const input = document.createElement('input'); 
            input.setAttribute('type', 'file'); input.setAttribute('accept', 'image/*'); input.click(); 
            input.onchange = () => { 
                const file = input.files[0]; 
                if (file) { 
                    const reader = new FileReader(); 
                    reader.onload = (e) => { 
                        const range = quill.getSelection(true); 
                        quill.insertEmbed(range.index, 'image', e.target.result); 
                    }; 
                    reader.readAsDataURL(file); 
                } 
            }; 
        });

        function getIndoDate() { const d = new Date(); return `${d.getDate()} ${["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"][d.getMonth()]} ${d.getFullYear()}`; }

        let isEditMode = false;
        let currentSha = null;
        let currentPath = null;
        // Kita simpan waktu asli saat mode edit agar urutannya gak berubah jadi baru lagi
        let originalTimestamp = null; 

        async function handlePublish() {
            const token = document.getElementById('ghToken').value;
            const category = document.getElementById('postCategory').value;
            const title = document.getElementById('postTitle').value;
            const content = quill.root.innerHTML;
            const btn = document.getElementById('pubBtn');

            if(!token || !title) return alert("Token Github dan Judul wajib diisi!");
            btn.innerText = "PROSES UPLOAD KE SERVER..."; btn.disabled = true;

            // URL BERSIH TANPA ANGKA
            const slug = title.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
            const filePath = isEditMode ? currentPath : `artikel/${slug}.html`;
            
            // Waktu untuk sistem pengurutan
            const publishTime = isEditMode && originalTimestamp ? originalTimestamp : Date.now();

            const fullTemplate = `<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="category" content="${category}">
    <meta name="publish-date" content="${publishTime}"> <title>${title} - Musik Anywhere</title>
    
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NewsArticle",
      "headline": "${title}",
      "image": ["https://pembri.github.io/android-icon-192x192.png"],
      "datePublished": "${new Date().toISOString()}",
      "author": [{ "@type": "Organization", "name": "Musik Anywhere", "url": "https://pembri.github.io" }]
    }
    <\/script>
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#111111"/>
    <meta name="description" content="Baca artikel lengkap tentang ${title} hanya di Musik Anywhere.">
    <meta property="og:site_name" content="Musik Anywhere">
    <meta property="og:title" content="${title} - Musik Anywhere">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://pembri.github.io/${slug}">

    <script src="https://cdn.tailwindcss.com"><\/script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0a0a0a; color: #f4f4f5; display: flex; flex-direction: column; min-height: 100vh;}
        main { flex: 1; }
        .nav-glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        .prose { max-width: none !important; }
        .prose img { border-radius: 1.5rem; margin: 2rem 0; width: 100%; border: 1px solid #27272a; }
        .prose a { color: #ef4444; font-weight: 800; border-bottom: 2px solid #7f1d1d; text-decoration: none;}
        .prose h1, .prose h2, .prose h3 { color: white; font-weight: 900; text-transform: uppercase; margin-top: 2rem; }
        .prose p { color: #d4d4d8; line-height: 1.8; margin-bottom: 1.5rem; font-size: 1.15rem;}
        #searchSuggestions, #mobileSearchSuggestions { display: none; }
        #searchSuggestions.active, #mobileSearchSuggestions.active { display: block; }
    </style>
</head>
<body onclick="closeSearch()">

    <header class="nav-glass sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
            <a href="/index.html" class="text-xl md:text-2xl font-black tracking-tighter uppercase flex items-center z-50 text-white">MUSIK<span class="text-red-600">ANYWHERE</span></a>
            <nav class="hidden lg:flex gap-8 items-center text-[11px] font-black uppercase tracking-[0.15em] text-zinc-400">
                <a href="/" class="hover:text-red-500 transition">Home</a>
                <a href="/index?kategori=Artikel" class="hover:text-red-500 transition">Artikel</a>
                <a href="/index?kategori=News" class="hover:text-red-500 transition">News</a>
                <a href="/index?kategori=Lirik Lagu" class="hover:text-red-500 transition">Lirik Lagu</a>
            </nav>
            <div class="flex items-center gap-4 z-50">
                <div class="relative group hidden lg:block" onclick="event.stopPropagation()"><div class="flex items-center bg-zinc-900 rounded-full px-4 py-2 border border-zinc-800 focus-within:border-red-500 transition-all"><svg class="w-4 h-4 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg><input type="text" id="searchInput" oninput="handleSearch('searchInput', 'searchSuggestions', 'suggestionsList')" placeholder="Cari..." autocomplete="off" class="bg-transparent border-none outline-none text-xs ml-2 w-48 text-white"></div><div id="searchSuggestions" class="absolute top-full right-0 mt-3 w-80 bg-zinc-900 rounded-2xl shadow-2xl border border-zinc-800 overflow-hidden z-[110]"><div id="suggestionsList" class="max-h-[350px] overflow-y-auto"></div></div></div>
                <button id="menuBtn" class="lg:hidden p-2 text-white focus:outline-none" onclick="toggleMenu()"><svg id="icon-menu" class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg><svg id="icon-close" class="w-6 h-6 hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg></button>
            </div>
        </div>
        <div id="mobileMenu" class="fixed inset-0 bg-[#0a0a0a] z-40 hidden flex-col pt-24 px-6 pb-8 h-screen overflow-y-auto transition-all">
            <div class="relative w-full mb-8 lg:hidden" onclick="event.stopPropagation()"><div class="flex items-center bg-zinc-900 rounded-full px-5 py-3 border border-zinc-800"><svg class="w-5 h-5 text-zinc-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg><input type="text" id="mobileSearchInput" oninput="handleSearch('mobileSearchInput', 'mobileSearchSuggestions', 'mobileSuggestionsList')" placeholder="Cari artikel..." autocomplete="off" class="bg-transparent border-none outline-none text-sm ml-3 w-full text-white"></div><div id="mobileSearchSuggestions" class="absolute top-full left-0 right-0 mt-2 bg-zinc-900 rounded-2xl shadow-xl border border-zinc-800 overflow-hidden z-[110]"><div id="mobileSuggestionsList" class="max-h-[300px] overflow-y-auto"></div></div></div>
            <nav class="flex flex-col gap-6 text-xl font-black uppercase tracking-tighter"><a href="/" class="text-white hover:text-red-600">Home</a><a href="/index?kategori=Artikel" class="text-white hover:text-red-600">Artikel</a><a href="/index?kategori=News" class="text-white hover:text-red-600">News</a><a href="/index?kategori=Lirik Lagu" class="text-white hover:text-red-600">Lirik Lagu</a><hr class="border-zinc-800 my-2"><a href="/about" class="text-zinc-500 hover:text-white text-sm">About</a><a href="/contact" class="text-zinc-500 hover:text-white text-sm">Contact</a><a href="/privacy" class="text-zinc-500 hover:text-white text-sm">Privacy Policy</a></nav>
        </div>
    </header>

    <main class="w-full max-w-6xl mx-auto px-4 md:px-8 py-12 md:py-20">
        <article class="bg-[#0a0a0a] p-2 md:p-6 rounded-[2rem] border-0 md:border border-zinc-800">
            <div class="mb-12 text-center md:text-left">
                <span class="bg-red-900/50 text-red-500 border border-red-900 px-4 py-1.5 rounded-md text-[10px] font-black uppercase tracking-widest mb-6 inline-block">Kategori: ${category}</span>
                <h1 class="text-4xl md:text-5xl lg:text-6xl font-black uppercase tracking-tighter mb-8 text-white leading-tight">${title}</h1>
                <p class="text-zinc-500 text-[11px] font-bold uppercase tracking-widest border-t border-b border-zinc-800 py-4">Oleh Redaksi • ${getIndoDate()}</p>
            </div>
            
            <div class="prose prose-zinc max-w-none w-full">
                ${content}
            </div>

            <div class="mt-20 p-8 bg-[#111] rounded-[2rem] border border-zinc-800 shadow-xl">
                <div class="text-center mb-6">
                    <p class="text-[10px] font-black uppercase tracking-[0.3em] text-zinc-500 mb-2">Share This Article</p>
                    <h3 class="text-xl font-black uppercase tracking-tighter text-white">Dukung Musik Lokal</h3>
                </div>
                <div class="grid grid-cols-2 md:grid-cols-5 gap-3">
                    <a href="https://api.whatsapp.com/send?text=${title}%20https://pembri.github.io/${filePath}" target="_blank" class="flex items-center justify-center bg-[#25D366] text-white py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:opacity-80 transition">WhatsApp</a>
                    <a href="https://www.facebook.com/sharer/sharer.php?u=https://pembri.github.io/${filePath}" target="_blank" class="flex items-center justify-center bg-[#1877F2] text-white py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:opacity-80 transition">Facebook</a>
                    <a href="https://twitter.com/intent/tweet?url=https://pembri.github.io/${filePath}&text=${title}" target="_blank" class="flex items-center justify-center bg-white text-black py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:opacity-80 transition">X / Twitter</a>
                    <a href="https://instagram.com" target="_blank" class="flex items-center justify-center bg-gradient-to-r from-purple-500 via-pink-500 to-orange-500 text-white py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest hover:opacity-80 transition">Instagram</a>
                    <button onclick="navigator.clipboard.writeText('https://pembri.github.io/${filePath}'); alert('Link berhasil disalin!');" class="flex items-center justify-center bg-zinc-800 text-white py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest border border-zinc-700 hover:bg-zinc-700 transition col-span-2 md:col-span-1">Salin Link</button>
                </div>
            </div>

            <section class="mt-20 border-t border-zinc-800 pt-16">
                <h2 class="text-2xl font-black uppercase mb-10 tracking-tighter flex items-center gap-3 text-white"><span class="w-2 h-8 bg-red-600 rounded-sm"></span> BACA JUGA</h2>
                <div id="rec-container" class="grid grid-cols-1 md:grid-cols-3 gap-6"></div>
            </section>
        </article>
    </main>

    <footer class="bg-[#050505] text-white mt-20 pt-20 pb-10 border-t border-zinc-900 w-full"><div class="max-w-7xl mx-auto px-8"><div class="grid grid-cols-1 md:grid-cols-3 gap-12 border-b border-zinc-900 pb-12 mb-8"><div class="md:col-span-1"><h2 class="text-2xl font-black uppercase mb-4 tracking-tighter">MUSIK<span class="text-red-600">ANYWHERE</span></h2><p class="text-zinc-500 text-sm leading-relaxed mb-6">Sumber berita musik independen untuk audiens Indonesia.</p></div><div><h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-600 mb-6">Kategori</h4><ul class="space-y-3 text-sm font-bold text-zinc-400"><li><a href="/index?kategori=Artikel" class="hover:text-red-500 transition">Artikel</a></li><li><a href="/index?kategori=News" class="hover:text-red-500 transition">News</a></li><li><a href="/index?kategori=Lirik Lagu" class="hover:text-red-500 transition">Lirik Lagu</a></li></ul></div><div><h4 class="text-[10px] font-black uppercase tracking-[0.2em] text-zinc-600 mb-6">Perusahaan</h4><ul class="space-y-3 text-sm font-bold text-zinc-400"><li><a href="/about" class="hover:text-red-500 transition">About</a></li><li><a href="/contact" class="hover:text-red-500 transition">Contact</a></li><li><a href="/privacy" class="hover:text-red-500 transition">Privacy Policy</a></li></ul></div></div><p class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest text-center"> © 2026 Musik Anywhere Media. </p></div></footer>

    <script>
        let allArticles = [];
        function toggleMenu() { const menu = document.getElementById('mobileMenu'); const iconMenu = document.getElementById('icon-menu'); const iconClose = document.getElementById('icon-close'); if(menu.classList.contains('hidden')) { menu.classList.remove('hidden'); menu.classList.add('flex'); document.body.style.overflow = 'hidden'; iconMenu.classList.add('hidden'); iconClose.classList.remove('hidden'); } else { menu.classList.add('hidden'); menu.classList.remove('flex'); document.body.style.overflow = 'auto'; iconMenu.classList.remove('hidden'); iconClose.classList.add('hidden'); } }
        function handleSearch(inputId, suggestionsId, listId) { const input = document.getElementById(inputId); const suggestions = document.getElementById(suggestionsId); const list = document.getElementById(listId); const query = input.value.toLowerCase().trim(); if (query.length < 2) { suggestions.classList.remove('active'); return; } const filtered = allArticles.filter(art => art.name.replace(/-/g, ' ').toLowerCase().includes(query)).slice(0, 6); if (filtered.length > 0) { list.innerHTML = filtered.map(art => { const title = art.name.replace(/-/g, ' ').replace('.html', ''); const cleanUrl = \`/artikel/\${art.name}\`; const highlightedTitle = title.replace(new RegExp(\`(\${query})\`, "gi"), "<span class='text-red-600'>$1</span>"); return \`<a href="\${cleanUrl}" class="block px-5 py-4 hover:bg-zinc-800 border-b border-zinc-800 transition group"><span class="text-sm font-bold text-zinc-300 uppercase tracking-tight block truncate">\${highlightedTitle}</span></a>\`; }).join(''); suggestions.classList.add('active'); } else { list.innerHTML = \`<div class="px-5 py-8 text-center text-xs text-zinc-600 font-bold uppercase tracking-widest">Tidak ditemukan</div>\`; suggestions.classList.add('active'); } }
        function closeSearch() { if(document.getElementById('searchSuggestions')) document.getElementById('searchSuggestions').classList.remove('active'); if(document.getElementById('mobileSearchSuggestions')) document.getElementById('mobileSearchSuggestions').classList.remove('active'); }
        
        async function initPage() { 
            try { 
                const res = await fetch('https://api.github.com/repos/pembri/pembri.github.io/contents/artikel'); 
                const data = await res.json(); 
                allArticles = data.filter(f => f.name.endsWith('.html')); 
                
                // SKRIP BACA JUGA (REKOMENDASI)
                const container = document.getElementById('rec-container');
                const currentFile = window.location.pathname.split('/').pop();
                const filtered = allArticles.filter(f => f.name !== currentFile).reverse().slice(0, 3);
                
                for(let item of filtered) {
                    let thumb = 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=800';
                    try {
                        const r = await fetch('/artikel/' + item.name);
                        const t = await r.text();
                        const m = t.match(/<img[^>]+src="([^">]+)"/);
                        if(m) { thumb = m[1]; if (!thumb.startsWith('data:image') && !thumb.startsWith('http') && !thumb.startsWith('/')) thumb = '/artikel/' + thumb; }
                    } catch(e){}
                    const tTitle = item.name.replace(/-/g, ' ').replace('.html', '');
                    container.innerHTML += \`<a href="/artikel/\${item.name}" class="group flex flex-col bg-zinc-900 rounded-2xl border border-zinc-800 hover:border-zinc-700 transition overflow-hidden">
                        <div class="aspect-[16/10] bg-zinc-950 relative overflow-hidden"><img src="\${thumb}" class="absolute inset-0 w-full h-full object-cover opacity-80 group-hover:scale-110 group-hover:opacity-100 transition duration-700"></div>
                        <div class="p-4"><h4 class="text-white font-black uppercase text-sm leading-tight tracking-tight group-hover:text-red-500 transition line-clamp-2">\${tTitle}</h4></div>
                    </a>\`;
                }
            } catch(e) {} 
        } 
        window.onload = initPage;
    <\/script>
</body>
</html>`;

            const payload = { message: isEditMode ? `Update: ${title}` : `Publish: ${title}`, content: btoa(unescape(encodeURIComponent(fullTemplate))) };
            if(isEditMode) payload.sha = currentSha;

            try {
                const response = await fetch(`https://api.github.com/repos/pembri/pembri.github.io/contents/${filePath}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                if(response.ok) { alert(isEditMode ? "ARTIKEL BERHASIL DIUPDATE!" : "ARTIKEL BERHASIL DIPUBLIKASI!"); location.reload(); }
                else { alert("Gagal koneksi. Cek Token Github."); }
            } catch (e) { alert("Error: " + e.message); }
            btn.innerText = "Publikasikan Artikel"; btn.disabled = false;
        }

        // FUNGSI LOAD ARTIKEL DI ADMIN
        async function loadArticleList() {
            const token = document.getElementById('ghToken').value;
            const listDiv = document.getElementById('articleList');
            if(!token) return alert("Masukkan token Github Anda terlebih dahulu.");
            
            listDiv.innerHTML = '<p class="text-zinc-400 text-xs font-bold uppercase tracking-widest animate-pulse text-center py-5">Menarik Data Server...</p>';
            try {
                const res = await fetch('https://api.github.com/repos/pembri/pembri.github.io/contents/artikel', { headers: { 'Authorization': `token ${token}` } });
                const files = await res.json();
                const articles = files.filter(f => f.name.endsWith('.html'));
                
                listDiv.innerHTML = '';
                articles.reverse().forEach(file => {
                    const cleanTitle = file.name.replace(/-/g, ' ').replace('.html', '').toUpperCase();
                    listDiv.innerHTML += `
                        <div class="bg-[#111] border border-zinc-800 p-5 rounded-2xl flex flex-col md:flex-row md:justify-between md:items-center gap-4 group hover:border-red-600 transition">
                            <div>
                                <h3 class="font-black text-sm md:text-base tracking-tight text-white">${cleanTitle}</h3>
                                <p class="text-[10px] text-zinc-500 font-mono mt-1">${file.name}</p>
                            </div>
                            <div class="flex gap-2">
                                <button onclick="editArticle('${file.path}', '${file.sha}')" class="bg-zinc-800 text-white text-[10px] font-black px-4 py-2 rounded-lg hover:bg-blue-600 transition uppercase">Edit</button>
                                <button onclick="deleteArticle('${file.path}', '${file.sha}')" class="bg-zinc-800 text-red-500 text-[10px] font-black px-4 py-2 rounded-lg hover:bg-red-600 hover:text-white transition uppercase">Hapus</button>
                            </div>
                        </div>`;
                });
            } catch (e) { listDiv.innerHTML = '<p class="text-red-500 font-bold text-center">Gagal memuat daftar artikel.</p>'; }
        }

        // FUNGSI EDIT ARTIKEL
        async function editArticle(path, sha) {
            const token = document.getElementById('ghToken').value;
            const btn = document.getElementById('pubBtn');
            try {
                const res = await fetch(`https://api.github.com/repos/pembri/pembri.github.io/contents/${path}`, { headers: { 'Authorization': `token ${token}` } });
                const data = await res.json();
                const htmlContent = decodeURIComponent(escape(atob(data.content)));
                
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, 'text/html');
                
                const title = doc.querySelector('h1')?.innerText || "";
                const content = doc.querySelector('.prose')?.innerHTML || "";
                const categoryMeta = doc.querySelector('meta[name="category"]');
                const dateMeta = doc.querySelector('meta[name="publish-date"]');
                
                document.getElementById('postTitle').value = title;
                if(categoryMeta) document.getElementById('postCategory').value = categoryMeta.getAttribute('content');
                if(dateMeta) originalTimestamp = parseInt(dateMeta.getAttribute('content'));
                quill.root.innerHTML = content;
                
                isEditMode = true; currentSha = sha; currentPath = path;
                btn.innerText = "UPDATE ARTIKEL SEKARANG";
                btn.classList.replace('bg-red-600', 'bg-blue-600');
                btn.classList.replace('hover:bg-red-700', 'hover:bg-blue-700');
                
                window.scrollTo({ top: 0, behavior: 'smooth' });
                alert("Mode Edit Aktif! Teks ditarik dari server.");
            } catch (e) { alert("Gagal mengambil file artikel dari server."); }
        }

        // FUNGSI HAPUS ARTIKEL
        async function deleteArticle(path, sha) {
            if(!confirm("Anda yakin ingin menghapus artikel ini permanen?")) return;
            const token = document.getElementById('ghToken').value;
            try {
                const res = await fetch(`https://api.github.com/repos/pembri/pembri.github.io/contents/${path}`, {
                    method: 'DELETE', headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' }, body: JSON.stringify({ message: `Hapus Artikel: ${path}`, sha: sha })
                });
                if(res.ok) { alert("ARTIKEL BERHASIL DIHAPUS!"); loadArticleList(); }
            } catch (e) { alert("Error: " + e.message); }
        }
    </script>
</body>
</html>
