<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musik Anywhere - SUPER CMS STUDIO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; }
        .tab-btn.active { background: #dc2626; color: white; border-color: #dc2626; }
        .ql-container.ql-snow { border: none !important; }
        .ql-toolbar.ql-snow { background: #18181b; border-radius: 1rem 1rem 0 0; border: 1px solid #27272a; }
        .ql-toolbar button { filter: invert(1); }
        .ql-editor { background: #0a0a0a; color: #e4e4e7; min-height: 400px; border-radius: 0 0 1rem 1rem; border: 1px solid #27272a; font-size: 1.1rem; }
        input, select, textarea { transition: all 0.3s; }
        input:focus, select:focus, textarea:focus { border-color: #dc2626 !important; outline: none; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body class="flex flex-col md:flex-row min-h-screen">

    <aside class="w-full md:w-72 bg-[#0a0a0a] border-r border-zinc-800 p-6 flex flex-col md:h-screen sticky top-0 z-50 shadow-2xl">
        <div class="mb-8 text-center md:text-left">
            <h1 class="text-3xl font-black uppercase tracking-tighter">CMS<span class="text-red-600">STUDIO</span></h1>
            <p class="text-[10px] text-zinc-500 uppercase tracking-widest font-bold mt-1">pembri.github.io</p>
        </div>
        
        <div class="space-y-4 mb-8 bg-zinc-900/50 p-4 rounded-2xl border border-zinc-800">
            <label class="text-[10px] font-black uppercase text-zinc-400">Token Akses GitHub</label>
            <input type="password" id="ghToken" placeholder="ghp_xxxx..." class="w-full bg-black border border-zinc-800 p-3 rounded-xl text-xs text-red-500">
            <button onclick="connectGitHub()" id="btnConnect" class="w-full bg-white text-black font-black uppercase text-[10px] tracking-widest py-3 rounded-xl hover:bg-red-600 hover:text-white transition">Hubungkan ke Server</button>
        </div>

        <nav class="flex flex-col space-y-2 overflow-y-auto pb-6" id="navMenu">
            <button onclick="openTab('tab-dashboard', this)" class="tab-btn active w-full text-left px-5 py-4 rounded-xl text-xs font-bold uppercase tracking-widest text-zinc-400 border border-transparent hover:bg-zinc-900 transition">Dashboard</button>
            <button onclick="openTab('tab-settings', this)" class="tab-btn w-full text-left px-5 py-4 rounded-xl text-xs font-bold uppercase tracking-widest text-zinc-400 border border-transparent hover:bg-zinc-900 transition">Tema & SEO</button>
            <button onclick="openTab('tab-menus', this)" class="tab-btn w-full text-left px-5 py-4 rounded-xl text-xs font-bold uppercase tracking-widest text-zinc-400 border border-transparent hover:bg-zinc-900 transition">Navigasi Menu</button>
            <button onclick="openTab('tab-pages', this)" class="tab-btn w-full text-left px-5 py-4 rounded-xl text-xs font-bold uppercase tracking-widest text-zinc-400 border border-transparent hover:bg-zinc-900 transition">Halaman Statis</button>
            <button onclick="openTab('tab-articles', this)" class="tab-btn w-full text-left px-5 py-4 rounded-xl text-xs font-bold uppercase tracking-widest text-zinc-400 border border-transparent hover:bg-zinc-900 transition">Kelola Artikel</button>
        </nav>
    </aside>

    <main class="flex-1 p-6 md:p-10 w-full md:h-screen md:overflow-y-auto">
        
        <section id="tab-dashboard" class="tab-content active">
            <div class="bg-zinc-900/40 border border-zinc-800 p-8 md:p-10 rounded-[2rem]">
                <h2 class="text-3xl font-black uppercase tracking-tighter mb-4">Selamat Datang!</h2>
                <p class="text-zinc-400 mb-8 text-sm md:text-base">Masukkan Token GitHub Anda di panel kiri, lalu klik <b>Hubungkan ke Server</b> untuk mengelola website secara penuh.</p>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="bg-black p-6 rounded-2xl border border-zinc-800 text-center">
                        <h3 class="text-3xl font-black text-white" id="stat-art">0</h3>
                        <p class="text-[10px] text-zinc-500 uppercase tracking-widest mt-2">Total Artikel</p>
                    </div>
                    <div class="bg-black p-6 rounded-2xl border border-zinc-800 text-center">
                        <h3 class="text-xl font-black text-zinc-500 mt-2" id="stat-status">OFFLINE</h3>
                        <p class="text-[10px] text-zinc-500 uppercase tracking-widest mt-2">Status Server</p>
                    </div>
                </div>
            </div>
        </section>

        <section id="tab-settings" class="tab-content space-y-8">
            <h2 class="text-2xl font-black uppercase tracking-tighter border-b border-zinc-800 pb-4">Tampilan & SEO</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="bg-zinc-900/40 p-6 rounded-3xl border border-zinc-800 space-y-4">
                    <h3 class="text-xs font-black uppercase tracking-widest text-red-500 mb-2">Identitas Web</h3>
                    <div><label class="text-[10px] font-bold text-zinc-400">Nama Situs</label><input type="text" id="cfg-siteName" class="w-full bg-black border border-zinc-800 p-3 rounded-xl mt-1 text-white"></div>
                    <div><label class="text-[10px] font-bold text-zinc-400">Slogan / Judul Tab</label><input type="text" id="cfg-slogan" class="w-full bg-black border border-zinc-800 p-3 rounded-xl mt-1 text-white"></div>
                    <div><label class="text-[10px] font-bold text-zinc-400">Meta Deskripsi (SEO)</label><textarea id="cfg-metaDesc" rows="3" class="w-full bg-black border border-zinc-800 p-3 rounded-xl mt-1 text-white"></textarea></div>
                </div>

                <div class="bg-zinc-900/40 p-6 rounded-3xl border border-zinc-800 space-y-4">
                    <h3 class="text-xs font-black uppercase tracking-widest text-red-500 mb-2">Aset Visual</h3>
                    <div class="flex gap-4">
                        <div class="w-1/3"><label class="text-[10px] font-bold text-zinc-400">Warna Utama</label><input type="color" id="cfg-primaryColor" class="w-full h-12 bg-black border border-zinc-800 rounded-xl mt-1 p-1"></div>
                        <div class="w-2/3"><label class="text-[10px] font-bold text-zinc-400">Favicon</label><input type="text" id="cfg-favicon" class="w-full bg-black border border-zinc-800 p-3 rounded-xl mt-1 text-white"></div>
                    </div>
                    <div><label class="text-[10px] font-bold text-zinc-400">URL Gambar Logo (Opsional)</label><input type="text" id="cfg-logo" class="w-full bg-black border border-zinc-800 p-3 rounded-xl mt-1 text-white"></div>
                    <div><label class="text-[10px] font-bold text-zinc-400">Copyright Footer</label><input type="text" id="cfg-copy" class="w-full bg-black border border-zinc-800 p-3 rounded-xl mt-1 text-white"></div>
                </div>
            </div>
            <button onclick="saveGlobalConfig()" class="w-full bg-red-600 py-4 rounded-xl font-black uppercase tracking-widest hover:bg-red-700 transition">Update Tampilan</button>
        </section>

        <section id="tab-menus" class="tab-content space-y-8">
            <h2 class="text-2xl font-black uppercase tracking-tighter border-b border-zinc-800 pb-4">Navigasi Menu</h2>
            <div class="bg-zinc-900/40 p-6 rounded-3xl border border-zinc-800">
                <div class="flex flex-col md:flex-row gap-4 mb-6">
                    <input type="text" id="menu-name" placeholder="Nama Menu (Contoh: Lirik)" class="w-full md:w-1/3 bg-black border border-zinc-800 p-3 rounded-xl text-white">
                    <input type="text" id="menu-url" placeholder="Link Menu (Contoh: /index.html)" class="w-full md:w-1/2 bg-black border border-zinc-800 p-3 rounded-xl text-white">
                    <button onclick="addMenu()" class="w-full md:w-auto bg-white text-black px-6 py-3 rounded-xl font-bold">Tambah</button>
                </div>
                <div id="menu-list" class="space-y-3"></div>
                <button onclick="saveGlobalConfig()" class="w-full mt-6 bg-red-600 py-4 rounded-xl font-black uppercase tracking-widest">Simpan Menu</button>
            </div>
        </section>

        <section id="tab-pages" class="tab-content space-y-8">
            <h2 class="text-2xl font-black uppercase tracking-tighter border-b border-zinc-800 pb-4">Editor Halaman Statis</h2>
            <div class="bg-zinc-900/40 p-6 rounded-3xl border border-zinc-800">
                <div class="flex flex-col md:flex-row gap-4 mb-6">
                    <select id="pageSelect" class="w-full md:w-2/3 bg-black border border-zinc-800 p-4 rounded-xl text-white font-bold">
                        <option value="about.html">Tentang Kami (about.html)</option>
                        <option value="contact.html">Kontak (contact.html)</option>
                        <option value="privacy.html">Privacy Policy (privacy.html)</option>
                    </select>
                    <button onclick="loadPageContent()" class="w-full md:w-1/3 bg-white text-black py-4 rounded-xl font-bold">Tarik Data</button>
                </div>
                <div id="pageEditorContainer" class="hidden space-y-4">
                    <div><label class="text-[10px] font-bold text-zinc-400">Judul Halaman (H1)</label><input type="text" id="pageTitle" class="w-full bg-black border border-zinc-800 p-3 rounded-xl mt-1 font-bold text-xl text-white"></div>
                    <div class="bg-black p-2 rounded-xl border border-zinc-800"><div id="quillPageEditor"></div></div>
                    <button onclick="savePageContent()" class="w-full bg-red-600 py-4 rounded-xl font-black uppercase tracking-widest">Simpan Perubahan</button>
                </div>
            </div>
        </section>

        <section id="tab-articles" class="tab-content space-y-8">
            <div class="flex justify-between items-center border-b border-zinc-800 pb-4">
                <h2 class="text-2xl font-black uppercase tracking-tighter">Kelola Artikel</h2>
                <button onclick="toggleArticleView()" class="bg-zinc-800 text-xs font-bold px-4 py-2 rounded-lg">Buka Database</button>
            </div>
            
            <div id="articleForm" class="bg-zinc-900/40 p-6 rounded-3xl border border-zinc-800 space-y-4">
                <div class="flex flex-col md:flex-row gap-4">
                    <select id="postCategory" class="w-full md:w-1/3 bg-black border border-zinc-800 p-4 rounded-xl font-bold text-white"><option value="Artikel">Artikel</option><option value="News">News</option><option value="Lirik Lagu">Lirik Lagu</option></select>
                    <input type="text" id="postTitle" placeholder="Judul Artikel..." class="w-full md:w-2/3 bg-black border border-zinc-800 p-4 rounded-xl font-bold text-white text-lg">
                </div>
                <div class="bg-black p-2 rounded-xl border border-zinc-800"><div id="quillPostEditor"></div></div>
                <button onclick="publishArticle()" id="btnPublish" class="w-full bg-red-600 py-4 rounded-xl font-black uppercase tracking-widest">Terbitkan Artikel</button>
            </div>

            <div id="articleDatabase" class="hidden bg-zinc-900/40 p-6 rounded-3xl border border-zinc-800">
                <div id="articleList" class="grid grid-cols-1 gap-4"></div>
            </div>
        </section>

    </main>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        const REPO = "pembri/pembri.github.io";
        let siteConfig = {}; let configSha = null;
        let qPage, qPost;

        // Init Quill
        document.addEventListener('DOMContentLoaded', () => {
            const opts = { theme: 'snow', modules: { toolbar: [['bold', 'italic', 'underline'], ['link', 'image', 'video'], [{'header': 1}, {'header': 2}], [{'list': 'ordered'}, {'list': 'bullet'}], ['clean']] } };
            qPage = new Quill('#quillPageEditor', opts);
            qPost = new Quill('#quillPostEditor', opts);
            
            const imgHandler = (q) => {
                const input = document.createElement('input'); input.setAttribute('type', 'file'); input.setAttribute('accept', 'image/*'); input.click();
                input.onchange = () => { const file = input.files[0]; if (file) { const reader = new FileReader(); reader.onload = (e) => { const range = q.getSelection(true); q.insertEmbed(range.index, 'image', e.target.result); }; reader.readAsDataURL(file); } };
            };
            qPage.getModule('toolbar').addHandler('image', () => imgHandler(qPage));
            qPost.getModule('toolbar').addHandler('image', () => imgHandler(qPost));
        });

        // Tabs
        function openTab(id, btn) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            if(btn) btn.classList.add('active');
        }
        function toggleArticleView() {
            const form = document.getElementById('articleForm'); const db = document.getElementById('articleDatabase');
            if(form.classList.contains('hidden')){ form.classList.remove('hidden'); db.classList.add('hidden'); }
            else { form.classList.add('hidden'); db.classList.remove('hidden'); }
        }

        // Connect
        async function connectGitHub() {
            const token = document.getElementById('ghToken').value;
            if(!token) return alert("Harap masukkan Token GitHub!");
            document.getElementById('btnConnect').innerText = "Menghubungkan...";
            
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/config.json`, { headers: { 'Authorization': `token ${token}` } });
                if(res.ok) {
                    const data = await res.json(); configSha = data.sha;
                    siteConfig = JSON.parse(decodeURIComponent(escape(atob(data.content))));
                    
                    document.getElementById('cfg-siteName').value = siteConfig.siteName || ''; document.getElementById('cfg-slogan').value = siteConfig.slogan || '';
                    document.getElementById('cfg-metaDesc').value = siteConfig.metaDesc || ''; document.getElementById('cfg-primaryColor').value = siteConfig.primaryColor || '#dc2626';
                    document.getElementById('cfg-favicon').value = siteConfig.favicon || ''; document.getElementById('cfg-logo').value = siteConfig.logo || '';
                    document.getElementById('cfg-copy').value = siteConfig.copyright || '';
                    
                    renderMenus(); loadArticlesList();
                    document.getElementById('stat-status').innerText = 'ONLINE';
                    document.getElementById('stat-status').classList.replace('text-zinc-500', 'text-green-500');
                    document.getElementById('btnConnect').innerText = "Terhubung!";
                    document.getElementById('btnConnect').classList.replace('bg-white', 'bg-green-500');
                    alert("Koneksi berhasil!");
                } else if(res.status === 404) { await createConfig(token); } 
                else { alert("Token salah atau akses ditolak."); document.getElementById('btnConnect').innerText = "Hubungkan ke Server"; }
            } catch(e) { alert("Error: " + e.message); document.getElementById('btnConnect').innerText = "Hubungkan ke Server"; }
        }

        async function createConfig(token) {
            siteConfig = { siteName: "MUSIK ANYWHERE", slogan: "Portal Berita Musik", primaryColor: "#dc2626", copyright: "© 2026 Musik Anywhere", menus: [] };
            await fetch(`https://api.github.com/repos/${REPO}/contents/config.json`, { method: 'PUT', headers: { 'Authorization': `token ${token}` }, body: JSON.stringify({ message: "Init Config", content: btoa(unescape(encodeURIComponent(JSON.stringify(siteConfig)))) }) });
            connectGitHub();
        }

        // Global Settings
        async function saveGlobalConfig() {
            const token = document.getElementById('ghToken').value; if(!configSha) return alert("Belum konek ke server!");
            siteConfig.siteName = document.getElementById('cfg-siteName').value; siteConfig.slogan = document.getElementById('cfg-slogan').value;
            siteConfig.metaDesc = document.getElementById('cfg-metaDesc').value; siteConfig.primaryColor = document.getElementById('cfg-primaryColor').value;
            siteConfig.favicon = document.getElementById('cfg-favicon').value; siteConfig.logo = document.getElementById('cfg-logo').value;
            siteConfig.copyright = document.getElementById('cfg-copy').value;

            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/config.json`, {
                    method: 'PUT', headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ message: "Update Tampilan", content: btoa(unescape(encodeURIComponent(JSON.stringify(siteConfig, null, 2)))), sha: configSha })
                });
                if(res.ok) { const data = await res.json(); configSha = data.content.sha; alert("Tampilan & Menu Berhasil Diupdate!"); }
            } catch(e) { alert("Gagal Simpan: " + e.message); }
        }

        // Menus
        function renderMenus() {
            const list = document.getElementById('menu-list'); list.innerHTML = '';
            if(!siteConfig.menus) siteConfig.menus = [];
            siteConfig.menus.forEach((m, i) => {
                list.innerHTML += `<div class="flex justify-between items-center bg-black border border-zinc-800 p-4 rounded-xl"><div><p class="font-bold text-white text-sm">${m.name}</p><p class="text-[10px] text-zinc-500">${m.url}</p></div><button onclick="deleteMenu(${i})" class="text-red-500 font-bold text-xs">HAPUS</button></div>`;
            });
        }
        function addMenu() {
            const name = document.getElementById('menu-name').value; const url = document.getElementById('menu-url').value;
            if(!name || !url) return;
            siteConfig.menus.push({name, url}); renderMenus();
            document.getElementById('menu-name').value=''; document.getElementById('menu-url').value='';
        }
        function deleteMenu(i) { siteConfig.menus.splice(i,1); renderMenus(); }

        // Pages
        let pageSha = null; let pageName = null; let rawPage = "";
        async function loadPageContent() {
            const token = document.getElementById('ghToken').value; pageName = document.getElementById('pageSelect').value;
            if(!token) return alert("Belum konek!");
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${pageName}`, { headers: { 'Authorization': `token ${token}` } });
                const data = await res.json(); pageSha = data.sha; rawPage = decodeURIComponent(escape(atob(data.content)));
                const doc = new DOMParser().parseFromString(rawPage, 'text/html');
                
                document.getElementById('pageTitle').value = doc.querySelector('h1')?.innerText || "";
                qPage.root.innerHTML = doc.querySelector('.bg-zinc-900\\/50 p') ? doc.querySelector('.bg-zinc-900\\/50').innerHTML : (doc.querySelector('main p')?.parentElement.innerHTML || "");
                document.getElementById('pageEditorContainer').classList.remove('hidden'); alert("Halaman berhasil ditarik!");
            } catch(e) { alert("Gagal narik halaman."); }
        }
        async function savePageContent() {
            const token = document.getElementById('ghToken').value;
            const doc = new DOMParser().parseFromString(rawPage, 'text/html');
            const h1 = doc.querySelector('main h1') || doc.querySelector('h1'); if(h1) h1.innerText = document.getElementById('pageTitle').value;
            const tgt = doc.querySelector('.bg-zinc-900\\/50') || doc.querySelector('main');
            if(tgt) { Array.from(tgt.children).forEach(c => { if(c.tagName!=='H1' && c.tagName!=='SPAN') c.remove(); }); tgt.innerHTML += qPage.root.innerHTML; }
            
            const html = `<!DOCTYPE html>\n<html lang="id">\n` + doc.documentElement.innerHTML + `\n</html>`;
            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${pageName}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ message: `Update ${pageName}`, content: btoa(unescape(encodeURIComponent(html))), sha: pageSha })
                });
                if(res.ok) { const data = await res.json(); pageSha = data.content.sha; alert("Halaman tersimpan!"); }
            } catch(e) { alert("Gagal: " + e.message); }
        }

        // Articles
        let editSha = null; let editPath = null; let editTime = null;
        async function loadArticlesList() {
            const token = document.getElementById('ghToken').value;
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/artikel`, { headers: { 'Authorization': `token ${token}` } });
            const files = await res.json(); const list = document.getElementById('articleList'); list.innerHTML = '';
            let c = 0;
            files.filter(f => f.name.endsWith('.html')).reverse().forEach(file => {
                c++; const t = file.name.replace(/-/g, ' ').replace('.html', '').toUpperCase();
                list.innerHTML += `<div class="bg-black border border-zinc-800 p-4 rounded-xl flex justify-between items-center"><span class="text-xs font-bold text-white truncate max-w-[200px] md:max-w-md">${t}</span><div class="flex gap-2"><button onclick="editArt('${file.path}', '${file.sha}')" class="text-[10px] bg-white text-black px-3 py-2 rounded-lg font-bold">EDIT</button><button onclick="delArt('${file.path}', '${file.sha}')" class="text-[10px] bg-zinc-900 text-red-500 px-3 py-2 rounded-lg font-bold">HAPUS</button></div></div>`;
            });
            document.getElementById('stat-art').innerText = c;
        }

        async function publishArticle() {
            const token = document.getElementById('ghToken').value; const t = document.getElementById('postTitle').value;
            if(!token || !t) return alert("Judul & Token wajib diisi!");
            const btn = document.getElementById('btnPublish'); btn.innerText = "Mengupload..."; btn.disabled = true;

            const slug = t.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
            const path = editPath || `artikel/${slug}.html`; const time = editTime || Date.now();
            
            // Template Article
            const html = `<!DOCTYPE html>\n<html lang="id">\n<head>\n<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n<meta name="category" content="${document.getElementById('postCategory').value}">\n<meta name="publish-date" content="${time}">\n<title>${t}</title>\n<script src="https://cdn.tailwindcss.com"><\/script>\n<style>\n@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');\n:root { --c-main: #dc2626; }\nbody { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0a0a0a; color: #f4f4f5; display: flex; flex-direction: column; min-height: 100vh;}\nmain { flex: 1; }\n.nav-glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.05); }\n.c-bg { background-color: var(--c-main) !important; }\n.prose { max-width: none !important; } .prose img { border-radius: 1.5rem; margin: 2rem 0; width: 100%; border: 1px solid #27272a; }\n.prose a { color: var(--c-main); font-weight: 800; border-bottom: 2px solid var(--c-main); text-decoration: none;}\n.prose h1, .prose h2, .prose h3 { color: white; font-weight: 900; text-transform: uppercase; margin-top: 2rem; }\n.prose p { color: #d4d4d8; line-height: 1.8; margin-bottom: 1.5rem; font-size: 1.15rem;}\n</style>\n</head>\n<body>\n<header class="nav-glass sticky top-0 z-[100]"><div class="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between"><a href="/index.html" id="sys-logo" class="text-xl md:text-2xl font-black tracking-tighter uppercase text-white"></a><nav id="sys-desktop-menu" class="hidden lg:flex gap-8 items-center text-[11px] font-black uppercase tracking-[0.15em] text-zinc-400"></nav></div></header>\n<main class="w-full max-w-6xl mx-auto px-4 md:px-8 py-12 md:py-20">\n<article class="bg-[#0a0a0a] p-2 md:p-6 rounded-[2rem] border-0 md:border border-zinc-800">\n<div class="mb-12 text-center md:text-left"><span class="c-bg text-white px-4 py-1.5 rounded-md text-[10px] font-black uppercase tracking-widest mb-6 inline-block">Kategori: ${document.getElementById('postCategory').value}</span>\n<h1 class="text-4xl md:text-5xl font-black uppercase tracking-tighter mb-8 text-white leading-tight">${t}</h1></div>\n<div class="prose prose-zinc max-w-none w-full">${qPost.root.innerHTML}</div>\n</article>\n</main>\n<footer class="bg-[#050505] text-white mt-20 pt-20 pb-10 border-t border-zinc-900 w-full"><div class="max-w-7xl mx-auto px-8 text-center"><h2 id="sys-foot-name" class="text-2xl font-black uppercase mb-4 tracking-tighter"></h2><p id="sys-copy" class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest"></p></div></footer>\n<script>\nasync function sysInit() {\nconst rConf = await fetch('/config.json'); const c = await rConf.json();\ndocument.documentElement.style.setProperty('--c-main', c.primaryColor);\ndocument.getElementById('sys-logo').innerHTML = c.logo ? \`<img src="\${c.logo}" class="h-8">\` : c.siteName;\ndocument.getElementById('sys-foot-name').innerText = c.siteName;\ndocument.getElementById('sys-copy').innerText = c.copyright;\ndocument.title = \`${t} - \${c.siteName}\`;\nlet dMenu = ''; if(c.menus) c.menus.forEach(m => { dMenu += \`<a href="\${m.url}" class="hover:text-white transition">\${m.name}</a>\`; });\ndocument.getElementById('sys-desktop-menu').innerHTML = dMenu;\n}\nwindow.onload = sysInit;\n<\/script>\n</body>\n</html>`;

            try {
                const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${path}`, {
                    method: 'PUT', headers: { 'Authorization': `token ${token}` },
                    body: JSON.stringify({ message: `Publish: ${t}`, content: btoa(unescape(encodeURIComponent(html))), sha: editSha || undefined })
                });
                if(res.ok) { alert("Artikel Berhasil Terbit!"); editSha=null; editPath=null; document.getElementById('postTitle').value=''; qPost.root.innerHTML=''; btn.innerText="Terbitkan Artikel"; loadArticlesList(); }
            } catch(e) { alert("Gagal: " + e.message); btn.innerText="Terbitkan Artikel"; }
            btn.disabled = false;
        }

        async function editArt(p, s) {
            const token = document.getElementById('ghToken').value;
            const res = await fetch(`https://api.github.com/repos/${REPO}/contents/${p}`, { headers: { 'Authorization': `token ${token}` } });
            const data = await res.json(); const doc = new DOMParser().parseFromString(decodeURIComponent(escape(atob(data.content))), 'text/html');
            document.getElementById('postTitle').value = doc.querySelector('h1')?.innerText || "";
            qPost.root.innerHTML = doc.querySelector('.prose')?.innerHTML || "";
            const cat = doc.querySelector('meta[name="category"]')?.getAttribute('content'); if(cat) document.getElementById('postCategory').value = cat;
            const date = doc.querySelector('meta[name="publish-date"]')?.getAttribute('content'); if(date) editTime = parseInt(date);
            editSha = s; editPath = p; document.getElementById('btnPublish').innerText = "Update Artikel";
            toggleArticleView(); alert("Siap diedit!");
        }

        async function delArt(p, s) {
            if(!confirm("Hapus permanen?")) return;
            const token = document.getElementById('ghToken').value;
            await fetch(`https://api.github.com/repos/${REPO}/contents/${p}`, { method: 'DELETE', headers: { 'Authorization': `token ${token}` }, body: JSON.stringify({ message: "Hapus", sha: s }) });
            alert("Terhapus!"); loadArticlesList();
        }
    </script>
</body>
</html>
