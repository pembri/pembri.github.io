<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Nada - Berita Musik Terkini</title>
    <meta name="description" content="Portal Nada adalah sumber informasi terpercaya untuk perkembangan dunia musik, review album, dan jadwal konser.">
    
    <meta property="og:title" content="Portal Nada">
    <meta property="og:description" content="Eksplorasi dunia musik tanpa batas di Portal Nada.">
    <meta property="og:image" content="https://pembri.github.io/favicon.png">
    <meta property="og:url" content="https://pembri.github.io">
    <link rel="icon" href="favicon.png" type="image/png">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NewsMediaOrganization",
      "name": "Portal Nada",
      "url": "https://pembri.github.io",
      "logo": "https://pembri.github.io/favicon.png"
    }
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; }
        .hero-gradient { background: linear-gradient(0deg, rgba(0,0,0,1) 0%, rgba(0,0,0,0) 100%); }
        [x-cloak] { display: none !important; }
    </style>
</head>
<body class="antialiased">

    <nav class="border-b sticky top-0 bg-white/90 backdrop-blur-md z-50">
        <div class="max-w-7xl mx-auto px-6 h-20 flex items-center justify-between">
            <a href="/" class="text-2xl font-extrabold tracking-tighter uppercase">Portal<span class="text-red-600">Nada</span></a>
            
            <div class="hidden md:flex gap-8 font-bold text-xs uppercase tracking-widest text-gray-500">
                <a href="#" class="hover:text-black">Berita</a>
                <a href="#" class="hover:text-black">Review</a>
                <a href="#" class="hover:text-black">Jadwal Konser</a>
                <a href="#" class="hover:text-black">Eksklusif</a>
            </div>

            <div class="relative">
                <input type="text" id="searchInput" onkeyup="searchContent()" placeholder="Cari artikel..." class="bg-gray-100 border-none rounded-full px-5 py-2 text-sm focus:ring-2 focus:ring-red-500 outline-none w-48 lg:w-64">
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-6 py-10">
        
        <div id="highlight-container" class="mb-16">
            </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-16">
            <div class="lg:col-span-2">
                <h2 class="text-xl font-black uppercase mb-8 flex items-center">
                    Artikel Terbaru 
                    <span class="h-[2px] bg-black flex-1 ml-4"></span>
                </h2>
                <div id="main-articles" class="grid grid-cols-1 md:grid-cols-2 gap-10">
                    </div>
            </div>

            <aside>
                <div class="bg-black p-8 rounded-3xl text-white">
                    <h3 class="text-sm font-black uppercase tracking-[0.2em] mb-8 text-red-500">Trending Sekarang</h3>
                    <div id="trending-list" class="space-y-6">
                        </div>
                </div>
            </aside>
        </div>

        <section class="mt-24">
            <h2 class="text-xl font-black uppercase mb-8">Rekomendasi Lainnya</h2>
            <div id="recommendations" class="grid grid-cols-2 md:grid-cols-4 gap-6">
                </div>
        </section>
    </main>

    <footer class="bg-zinc-950 text-white mt-32 py-20">
        <div class="max-w-7xl mx-auto px-6 text-center md:text-left flex flex-col md:flex-row justify-between items-center">
            <div>
                <h2 class="text-2xl font-black uppercase mb-2">Portal<span class="text-red-600">Nada</span></h2>
                <p class="text-zinc-500 text-sm italic">Musik adalah denyut nadi kehidupan.</p>
            </div>
            <p class="text-zinc-600 text-xs mt-10 md:mt-0 uppercase tracking-widest">&copy; 2026 Portal Nada Media - pembri.github.io</p>
        </div>
    </footer>

    <script>
        async function loadContent() {
            const mainContainer = document.getElementById('main-articles');
            const highlightContainer = document.getElementById('highlight-container');
            const trendingList = document.getElementById('trending-list');
            const recommendationList = document.getElementById('recommendations');

            try {
                // Fetch daftar file dari folder /artikel di repo
                const res = await fetch('https://api.github.com/repos/pembri/pembri.github.io/contents/artikel');
                const files = await res.json();
                
                if (!files || files.message === "Not Found" || files.length === 0) {
                    mainContainer.innerHTML = '<p class="text-gray-400 italic">Belum ada konten tersedia.</p>';
                    return;
                }

                // Filter hanya file .html
                const articles = files.filter(f => f.name.endsWith('.html')).reverse();

                // 1. Highlight (Artikel Paling Baru)
                const latest = articles[0];
                const latestTitle = latest.name.replace(/-/g, ' ').replace('.html', '');
                highlightContainer.innerHTML = `
                    <a href="artikel/${latest.name}" class="group relative block h-[500px] rounded-[2rem] overflow-hidden bg-zinc-900">
                        <div class="absolute inset-0 hero-gradient z-10"></div>
                        <div class="absolute bottom-0 p-10 z-20 w-full lg:w-2/3">
                            <span class="bg-red-600 text-white px-3 py-1 rounded text-[10px] font-black uppercase tracking-widest mb-4 inline-block">Sorotan Utama</span>
                            <h1 class="text-4xl md:text-6xl font-extrabold text-white leading-tight uppercase group-hover:text-red-500 transition">${latestTitle}</h1>
                        </div>
                    </a>
                `;

                // 2. Main List & Trending & Recommendation
                articles.slice(1).forEach((art, index) => {
                    const title = art.name.replace(/-/g, ' ').replace('.html', '');
                    
                    // Masuk Main List (4 artikel)
                    if(index < 4) {
                        mainContainer.innerHTML += `
                            <article class="group">
                                <a href="artikel/${art.name}">
                                    <div class="aspect-[4/3] bg-zinc-100 rounded-3xl mb-4 overflow-hidden">
                                        <div class="w-full h-full bg-zinc-200 animate-pulse"></div>
                                    </div>
                                    <h3 class="text-xl font-bold uppercase group-hover:text-red-600 transition leading-tight">${title}</h3>
                                </a>
                            </article>
                        `;
                    }

                    // Masuk Trending Sidebar (3 artikel)
                    if(index >= 4 && index < 7) {
                        trendingList.innerHTML += `
                            <a href="artikel/${art.name}" class="block group">
                                <p class="text-sm font-bold uppercase group-hover:text-red-500 transition">${title}</p>
                            </a>
                        `;
                    }

                    // Masuk Rekomendasi Bawah (4 artikel)
                    if(index >= 7 && index < 11) {
                        recommendationList.innerHTML += `
                            <a href="artikel/${art.name}" class="block group bg-gray-50 p-6 rounded-2xl border border-transparent hover:border-red-600 transition">
                                <p class="text-xs font-bold uppercase group-hover:text-red-600 transition">${title}</p>
                            </a>
                        `;
                    }
                });

            } catch (err) {
                mainContainer.innerHTML = '<p class="text-gray-400">Gagal memuat konten.</p>';
            }
        }

        function searchContent() {
            let filter = document.getElementById('searchInput').value.toUpperCase();
            let items = document.querySelectorAll('article, #trending-list a');
            items.forEach(item => {
                let text = item.innerText || item.textContent;
                item.style.display = text.toUpperCase().indexOf(filter) > -1 ? "" : "none";
            });
        }

        window.onload = loadContent;
    </script>
</body>
</html>
