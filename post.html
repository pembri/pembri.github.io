    <script>
        var quill = new Quill('#editor', {
            theme: 'snow',
            placeholder: 'Tulis review, berita, atau link spotify di sini...',
            modules: { 
                toolbar: {
                    container: [['bold', 'italic', 'underline', 'strike'], ['link', 'image', 'video'], [{'header': 1}, {'header': 2}], [{'list': 'ordered'}, {'list': 'bullet'}], ['clean']]
                }
            }
        });

        quill.getModule('toolbar').addHandler('image', () => {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.setAttribute('accept', 'image/*');
            input.click();
            input.onchange = async () => {
                const file = input.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const img = new Image();
                        img.src = e.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const ctx = canvas.getContext('2d');
                            const scale = 1200 / img.width;
                            canvas.width = 1200;
                            canvas.height = img.height * scale;
                            ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                            const base64 = canvas.toDataURL('image/jpeg', 0.7);
                            const range = quill.getSelection();
                            quill.insertEmbed(range.index, 'image', base64);
                        };
                    };
                    reader.readAsDataURL(file);
                }
            };
        });

        let isEditMode = false;
        let currentSha = null;
        let currentPath = null;

        function getIndoDate() {
            const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
            const d = new Date();
            return `${d.getDate()} ${months[d.getMonth()]} ${d.getFullYear()}`;
        }

        async function handlePublish() {
            const token = document.getElementById('ghToken').value;
            const title = document.getElementById('postTitle').value;
            const content = quill.root.innerHTML;
            const btn = document.getElementById('pubBtn');
            const postDate = getIndoDate();

            if(!token || !title) return alert("Data belum lengkap bos!");

            btn.innerText = "MENGHUBUNGKAN KE REPO...";
            btn.disabled = true;

            const slug = title.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
            const filePath = isEditMode ? currentPath : `artikel/${slug}.html`;

            const fullTemplate = `<!DOCTYPE html>

    <script>
        let allArticles = [];
        function copyLink() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                alert("Link berhasil disalin!");
            });
        }

        async function getThumb(path) {
            try {
                const res = await fetch(\`../artikel/\${path}\`);
                const text = await res.text();
                const imgRegex = /<img[^>]+src="([^">]+)"/;
                const match = text.match(imgRegex);
                return match ? match[1] : 'https://images.unsplash.com/photo-1514525253344-8846bbd97d6c?q=80&w=500';
            } catch(e) { return 'https://images.unsplash.com/photo-1514525253344-8846bbd97d6c?q=80&w=500'; }
        }

        async function handleSearch() {
            const input = document.getElementById('innerSearch');
            const suggestions = document.getElementById('searchSuggestions');
            const list = document.getElementById('suggestionsList');
            const query = input.value.toLowerCase();
            if (query.length < 1) { suggestions.classList.remove('active'); return; }
            
            const filtered = allArticles.filter(art => {
                const titleText = art.name.replace(/-/g, ' ').toLowerCase();
                return titleText.includes(query);
            }).slice(0, 8);

            if (filtered.length > 0) {
                list.innerHTML = filtered.map(art => {
                    const title = art.name.replace(/-/g, ' ').replace('.html', '');
                    return \`<a href="\${art.name}" class="block px-5 py-4 hover:bg-zinc-50 border-b border-zinc-50 transition flex items-center gap-3">
                        <div class="w-1.5 h-1.5 bg-red-600 rounded-full"></div>
                        <span class="text-[11px] font-black text-zinc-800 uppercase truncate tracking-tight">\${title}</span>
                    </a>\`;
                }).join('');
                suggestions.classList.add('active');
            } else {
                list.innerHTML = \`<div class="px-5 py-4 text-[10px] text-zinc-400 font-bold uppercase tracking-widest">Tidak ditemukan</div>\`;
                suggestions.classList.add('active');
            }
        }

        function closeSearch() { document.getElementById('searchSuggestions').classList.remove('active'); }

        async function initPage() {
            try {
                const res = await fetch('https://api.github.com/repos/pembri/pembri.github.io/contents/artikel');
                allArticles = await res.json();
                const container = document.getElementById('rec-container');
                const currentFile = window.location.pathname.split('/').pop();
                const filtered = allArticles.filter(f => f.name !== currentFile && f.name.endsWith('.html')).reverse().slice(0, 4);
                
                for(let item of filtered) {
                    const thumb = await getThumb(item.name);
                    const t = item.name.replace(/-/g, ' ').replace('.html', '');
                    container.innerHTML += \`
                        <a href="\${item.name}" class="group block">
                            <div class="aspect-square bg-zinc-100 rounded-3xl mb-4 overflow-hidden shadow-sm">
                                <img src="\${thumb}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                            </div>
                            <h4 class="font-bold uppercase text-[11px] leading-tight group-hover:text-red-600 transition tracking-tighter">\${t}</h4>
                        </a>\`;
                }
            } catch (e) { console.log(e); }
        }
        window.onload = initPage;
    <\/script>
</body>
</html>`;

            const payload = {
                message: isEditMode ? `Update: ${title}` : `Publish: ${title}`,
                content: btoa(unescape(encodeURIComponent(fullTemplate)))
            };
            if(isEditMode) payload.sha = currentSha;

            try {
                const response = await fetch(`https://api.github.com/repos/pembri/pembri.github.io/contents/${filePath}`, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if(response.ok) {
                    alert(isEditMode ? "ARTIKEL BERHASIL DIUPDATE!" : "ARTIKEL SUDAH TERBIT!");
                    location.reload();
                } else { alert("Gagal ke Github. Periksa Token."); }
            } catch (e) { alert("Error: " + e.message); }
            btn.innerText = "Terbitkan Sekarang";
            btn.disabled = false;
        }

        async function loadArticleList() {
            const token = document.getElementById('ghToken').value;
            const listDiv = document.getElementById('articleList');
            if(!token) return alert("Masukkan token dulu!");
            listDiv.innerHTML = '<p class="text-zinc-500 text-xs font-bold uppercase tracking-widest animate-pulse">Memuat Artikel...</p>';
            try {
                const res = await fetch('https://api.github.com/repos/pembri/pembri.github.io/contents/artikel', {
                    headers: { 'Authorization': `token ${token}` }
                });
                const files = await res.json();
                const articles = files.filter(f => f.name.endsWith('.html'));
                listDiv.innerHTML = '';
                articles.reverse().forEach(file => {
                    const cleanTitle = file.name.replace(/-/g, ' ').replace('.html', '').toUpperCase();
                    listDiv.innerHTML += `
                        <div class="bg-zinc-900 border border-zinc-800 p-5 rounded-2xl flex justify-between items-center group hover:border-red-600 transition">
                            <div><h3 class="font-bold text-sm tracking-tight">${cleanTitle}</h3><p class="text-[10px] text-zinc-500 uppercase mt-1">${file.name}</p></div>
                            <div class="flex gap-3">
                                <button onclick="editArticle('${file.path}', '${file.sha}')" class="bg-blue-600/20 text-blue-500 text-[10px] font-black px-4 py-2 rounded-lg hover:bg-blue-600 hover:text-white transition uppercase">Edit</button>
                                <button onclick="deleteArticle('${file.path}', '${file.sha}')" class="bg-red-600/20 text-red-500 text-[10px] font-black px-4 py-2 rounded-lg hover:bg-red-600 hover:text-white transition uppercase">Hapus</button>
                            </div>
                        </div>`;
                });
            } catch (e) { listDiv.innerHTML = '<p class="text-red-500">Gagal memuat list.</p>'; }
        }

        async function editArticle(path, sha) {
            const token = document.getElementById('ghToken').value;
            const btn = document.getElementById('pubBtn');
            try {
                const res = await fetch(`https://api.github.com/repos/pembri/pembri.github.io/contents/${path}`, {
                    headers: { 'Authorization': `token ${token}` }
                });
                const data = await res.json();
                const htmlContent = decodeURIComponent(escape(atob(data.content)));
                const parser = new DOMParser();
                const doc = parser.parseFromString(htmlContent, 'text/html');
                const title = doc.querySelector('h1')?.innerText || "";
                const content = doc.querySelector('.prose')?.innerHTML || "";
                document.getElementById('postTitle').value = title;
                quill.root.innerHTML = content;
                isEditMode = true;
                currentSha = sha;
                currentPath = path;
                btn.innerText = "UPDATE ARTIKEL SEKARANG";
                btn.classList.replace('bg-red-600', 'bg-blue-600');
                window.scrollTo({ top: 0, behavior: 'smooth' });
                alert("Mode Edit Aktif!");
            } catch (e) { alert("Gagal mengambil isi artikel."); }
        }

        async function deleteArticle(path, sha) {
            if(!confirm("Hapus artikel ini?")) return;
            const token = document.getElementById('ghToken').value;
            try {
                const res = await fetch(`https://api.github.com/repos/pembri/pembri.github.io/contents/${path}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message: `Delete: ${path}`, sha: sha })
                });
                if(res.ok) { alert("TERHAPUS!"); loadArticleList(); }
            } catch (e) { alert("Error: " + e.message); }
        }
    </script>
