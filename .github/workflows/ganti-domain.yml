name: Ganti Domain Massal Pro Max

on:
  workflow_dispatch:
    inputs:
      domain_lama:
        description: 'Domain lama'
        required: true
      domain_baru:
        description: 'Domain baru'
        required: true

jobs:
  replace:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Ganti Teks (Hanya File Web)
        run: |
          find . -type f \( -name "*.html" -o -name "*.js" -o -name "*.css" -o -name "*.json" -o -name "*.xml" -o -name "*.md" \) -exec sed -i "s|${{ github.event.inputs.domain_lama }}|${{ github.event.inputs.domain_baru }}|g" {} +

      - name: Paksa Setting Custom Domain (CNAME)
        run: |
          if [[ "${{ github.event.inputs.domain_baru }}" == *".github.io" ]]; then
            rm -f CNAME
          else
            echo "${{ github.event.inputs.domain_baru }}" > CNAME
          fi

      - name: Cek Perubahan dan Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto Pro Max: Ganti domain dan CNAME ke ${{ github.event.inputs.domain_baru }}" && git push)
