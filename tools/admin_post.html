<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Musik Anywhere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0a0a0a; color: #f4f4f5; }
        .glass { background: rgba(18, 18, 18, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.05); }
        .ql-toolbar { background: #1a1a1a !important; border-color: #333 !important; border-radius: 12px 12px 0 0; }
        .ql-container { border-color: #333 !important; border-radius: 0 0 12px 12px; min-height: 400px; background: #111; color: #eee; font-size: 16px; }
        .ql-snow .ql-stroke { stroke: #ccc !important; }
        .ql-snow .ql-fill { fill: #ccc !important; }
        .ql-snow .ql-picker { color: #ccc !important; }
    </style>
</head>
<body class="p-4 md:p-10">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-black uppercase mb-8 italic tracking-tighter">MUSIK<span class="text-red-600">ANYWHERE</span> <span class="text-zinc-600 text-sm">ADMIN</span></h1>
        
        <div class="glass p-6 rounded-[2rem] space-y-6">
            <input type="password" id="githubToken" placeholder="GitHub Token (ghp_xxxx)" class="w-full bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:border-red-600 outline-none transition">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <select id="category" class="bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm outline-none">
                    <option value="Artikel">Artikel</option>
                    <option value="News">News</option>
                    <option value="Lirik Lagu">Lirik Lagu</option>
                </select>
                <input type="text" id="postTitle" placeholder="Judul Artikel..." class="bg-zinc-900 border border-zinc-800 rounded-xl px-4 py-3 text-sm focus:border-red-600 outline-none">
            </div>

            <div id="editor"></div>

            <button onclick="publishArticle()" id="btnPublish" class="w-full bg-red-600 hover:bg-red-700 text-white font-black py-4 rounded-2xl shadow-lg transition-all uppercase tracking-widest">
                PUBLIKASIKAN ARTIKEL
            </button>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
    <script>
        var quill = new Quill('#editor', {
            theme: 'snow',
            modules: {
                toolbar: {
                    container: [[{ 'header': [1, 2, 3, false] }],['bold', 'italic', 'underline'],['link', 'image', 'video'],['clean']],
                    handlers: { image: imageHandler }
                }
            }
        });

        async function imageHandler() {
            const input = document.createElement('input');
            input.setAttribute('type', 'file');
            input.click();
            input.onchange = async () => {
                const file = input.files[0];
                const token = document.getElementById('githubToken').value;
                const fileName = Date.now() + '-' + file.name.replace(/\s/g, '-');
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = async () => {
                    const base64 = reader.result.split(',')[1];
                    const res = await fetch(`https://api.github.com/repos/pembri/musikanywhere.online/contents/asset_gambar/${fileName}`, {
                        method: 'PUT',
                        headers: { 'Authorization': `token ${token}` },
                        body: JSON.stringify({ message: 'Upload Image', content: base64 })
                    });
                    if(res.ok) quill.insertEmbed(quill.getSelection().index, 'image', `/asset_gambar/${fileName}`);
                };
            };
        }

        async function publishArticle() {
            const token = document.getElementById('githubToken').value;
            const title = document.getElementById('postTitle').value;
            const category = document.getElementById('category').value;
            const content = quill.root.innerHTML;
            const ts = Date.now();
            const fileSlug = title.toLowerCase().replace(/[^a-z0-9]/g, '-');
            const fileName = `${ts}-${fileSlug}.html`;
            const cleanUrl = `https://musikanywhere.online/artikel/${ts}-${fileSlug}`;

            if(!token || !title) return alert('Lengkapi data Cok!');

            const fullTemplate = `<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title} - Musik Anywhere</title>
    <meta name="publish-date" content="${ts}">
    <meta name="category" content="${category}">
    
    <script type="application/ld+json">{"@context": "https://schema.org", "@type": "NewsMediaOrganization", "name": "Musik Anywhere", "url": "https://musikanywhere.online", "logo": "https://musikanywhere.online/android-icon-192x192.png", "description": "Media informasi tentang musik untuk audiens Indonesia."}<\/script>
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#111111"/>
    <meta property="og:site_name" content="Musik Anywhere">
    <meta property="og:title" content="${title}">
    <meta property="og:url" content="${cleanUrl}">
    
    <script src="https://cdn.tailwindcss.com"><\/script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0a0a0a; color: #f4f4f5; display: flex; flex-direction: column; min-height: 100vh;}
        .content-area img { border-radius: 1.5rem; border: 1px solid #27272a; margin: 2rem 0; width: 100%; }
        .content-area iframe { width: 100%; aspect-ratio: 16/9; border-radius: 1.5rem; margin: 2rem 0; border: 1px solid #27272a; }
        .nav-glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.05); }
        #searchSuggestions.active { display: block; } #searchSuggestions { display: none; }
    </style>
</head>
<body onclick="closeSearch()">
    <header class="nav-glass sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
            <a href="/" class="text-xl md:text-2xl font-black tracking-tighter uppercase flex items-center gap-3 text-white">
                <img src="/favicon-192x192.png" alt="Logo" class="w-8 h-8 md:w-9 md:h-9 rounded-full border border-zinc-800">
                <span>MUSIK<span class="text-red-600">ANYWHERE</span></span>
            </a>
            <div class="relative group hidden lg:block" onclick="event.stopPropagation()">
                <div class="flex items-center bg-zinc-900 rounded-full px-4 py-2 border border-zinc-800 focus-within:border-red-500">
                    <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Cari..." class="bg-transparent border-none outline-none text-xs w-40 ml-2 text-white">
                </div>
                <div id="searchSuggestions" class="absolute top-full right-0 mt-3 w-80 bg-zinc-900 rounded-2xl shadow-2xl border border-zinc-800 overflow-hidden z-[110]"><div id="suggestionsList"></div></div>
            </div>
        </div>
    </header>

    <main class="max-w-3xl mx-auto px-6 py-16 flex-1">
        <div class="mb-6 font-black uppercase text-[10px] tracking-widest text-red-600">${category}</div>
        <h1 class="text-4xl md:text-6xl font-black uppercase tracking-tighter leading-[0.95] mb-10 text-white">${title}</h1>
        <div class="content-area text-zinc-400 text-lg leading-relaxed">${content}</div>

        <div class="mt-20 p-10 bg-zinc-950 rounded-[2.5rem] border border-zinc-900">
            <p class="text-center text-[10px] font-black uppercase tracking-[0.3em] text-zinc-600 mb-8">Share This Story</p>
            <div class="grid grid-cols-3 md:grid-cols-5 gap-4">
                <a href="https://wa.me/?text=${encodeURIComponent(title + ' ' + cleanUrl)}" target="_blank" class="flex flex-col items-center gap-2 hover:text-red-600 transition"><span class="text-[10px] font-bold">WHATSAPP</span></a>
                <a href="https://www.facebook.com/sharer/sharer.php?u=${cleanUrl}" target="_blank" class="flex flex-col items-center gap-2 hover:text-red-600 transition"><span class="text-[10px] font-bold">FACEBOOK</span></a>
                <a href="https://twitter.com/intent/tweet?url=${cleanUrl}" target="_blank" class="flex flex-col items-center gap-2 hover:text-red-600 transition"><span class="text-[10px] font-bold">X / TWITTER</span></a>
                <a href="https://www.instagram.com/" target="_blank" class="flex flex-col items-center gap-2 hover:text-red-600 transition"><span class="text-[10px] font-bold">INSTAGRAM</span></a>
                <button onclick="copyLink('${cleanUrl}')" class="flex flex-col items-center gap-2 hover:text-red-600 transition"><span class="text-[10px] font-bold">SALIN LINK</span></button>
            </div>
        </div>

        <div class="mt-20">
            <h3 class="text-xl font-black uppercase tracking-tighter mb-8">BACA JUGA</h3>
            <div id="recommendations" class="grid grid-cols-1 md:grid-cols-2 gap-6"></div>
        </div>
    </main>

    <footer class="bg-[#050505] text-white mt-20 pt-20 pb-10 border-t border-zinc-900 w-full">
        <div class="max-w-7xl mx-auto px-8">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-12 border-b border-zinc-900 pb-12 mb-8 text-left">
                <div><h2 class="text-2xl font-black uppercase mb-4 tracking-tighter text-white">MUSIK<span class="text-red-600">ANYWHERE</span></h2><p class="text-zinc-500 text-sm">Media informasi musik Indonesia.</p></div>
                <div><h4 class="text-[10px] font-black uppercase text-zinc-600 mb-6">Kategori</h4><ul class="space-y-3 text-sm font-bold text-zinc-400"><li><a href="/index?kategori=Artikel">Artikel</a></li><li><a href="/index?kategori=News">News</a></li><li><a href="/index?kategori=Lirik Lagu">Lirik Lagu</a></li></ul></div>
                <div><h4 class="text-[10px] font-black uppercase text-zinc-600 mb-6">Bantuan</h4><ul class="space-y-3 text-sm font-bold text-zinc-400"><li><a href="/about">About</a></li><li><a href="/contact">Contact</a></li><li><a href="/privacy">Privacy Policy</a></li></ul></div>
            </div>
            <p class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest text-center py-4 uppercase"> © 2026 Musik Anywhere Media. </p>
        </div>
    </footer>

    <script>
        function copyLink(url) { navigator.clipboard.writeText(url); alert('Link Berhasil Disalin!'); }
        let allArts = [];
        async function loadArts() {
            const res = await fetch('https://api.github.com/repos/pembri/musikanywhere.online/contents/artikel');
            allArts = await res.json();
            const filtered = allArts.filter(a => a.name.endsWith('.html')).sort(() => 0.5 - Math.random()).slice(0, 4);
            document.getElementById('recommendations').innerHTML = filtered.map(a => \`<a href="/artikel/\${a.name.replace('.html','')}" class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800 hover:border-red-600 transition block font-black uppercase text-sm">\${a.name.replace(/^[0-9]+-/, '').replace(/-/g, ' ').replace('.html', '')}</a>\`).join('');
        }
        function handleSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const list = document.getElementById('suggestionsList');
            if(q.length < 2) { document.getElementById('searchSuggestions').classList.remove('active'); return; }
            const f = allArts.filter(a => a.name.toLowerCase().includes(q)).slice(0, 5);
            list.innerHTML = f.map(a => \`<a href="/artikel/\${a.name.replace('.html','')}" class="block px-5 py-3 hover:bg-zinc-800 text-[10px] font-bold text-zinc-400 border-b border-zinc-800 uppercase">\${a.name.replace(/-/g, ' ')}</a>\`).join('');
            document.getElementById('searchSuggestions').classList.add('active');
        }
        function closeSearch() { document.getElementById('searchSuggestions').classList.remove('active'); }
        window.onload = loadArts;
    <\/script>
</body>
</html>`;

            document.getElementById('btnPublish').innerText = 'UPLOADING...';
            const encoded = btoa(unescape(encodeURIComponent(fullTemplate)));
            const res = await fetch(`https://api.github.com/repos/pembri/musikanywhere.online/contents/artikel/${fileName}`, {
                method: 'PUT',
                headers: { 'Authorization': `token ${token}` },
                body: JSON.stringify({ message: `Publish: ${title}`, content: encoded })
            });

            if(res.ok) { alert('SUKSES! Artikel Terbit.'); location.reload(); }
            else { alert('Gagal Cok!'); }
        }
    </script>
</body>
</html>
