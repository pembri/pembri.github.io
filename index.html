<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="msapplication-TileImage" content="/ms-icon-144x144.png" />
    <meta name="theme-color" content="#ffffff"/>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Nada - Media Informasi Seputar Musik</title>
    
    <meta name="description" content="Portal Nada menyajikan berita musik terbaru, review album, dan jadwal konser secara mendalam dan terpercaya.">
    <meta name="keywords" content="musik, berita musik, konser, review album, portal nada">
    <meta property="og:site_name" content="Portal Nada">
    <meta property="og:title" content="Portal Nada - Media Musik Terkini">
    <meta property="og:description" content="Update dunia musik global dan lokal setiap hari.">
    <meta property="og:url" content="https://pembri.github.io">
    <meta property="og:type" content="website">

    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Portal Nada",
      "url": "https://pembri.github.io"
    }
    </script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "NewsMediaOrganization",
      "name": "Portal Nada",
      "url": "https://pembri.github.io",
      "logo": "https://pembri.github.io/android-icon-192x192.png",
      "description": "Media berita musik independen paling akurat dan terpercaya untuk audiens Indonesia."
    }
    </script>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #fcfcfc; }
        .hero-overlay { background: linear-gradient(0deg, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0) 100%); }
        .nav-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        
        .slider-container { position: relative; overflow: hidden; border-radius: 2rem; height: 400px; background: #18181b; }
        .slide { position: absolute; inset: 0; opacity: 0; transition: opacity 0.8s ease-in-out; display: none; }
        .slide.active { opacity: 1; display: block; position: relative; }
        .pagination-btn { transition: all 0.3s; }
        .pagination-btn.active { background-color: #ef4444; color: white; border-color: #ef4444; }

        #searchSuggestions { display: none; }
        #searchSuggestions.active { display: block; }
        .suggestion-item:last-child { border-bottom: none; }
    </style>
</head>
<body class="text-zinc-900" onclick="closeSearch()">

    <header class="nav-glass sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
            <a href="/" class="text-2xl font-black tracking-tighter uppercase flex items-center">
                PORTAL<span class="text-red-600">NADA</span>
            </a>
            <div class="flex-1 max-w-sm ml-4 md:ml-10 relative group" onclick="event.stopPropagation()">
                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Cari musik..." autocomplete="off" class="w-full bg-zinc-100 border-none rounded-xl py-2.5 px-5 text-sm focus:ring-2 focus:ring-red-600 transition-all outline-none">
                
                <div id="searchSuggestions" class="absolute top-full left-0 right-0 mt-2 bg-white rounded-xl shadow-2xl border border-zinc-100 overflow-hidden z-[110]">
                    <div id="suggestionsList" class="max-height-[300px] overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-4 md:px-8 py-8">
        <section id="hero-section" class="mb-16">
            <div id="hero-loader" class="h-[500px] bg-zinc-200 animate-pulse rounded-[2.5rem]"></div>
            <div id="hero-content" class="hidden"></div>
        </section>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <div class="lg:col-span-8">
                <h2 class="text-2xl font-black uppercase tracking-tight flex items-center gap-3 mb-10">
                    <span class="w-1.5 h-7 bg-red-600"></span>
                    Artikel Terbaru
                </h2>
                <div id="post-grid" class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-12"></div>
                <div id="pagination-container" class="mt-16 flex justify-center items-center gap-2"></div>
                <div id="empty-state" class="hidden py-20 text-center text-zinc-400 italic">Belum ada konten publikasi.</div>
            </div>

            <aside class="lg:col-span-4">
                <div class="sticky top-28">
                    <h3 class="text-[10px] font-black uppercase tracking-[0.3em] text-red-600 mb-6 flex items-center gap-2">
                        <span class="w-2 h-2 bg-red-600 rounded-full animate-ping"></span>
                        Terpopuler
                    </h3>
                    <div id="trending-slider" class="slider-container shadow-2xl">
                        <div id="slider-inner" class="h-full"></div>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <footer class="bg-zinc-950 text-white mt-32 pt-20 pb-10">
        <div class="max-w-7xl mx-auto px-8">
            <div class="flex flex-col items-center text-center border-b border-zinc-800 pb-12 mb-8">
                <div>
                    <h2 class="text-2xl font-black uppercase mb-4 tracking-tighter">Portal<span class="text-red-600">Nada</span></h2>
                    <p class="text-zinc-500 text-sm max-w-sm leading-relaxed mx-auto"> Media berita musik independen paling akurat dan terpercaya untuk audiens Indonesia. </p>
                </div>
                <div class="flex gap-8 text-[11px] font-black uppercase tracking-[0.2em] mt-8">
                    <a href="/about.html" class="hover:text-red-600 transition">About</a>
                    <a href="/contact.html" class="hover:text-red-600 transition">Contact</a>
                    <a href="/privacy.html" class="hover:text-red-600 transition">Privacy</a>
                </div>
            </div>
            <div class="flex justify-center items-center">
                <p class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest text-center"> © 2026 Portal Nada Media </p>
            </div>
        </div>
    </footer>

    <script>
        let allArticles = [];
        let currentPage = 1;
        const postsPerPage = 5;

        // Fungsi Helper untuk membersihkan ekstensi .html di URL link
        function getCleanUrl(name) {
            return `artikel/${name.replace('.html', '')}`;
        }

        async function fetchImage(fileName) {
            const fallback = 'https://images.unsplash.com/photo-1470225620780-dba8ba36b745?q=80&w=800';
            try {
                // Tetap fetch ke file .html aslinya untuk ambil gambar
                const response = await fetch(`artikel/${fileName}`);
                if (!response.ok) return fallback;
                const text = await response.text();
                const imgRegex = /<img[^>]+src="([^">]+)"/;
                const match = text.match(imgRegex);
                if (match && match[1]) {
                    let src = match[1];
                    if (src.startsWith('data:image')) return src;
                    if (!src.startsWith('http') && !src.startsWith('/')) return `artikel/${src}`;
                    return src;
                }
                return fallback;
            } catch (error) { return fallback; }
        }

        async function initPortal() {
            try {
                const res = await fetch('https://api.github.com/repos/pembri/pembri.github.io/contents/artikel');
                const data = await res.json();
                if(!data || data.length === 0 || data.message === "Not Found") {
                    document.getElementById('hero-loader').style.display = 'none';
                    document.getElementById('empty-state').classList.remove('hidden');
                    return;
                }
                // Filter file .html saja
                allArticles = data.filter(f => f.name.endsWith('.html')).reverse();
                
                if(allArticles.length > 0) {
                    renderHero(allArticles[0]);
                    renderTrendingSlider(allArticles.slice(0, 5));
                    updatePage();
                }
                document.getElementById('hero-loader').style.display = 'none';
                document.getElementById('hero-content').classList.remove('hidden');
            } catch (err) { console.error("Gagal load API Github", err); }
        }

        function handleSearch() {
            const input = document.getElementById('searchInput');
            const suggestions = document.getElementById('searchSuggestions');
            const list = document.getElementById('suggestionsList');
            const query = input.value.toLowerCase();

            if (query.length < 1) {
                suggestions.classList.remove('active');
                return;
            }

            const filtered = allArticles.filter(art => 
                art.name.replace(/-/g, ' ').toLowerCase().includes(query)
            ).slice(0, 6);

            if (filtered.length > 0) {
                list.innerHTML = filtered.map(art => {
                    const title = art.name.replace(/-/g, ' ').replace('.html', '');
                    const cleanUrl = getCleanUrl(art.name);
                    return `
                        <a href="${cleanUrl}" class="suggestion-item block px-5 py-3 hover:bg-zinc-50 border-b border-zinc-100 transition flex items-center gap-3">
                            <div class="w-2 h-2 bg-red-600 rounded-full"></div>
                            <span class="text-sm font-bold text-zinc-800 uppercase truncate">${title}</span>
                        </a>
                    `;
                }).join('');
                suggestions.classList.add('active');
            } else {
                list.innerHTML = `<div class="px-5 py-4 text-xs text-zinc-400 italic">Musik tidak ditemukan...</div>`;
                suggestions.classList.add('active');
            }
        }

        function closeSearch() {
            document.getElementById('searchSuggestions').classList.remove('active');
        }

        async function renderHero(art) {
            const img = await fetchImage(art.name);
            const title = art.name.replace(/-/g, ' ').replace('.html', '');
            const cleanUrl = getCleanUrl(art.name);
            document.getElementById('hero-content').innerHTML = `
                <a href="${cleanUrl}" class="group relative block h-[500px] rounded-[2.5rem] overflow-hidden bg-zinc-900">
                    <img src="${img}" class="absolute inset-0 w-full h-full object-cover opacity-60 group-hover:scale-105 transition duration-1000">
                    <div class="absolute inset-0 hero-overlay"></div>
                    <div class="absolute bottom-0 p-8 md:p-12 w-full">
                        <span class="bg-red-600 text-white px-3 py-1 rounded text-[9px] font-black uppercase tracking-widest mb-4 inline-block shadow-xl">Sorotan Utama</span>
                        <h1 class="text-3xl md:text-5xl font-black text-white leading-[1.1] uppercase group-hover:text-red-500 transition">${title}</h1>
                    </div>
                </a>
            `;
        }

        async function updatePage() {
            const grid = document.getElementById('post-grid');
            grid.innerHTML = '<div class="col-span-full text-center py-20 text-zinc-400 font-bold uppercase tracking-widest animate-pulse">Menyelaraskan Nada...</div>';
            const start = (currentPage - 1) * postsPerPage;
            const end = start + postsPerPage;
            const paginatedItems = allArticles.slice(start, end);
            let html = '';
            for(let item of paginatedItems) {
                const img = await fetchImage(item.name);
                const title = item.name.replace(/-/g, ' ').replace('.html', '');
                const cleanUrl = getCleanUrl(item.name);
                html += `
                    <article class="group">
                        <a href="${cleanUrl}">
                            <div class="aspect-[16/10] bg-zinc-200 rounded-[2rem] mb-6 overflow-hidden">
                                <img src="${img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                            </div>
                            <h3 class="text-lg font-black uppercase leading-tight group-hover:text-red-600 transition">${title}</h3>
                            <div class="w-10 h-1 bg-red-600 mt-4 group-hover:w-20 transition-all"></div>
                        </a>
                    </article>
                `;
            }
            grid.innerHTML = html;
            renderPagination();
        }

        function renderPagination() {
            const container = document.getElementById('pagination-container');
            const totalPages = Math.ceil(allArticles.length / postsPerPage);
            container.innerHTML = '';
            if (totalPages <= 1) return;
            const prev = document.createElement('button');
            prev.innerText = 'PREV';
            prev.className = `px-4 py-2 text-[10px] font-black border border-zinc-200 rounded-lg hover:bg-zinc-100 ${currentPage === 1 ? 'opacity-30 cursor-not-allowed' : ''}`;
            prev.onclick = () => { if(currentPage > 1) { currentPage--; updatePage(); window.scrollTo({top: 400, behavior: 'smooth'}); } };
            container.appendChild(prev);
            for(let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.innerText = i;
                btn.className = `pagination-btn w-10 h-10 text-[10px] font-black border border-zinc-200 rounded-lg ${i === currentPage ? 'active' : 'hover:bg-zinc-100'}`;
                btn.onclick = () => { currentPage = i; updatePage(); window.scrollTo({top: 400, behavior: 'smooth'}); };
                container.appendChild(btn);
            }
            const next = document.createElement('button');
            next.innerText = 'NEXT';
            next.className = `px-4 py-2 text-[10px] font-black border border-zinc-200 rounded-lg hover:bg-zinc-100 ${currentPage === totalPages ? 'opacity-30 cursor-not-allowed' : ''}`;
            next.onclick = () => { if(currentPage < totalPages) { currentPage++; updatePage(); window.scrollTo({top: 400, behavior: 'smooth'}); } };
            container.appendChild(next);
        }

        async function renderTrendingSlider(items) {
            const sliderInner = document.getElementById('slider-inner');
            sliderInner.innerHTML = '';
            for(let [index, item] of items.entries()) {
                const img = await fetchImage(item.name);
                const title = item.name.replace(/-/g, ' ').replace('.html', '');
                const cleanUrl = getCleanUrl(item.name);
                const slide = document.createElement('div');
                slide.className = `slide h-full ${index === 0 ? 'active' : ''}`;
                slide.innerHTML = `
                    <a href="${cleanUrl}" class="relative block h-full">
                        <img src="${img}" class="absolute inset-0 w-full h-full object-cover">
                        <div class="absolute inset-0 bg-gradient-to-t from-black via-black/40 to-transparent"></div>
                        <div class="absolute bottom-0 p-8">
                            <span class="text-red-500 font-black text-4xl mb-2 block">#${index + 1}</span>
                            <h4 class="text-white font-black uppercase text-xl leading-tight">${title}</h4>
                        </div>
                    </a>
                `;
                sliderInner.appendChild(slide);
            }
            startSlider();
        }

        function startSlider() {
            let currentSlide = 0;
            const slides = document.querySelectorAll('.slide');
            if(slides.length <= 1) return;
            setInterval(() => {
                slides[currentSlide].classList.remove('active');
                currentSlide = (currentSlide + 1) % slides.length;
                slides[currentSlide].classList.add('active');
            }, 5000);
        }

        window.onload = initPortal;
    </script>
</body>
</html>
