<!DOCTYPE html>
<html lang="id">
<head>
    <script>
      var password = "Anjing526"; 
      var input;
      while (input !== password) {
        input = prompt("Admin Area: Masukkan kata sandi:");
        if (input === null) { window.location.href = "https://pembri.github.io"; break; }
        if (input !== password) { alert("Sandi Salah! Akses ditolak."); }
      }
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Musik Anywhere - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;900&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: #050505; color: white; }
        .ql-container.ql-snow { border: 1px solid #27272a !important; border-radius: 0 0 1rem 1rem; }
        .ql-toolbar.ql-snow { background: #18181b; border-radius: 1rem 1rem 0 0; border: 1px solid #27272a; border-bottom: none; }
        .ql-toolbar button, .ql-toolbar .ql-picker { filter: invert(1); }
        .ql-editor { background: #0a0a0a; color: #e4e4e7; min-height: 500px; font-size: 1.1rem; border-radius: 0 0 1rem 1rem; }
        .ql-editor img { border-radius: 1rem; margin: 1rem 0; }
        .ql-editor a { color: #ef4444 !important; text-decoration: underline; }
    </style>
</head>
<body class="py-10 md:py-20">

    <div class="max-w-6xl mx-auto px-6">
        <header class="mb-12 flex flex-col md:flex-row md:justify-between md:items-end gap-6 border-b border-zinc-800 pb-8">
            <div><h1 class="text-4xl md:text-5xl font-black uppercase tracking-tighter text-white">ADMIN<span class="text-red-600">PANEL</span></h1></div>
            <a href="/" class="bg-zinc-900 px-6 py-3 rounded-full text-xs font-bold uppercase tracking-widest hover:bg-zinc-800 transition border border-zinc-800 w-max">Ke Beranda</a>
        </header>

        <div class="space-y-8 bg-[#0a0a0a] p-6 md:p-10 rounded-[2rem] border border-zinc-800 shadow-2xl">
            <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Token Github</label>
                    <input type="password" id="ghToken" placeholder="ghp_xxxx" class="w-full bg-[#111] border border-zinc-800 p-4 rounded-xl outline-none text-sm focus:border-red-600 text-white font-mono">
                </div>
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Pilih Kategori</label>
                    <select id="postCategory" class="w-full bg-[#111] border border-zinc-800 p-4 rounded-xl outline-none text-white font-bold focus:border-red-600">
                        <option value="Artikel">Artikel</option>
                        <option value="News">News</option>
                        <option value="Lirik Lagu">Lirik Lagu</option>
                    </select>
                </div>
                <div class="space-y-3">
                    <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Judul Artikel</label>
                    <input type="text" id="postTitle" placeholder="Ketik Judul..." class="w-full bg-[#111] border border-zinc-800 p-4 rounded-xl outline-none font-bold text-white focus:border-red-600">
                </div>
            </div>

            <div class="space-y-3">
                <label class="text-[10px] font-black uppercase tracking-widest text-zinc-500">Isi Konten (Wikipedia Mode: Link, Image, Video, Font Size Aktif)</label>
                <div id="editor"></div>
            </div>

            <button onclick="handlePublish()" id="pubBtn" class="w-full bg-red-600 text-white py-5 rounded-xl font-black text-xl uppercase tracking-widest hover:bg-red-700 transition-all shadow-[0_0_40px_rgba(220,38,38,0.3)]">Publikasikan Artikel</button>
        </div>

        <div class="mt-20 pt-10 border-t border-zinc-800">
            <div class="flex flex-col md:flex-row justify-between md:items-center gap-4 mb-8">
                <h2 class="text-2xl font-black uppercase tracking-tighter text-white">Database <span class="text-red-600">Artikel</span></h2>
                <button onclick="loadArticleList()" class="text-[10px] font-bold uppercase tracking-widest bg-zinc-800 px-6 py-3 rounded-xl hover:bg-zinc-700 transition">Tarik Data Server</button>
            </div>
            <div id="articleList" class="grid grid-cols-1 gap-4"></div>
        </div>
    </div>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // Wikipedia Mode: Toolbar Super Lengkap
        var quill = new Quill('#editor', { 
            theme: 'snow', 
            modules: { 
                toolbar: [
                    [{ 'header': [1, 2, 3, false] }],
                    [{ 'size': ['small', false, 'large', 'huge'] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    ['link', 'image', 'video'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    [{ 'align': [] }],
                    ['clean']
                ] 
            } 
        });

        function getIndoDate() { 
            const d = new Date(); 
            return d.getDate() + ' ' + ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"][d.getMonth()] + ' ' + d.getFullYear(); 
        }

        let isEditMode = false, currentSha = null, currentPath = null, originalTimestamp = null;

        async function handlePublish() {
            const token = document.getElementById('ghToken').value;
            const category = document.getElementById('postCategory').value;
            const title = document.getElementById('postTitle').value;
            const content = quill.root.innerHTML;
            const btn = document.getElementById('pubBtn');

            if(!token || !title) return alert("Token Github dan Judul wajib diisi!");
            btn.innerText = "PROSES UPLOAD..."; btn.disabled = true;

            const slug = title.toLowerCase().replace(/ /g, '-').replace(/[^\w-]+/g, '');
            const filePath = isEditMode ? currentPath : "artikel/" + slug + ".html";
            const publishTime = isEditMode && originalTimestamp ? originalTimestamp : Date.now();

            // FULL SEO, FAVICON (SESUAI SCREENSHOT), & JSON-LD GRAPH
            const fullTemplate = '<!DOCTYPE html>\n<html lang="id">\n<head>\n' +
                '<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width, initial-scale=1.0">\n' +
                '<meta name="category" content="' + category + '">\n<meta name="publish-date" content="' + publishTime + '">\n' +
                '<title>' + title + ' - Musik Anywhere</title>\n' +
                '<script type="application/ld+json">{\n"@context": "https://schema.org",\n"@graph": [\n' +
                '{"@type": "WebSite", "@id": "https://pembri.github.io/#website", "url": "https://pembri.github.io", "name": "Musik Anywhere"},\n' +
                '{"@type": "NewsArticle", "headline": "' + title + '", "image": ["https://pembri.github.io/android-icon-192x192.png"], "datePublished": "' + new Date().toISOString() + '", "author": [{"@type": "Organization", "name": "Musik Anywhere", "url": "https://pembri.github.io"}] }\n' +
                ']}<\/script>\n' +
                '<link rel="shortcut icon" href="/favicon.ico" type="image/x-icon">\n' +
                '<link rel="apple-touch-icon" sizes="57x57" href="/apple-icon-57x57.png">\n' +
                '<link rel="apple-touch-icon" sizes="72x72" href="/apple-icon-72x72.png">\n' +
                '<link rel="apple-touch-icon" sizes="114x114" href="/apple-icon-114x114.png">\n' +
                '<link rel="apple-touch-icon" sizes="144x144" href="/apple-icon-144x144.png">\n' +
                '<link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png">\n' +
                '<link rel="icon" type="image/png" sizes="192x192" href="/android-icon-192x192.png">\n' +
                '<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">\n' +
                '<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">\n' +
                '<link rel="manifest" href="/manifest.json">\n' +
                '<meta name="theme-color" content="#0a0a0a">\n' +
                '<meta name="description" content="Baca artikel lengkap tentang ' + title + ' hanya di Musik Anywhere.">\n' +
                '<meta property="og:site_name" content="Musik Anywhere">\n' +
                '<meta property="og:title" content="' + title + ' - Musik Anywhere">\n' +
                '<meta property="og:type" content="article">\n' +
                '<meta property="og:url" content="https://pembri.github.io/artikel/' + slug + '">\n' +
                '<meta property="og:image" content="https://pembri.github.io/android-icon-192x192.png">\n' +
                '<script src="https://cdn.tailwindcss.com"><\/script>\n' +
                '<style>\n' +
                '@import url("https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800;900&display=swap");\n' +
                'body { font-family: "Plus Jakarta Sans", sans-serif; background-color: #0a0a0a; color: #f4f4f5; display: flex; flex-direction: column; min-height: 100vh;}\n' +
                'main { flex: 1; }\n' +
                '.nav-glass { background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255,255,255,0.05); }\n' +
                '.prose img { border-radius: 1.5rem; margin: 2rem 0; width: 100%; border: 1px solid #27272a; }\n' +
                '.prose a { color: #ef4444; font-weight: 800; border-bottom: 2px solid #7f1d1d; text-decoration: none;}\n' +
                '.prose h1, .prose h2, .prose h3 { color: white; font-weight: 900; text-transform: uppercase; margin-top: 2rem; }\n' +
                '.prose p { color: #d4d4d8; line-height: 1.8; margin-bottom: 0rem; font-size: 1.15rem;}\n' +
                '</style>\n</head>\n<body>\n' +
                '<header class="nav-glass sticky top-0 z-[100] h-20 flex items-center px-8 justify-between">\n' +
                '<a href="/" class="text-2xl font-black text-white uppercase">MUSIK<span class="text-red-600">ANYWHERE</span></a>\n' +
                '</header>\n' +
                '<main class="max-w-6xl mx-auto px-8 py-20">\n' +
                '<article>\n' +
                '<span class="bg-red-600 text-white px-3 py-1 text-[10px] font-bold uppercase">' + category + '</span>\n' +
                '<h1 class="text-5xl font-black uppercase mt-4">' + title + '</h1>\n' +
                '<p class="text-zinc-500 border-b border-zinc-800 pb-4 mb-10">' + getIndoDate() + '</p>\n' +
                '<div class="prose prose-zinc max-w-none w-full">' + content + '</div>\n' +
                '</article>\n' +
                '</main>\n' +
                '<footer class="py-12 border-t border-zinc-900 text-center">\n' +
                '<h2 class="text-2xl font-black uppercase text-white">MUSIK<span class="text-red-600">ANYWHERE</span></h2>\n' +
                '<p class="text-zinc-600 text-[10px] font-bold uppercase tracking-widest mt-4">© 2026 Musik Anywhere Media.</p>\n' +
                '</footer>\n</body>\n</html>';

            try {
                const res = await fetch('https://api.github.com/repos/pembri/pembri.github.io/contents/' + filePath, {
                    method: 'PUT', headers: { 'Authorization': 'token ' + token },
                    body: JSON.stringify({ message: "Upload Artikel", content: btoa(unescape(encodeURIComponent(fullTemplate))), sha: currentSha || undefined })
                });
                if(res.ok) { alert("SUKSES TERBIT!"); location.reload(); }
            } catch (e) { alert("Gagal Upload!"); }
        }

        async function loadArticleList() {
            const token = document.getElementById('ghToken').value;
            const res = await fetch('https://api.github.com/repos/pembri/pembri.github.io/contents/artikel', { headers: { 'Authorization': 'token ' + token } });
            const files = await res.json();
            const list = document.getElementById('articleList'); list.innerHTML = '';
            files.filter(f => f.name.endsWith('.html')).reverse().forEach(file => {
                list.innerHTML += `<div class="bg-zinc-900 p-5 border border-zinc-800 rounded-2xl mb-3 flex justify-between items-center group hover:border-red-600 transition">\n` +
                    `<span class="font-black text-sm uppercase">${file.name.replace(/-/g, ' ').replace('.html', '')}</span>\n` +
                    `<div class="flex gap-2"><button onclick="editArticle('${file.path}', '${file.sha}')" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-[10px] font-bold">EDIT</button></div></div>`;
            });
        }

        async function editArticle(path, sha) {
            const token = document.getElementById('ghToken').value;
            const res = await fetch('https://api.github.com/repos/pembri/pembri.github.io/contents/' + path, { headers: { 'Authorization': 'token ' + token } });
            const data = await res.json();
            const html = decodeURIComponent(escape(atob(data.content)));
            const doc = new DOMParser().parseFromString(html, 'text/html');
            
            // TARIK DATA DENGAN SELEKTOR YANG TEPAT
            document.getElementById('postTitle').value = doc.querySelector('h1')?.innerText || "";
            document.getElementById('postCategory').value = doc.querySelector('meta[name="category"]')?.getAttribute('content') || "Artikel";
            quill.root.innerHTML = doc.querySelector('.prose')?.innerHTML || "";
            
            currentSha = sha; currentPath = path; isEditMode = true;
            document.getElementById('pubBtn').innerText = "UPDATE ARTIKEL";
            document.getElementById('pubBtn').classList.replace('bg-red-600', 'bg-blue-600');
            window.scrollTo({ top: 0, behavior: 'smooth' });
            alert("DATA BERHASIL DITARIK!");
        }
    </script>
</body>
</html>
