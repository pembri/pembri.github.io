
<!DOCTYPE html>
<html lang="id">
<head>
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-icon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="msapplication-TileImage" content="/ms-icon-144x144.png" />
    <meta name="theme-color" content="#ffffff"/>
            
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>${title} - Portal Nada</title>
    
    <meta name="description" content="Baca artikel lengkap tentang ${title} hanya di Portal Nada.">
    <meta property="og:site_name" content="Portal Nada">
    <meta property="og:title" content="${title} - Portal Nada">
    <meta property="og:type" content="article">
    <meta property="og:url" content="https://pembri.github.io/artikel/${slug}.html">
    <link rel="icon" href="https://pembri.github.io/favicon.png" type="image/png">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; color: #1a1a1a; }
        .nav-glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(12px); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .prose img { border-radius: 1.5rem; margin: 2rem 0; width: 100%; height: auto; object-fit: cover; box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
        .prose a { color: #ef4444; text-decoration: underline; font-weight: bold; }
        .prose h2 { font-weight: 800; text-transform: uppercase; margin-top: 2rem; font-size: 1.5rem; }
    </style>
</head>
<body class="antialiased">

    <header class="nav-glass sticky top-0 z-[100]">
        <div class="max-w-7xl mx-auto px-4 md:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="/" class="text-zinc-400 hover:text-black transition">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
                </a>
                <a href="/" class="text-2xl font-black tracking-tighter uppercase">PORTAL<span class="text-red-600">NADA</span></a>
            </div>
            <div class="flex-1 max-w-sm ml-10 hidden md:block">
                <div class="relative">
                    <input type="text" id="innerSearch" placeholder="Cari artikel lain..." class="w-full bg-zinc-100 border-none rounded-xl py-2 px-5 text-sm outline-none focus:ring-2 focus:ring-red-600 transition-all">
                </div>
            </div>
        </div>
    </header>

    <main>
        <article class="max-w-3xl mx-auto px-6 py-16 md:py-24">
            <div class="mb-10">
                <span class="bg-red-600 text-white px-3 py-1 rounded-full text-[10px] font-black uppercase tracking-widest mb-6 inline-block">Trending News</span>
                <h1 class="text-4xl md:text-6xl font-black uppercase leading-tight tracking-tighter mb-6">${title}</h1>
                <div class="flex items-center gap-4 text-zinc-400 text-xs font-bold uppercase tracking-widest border-b pb-8">
                    <span>Portal Nada Media</span>
                    <span>•</span>
                    <span>April 2026</span>
                </div>
            </div>
            
            <div class="prose prose-zinc prose-lg max-w-none leading-relaxed">
                ${content}
            </div>

            <div class="mt-20 p-8 bg-zinc-50 rounded-[2rem] flex flex-col md:flex-row justify-between items-center gap-6">
                <div>
                    <p class="text-xs font-black uppercase tracking-widest text-zinc-400 mb-1">Bagikan Artikel</p>
                    <p class="text-sm font-bold">Terima kasih telah membaca di Portal Nada.</p>
                </div>
                <button onclick="copyAndShare()" class="bg-black text-white px-8 py-4 rounded-2xl font-black uppercase text-xs tracking-[0.2em] hover:bg-red-600 transition-all active:scale-95 shadow-xl">
                    Salin & Bagikan Link
                </button>
            </div>
        </article>

        <section class="bg-white py-24 border-t border-zinc-100">
            <div class="max-w-7xl mx-auto px-6">
                <h2 class="text-2xl font-black uppercase mb-12 tracking-tighter flex items-center gap-3">
                    <span class="w-2 h-8 bg-red-600 rounded-full"></span>
                    Rekomendasi Untuk Kamu
                </h2>
                <div id="rec-container" class="grid grid-cols-2 md:grid-cols-4 gap-8"></div>
            </div>
        </section>
    </main>

    <footer class="bg-zinc-950 text-white py-16">
        <div class="max-w-7xl mx-auto px-8 text-center md:text-left flex flex-col md:flex-row justify-between items-center">
            <div>
                <h2 class="text-xl font-black uppercase tracking-tighter">Portal<span class="text-red-600">Nada</span></h2>
                <p class="text-zinc-500 text-xs mt-2 font-bold uppercase tracking-widest">© 2026 Portal Nada Media</p>
            </div>
            <div class="mt-8 md:mt-0">
                <a href="/" class="text-xs font-bold uppercase tracking-widest text-zinc-400 hover:text-white">Kembali ke Beranda</a>
            </div>
        </div>
    </footer>

    <script>
        function copyAndShare() {
            const url = window.location.href;
            navigator.clipboard.writeText(url).then(() => {
                alert("Link artikel berhasil disalin ke clipboard!");
                if (navigator.share) {
                    navigator.share({ title: '${title}', url: url });
                }
            });
        }

        async function getThumb(path) {
            try {
                const res = await fetch(`../artikel/${path}`);
                const text = await res.text();
                const parser = new DOMParser();
                const doc = parser.parseFromString(text, 'text/html');
                const img = doc.querySelector('img');
                return img ? img.src : 'https://images.unsplash.com/photo-1514525253344-8846bbd97d6c?q=80&w=500';
            } catch(e) { return 'https://images.unsplash.com/photo-1514525253344-8846bbd97d6c?q=80&w=500'; }
        }

        async function loadRecs() {
            const container = document.getElementById('rec-container');
            try {
                const res = await fetch('https://api.github.com/repos/pembri/pembri.github.io/contents/artikel');
                const files = await res.json();
                const filtered = files.filter(f => f.name !== '${slug}.html' && f.name.endsWith('.html')).reverse().slice(0, 4);
                
                for(let item of filtered) {
                    const thumb = await getThumb(item.name);
                    const t = item.name.replace(/-/g, ' ').replace('.html', '');
                    container.innerHTML += `
                        <a href="${item.name}" class="group block">
                            <div class="aspect-square bg-zinc-100 rounded-3xl mb-4 overflow-hidden shadow-sm">
                                <img src="${thumb}" class="w-full h-full object-cover group-hover:scale-110 transition duration-700">
                            </div>
                            <h4 class="font-bold uppercase text-[13px] leading-tight group-hover:text-red-600 transition">${t}</h4>
                        </a>
                    `;
                }
            } catch (e) { console.log(e); }
        }

        document.getElementById('innerSearch')?.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                window.location.href = '/?s=' + e.target.value;
            }
        });

        window.onload = loadRecs;
    </script>
            
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Portal Nada",
        "url": "https://pembri.github.io"
      },
      {
        "@context": "https://schema.org",
        "@type": "NewsArticle",
        "headline": "${title}",
        "publisher": {
          "@type": "Organization",
          "name": "Portal Nada",
          "logo": {
            "@type": "ImageObject",
            "url": "https://pembri.github.io/android-icon-192x192.png"
          }
        },
        "author": {
          "@type": "Organization",
          "name": "Portal Nada"
        }
      }
    ]
    </script>
</body>
</html>
