document.getElementById('postSlug').value =

.trim()
.replace(/\s+/g,'-')
.replace(/[^\w\-]+/g,'');
});

quill.on('text-change', function(){
autoYoutubeEmbed();
});

function autoYoutubeEmbed(){
const html = quill.root.innerHTML;
const regex = /(https?:\/\/(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11}))/g;

if(regex.test(html)){
quill.root.innerHTML = html.replace(regex,function(match,url,id){
return '<p><iframe width="100%" height="420" src="https://www.youtube.com/embed/'+id+'" frameborder="0" allowfullscreen></iframe></p>';
});
}
}

function insertYoutubePrompt(){
const link = prompt("Tempel link YouTube:");
if(link){
quill.clipboard.dangerouslyPasteHTML(quill.getSelection(true).index,link);
autoYoutubeEmbed();
}
}

function saveDraft(){
localStorage.setItem('draft_title',document.getElementById('postTitle').value);
localStorage.setItem('draft_content',quill.root.innerHTML);
alert('Draft disimpan!');
}

window.onload = function(){
const t = localStorage.getItem('draft_title');
const c = localStorage.getItem('draft_content');
if(t) document.getElementById('postTitle').value=t;
if(c) quill.root.innerHTML=c;
};

function openPreview(mode){
const title = document.getElementById('postTitle').value || 'Judul Artikel';
const content = quill.root.innerHTML;

document.getElementById('previewModal').classList.remove('hidden');
document.getElementById('previewModal').classList.add('flex');

document.getElementById('previewArea').innerHTML =
mode==='mobile'
?
'<div class="mx-auto preview-phone p-6"><h1 class="text-3xl font-black mb-6">'+title+'</h1>'+content+'</div>'
:
'<div class="preview-desktop p-10"><h1 class="text-5xl font-black mb-8">'+title+'</h1>'+content+'</div>';
}

function closePreview(){
document.getElementById('previewModal').classList.add('hidden');
document.getElementById('previewModal').classList.remove('flex');
}

function resetForm(){
if(confirm('Kosongkan semua isi?')){
document.getElementById('postTitle').value='';
document.getElementById('postSlug').value='';
quill.root.innerHTML='';
}
}

function getIndoDate(){
const months=["Januari","Februari","Maret","April","Mei","Juni","Juli","Agustus","September","Oktober","November","Desember"];
const d=new Date();
return d.getDate()+' '+months[d.getMonth()]+' '+d.getFullYear();
}

            const filtered = allArticles.filter(art => art.title.toLowerCase().includes(query)).slice(0, 6);
            if (filtered.length > 0) {
                document.getElementById(listId).innerHTML = filtered.map(art => \`<a href=\"/artikel/\${art.name}\" class=\"block px-5 py-4 hover:bg-zinc-800 border-b border-zinc-800 uppercase font-bold text-xs text-white\">\${art.title}</a>\`).join('');
                suggestions.classList.add('active');
            } else { suggestions.classList.remove('active'); }
        }
        function closeSearch() { document.querySelectorAll('[id$=\"Suggestions\"]').forEach(s => s.classList.remove('active')); }
        function copyToClipboard() { navigator.clipboard.writeText(window.location.href); alert("Link berhasil disalin!"); }
        async function initPage() { 
            try { 
                const res = await fetch('https://api.github.com/repos/pembri/musikanywhere.online/contents/artikel'); 
                const files = await res.json(); 
                const htmlFiles = files.filter(f => f.name.endsWith('.html')).reverse();
                const container = document.getElementById('rec-container');
                const currentFile = window.location.pathname.split('/').pop();
                let loaded = [];
                for(let file of htmlFiles) {
                    try {
                        const r = await fetch('/artikel/' + file.name);
                        const t = await r.text();
                        const doc = new DOMParser().parseFromString(t, 'text/html');
                        const title = doc.querySelector('h1')?.innerText || file.name;
                        let thumb = '/android-icon-192x192.png';
                        const firstImg = doc.querySelector('.prose img') || doc.querySelector('img');
                        if(firstImg) thumb = firstImg.getAttribute('src');
                        const artData = { name: file.name.replace('.html',''), title: title, thumb: thumb };
                        loaded.push(artData);
                        if (file.name !== currentFile && container.children.length < 3) {
                            container.innerHTML += \`<a href=\"/artikel/\${artData.name}\" class=\"group flex flex-col bg-zinc-900 rounded-2xl border border-zinc-800 hover:border-zinc-700 transition overflow-hidden\">
                                <div class=\"aspect-[16/10] bg-zinc-950 relative overflow-hidden\"><img src=\"\${thumb}\" class=\"absolute inset-0 w-full h-full object-contain p-2 opacity-80 group-hover:scale-110 group-hover:opacity-100 transition duration-700\"></div>
                                <div class=\"p-4 text-left\"><h4 class=\"text-white font-black uppercase text-sm leading-tight tracking-tight group-hover:text-red-500 transition line-clamp-2\">\${title}</h4></div>
                            </a>\`;
                        }
                    } catch(e){}
                }
                allArticles = loaded;
            } catch(e) {} 
        } 
        window.onload = initPage;
    <\/script>
</body>
</html>`;

/* ===============================
   PUBLISH KE GITHUB
================================= */

const payload = {
    message: isEditMode ? 'Update: ' + title : 'Publish: ' + title,
    content: btoa(unescape(encodeURIComponent(fullTemplate)))
};

if (isEditMode) payload.sha = currentSha;

try {

    const response = await fetch(
        'https://api.github.com/repos/pembri/musikanywhere.onlinel/contents/' + filePath,
        {
            method:'PUT',
            headers:{
                'Authorization':'token ' + token,
                'Content-Type':'application/json'
            },
            body: JSON.stringify(payload)
        }
    );

    if(response.ok){

        alert(isEditMode ? 'Artikel berhasil diupdate!' : 'Artikel berhasil diterbitkan!');

        localStorage.removeItem('draft_title');
        localStorage.removeItem('draft_content');

        location.reload();

    }else{

        const err = await response.json();
        alert('Gagal publish: ' + (err.message || 'Periksa token github'));

    }

}catch(e){

    alert('Error: ' + e.message);

}

btn.innerText = 'Terbitkan Sekarang';
btn.disabled = false;

}

/* ===============================
   LOAD LIST ARTIKEL
================================= */

async function loadArticleList(){

const token = document.getElementById('ghToken').value;
const wrap = document.getElementById('articleList');

if(!token){
alert('Masukkan token github dulu!');
return;
}

wrap.innerHTML = '<p class="text-slate-500 text-sm">Memuat artikel...</p>';

try{

const res = await fetch(
'https://api.github.com/repos/pembri/musikanywhere.onlinel/contents/artikel',
{
headers:{
'Authorization':'token ' + token
}
});

const files = await res.json();

const articles = files.filter(f => f.name.endsWith('.html')).reverse();

if(!articles.length){
wrap.innerHTML = '<p class="text-slate-500 text-sm">Belum ada artikel.</p>';
return;
}

wrap.innerHTML = '';

articles.forEach(file => {

const cleanTitle = file.name
.replace('.html','')
.replace(/-/g,' ')
.toUpperCase();

wrap.innerHTML += `
<div class="article-item">

<div class="flex flex-col gap-4">

<div>
<h4 class="font-black text-sm md:text-base">${cleanTitle}</h4>
<p class="text-xs text-slate-400 mt-1">${file.name}</p>
</div>

<div class="flex gap-3">

<button
onclick="editArticle('${file.path}','${file.sha}')"
class="btn btn-primary px-4 py-3 text-xs w-full">
Edit
</button>

<button
onclick="deleteArticle('${file.path}','${file.sha}')"
class="btn btn-danger px-4 py-3 text-xs w-full">
Hapus
</button>

</div>

</div>

</div>
`;

});

}catch(e){

wrap.innerHTML = '<p class="text-red-500 text-sm">Gagal memuat artikel.</p>';

}

}

/* ===============================
   MODE EDIT ARTIKEL
================================= */

async function editArticle(path,sha){

const token = document.getElementById('ghToken').value;

if(!token){
alert('Masukkan token dulu!');
return;
}

try{

const res = await fetch(
'https://api.github.com/repos/pembri/musikanywhere.onlinel/contents/' + path,
{
headers:{
'Authorization':'token ' + token
}
});

const data = await res.json();

const html = decodeURIComponent(escape(atob(data.content)));

const parser = new DOMParser();
const doc = parser.parseFromString(html,'text/html');

const title = doc.querySelector('h1')?.innerText || '';
const content = doc.querySelector('.prose')?.innerHTML || '';

document.getElementById('postTitle').value = title;

document.getElementById('postSlug').value =
path.split('/').pop().replace('.html','');

quill.root.innerHTML = content;

isEditMode = true;
currentSha = sha;
currentPath = path;

const btn = document.getElementById('pubBtn');
btn.innerText = 'Update Artikel';
btn.classList.remove('btn-primary');
btn.classList.add('btn-dark');

window.scrollTo({
top:0,
behavior:'smooth'
});

alert('Mode edit aktif');

}catch(e){

alert('Gagal mengambil artikel.');

}

}

/* ===============================
   HAPUS ARTIKEL
================================= */

async function deleteArticle(path,sha){

const token = document.getElementById('ghToken').value;

if(!token){
alert('Masukkan token dulu!');
return;
}

if(!confirm('Yakin ingin menghapus artikel ini?')){
return;
}

try{

const res = await fetch(
'https://api.github.com/repos/pembri/musikanywhere.onlinel/contents/' + path,
{
method:'DELETE',
headers:{
'Authorization':'token ' + token,
'Content-Type':'application/json'
},
body: JSON.stringify({
message:'Delete: ' + path,
sha: sha
})
});

if(res.ok){

alert('Artikel berhasil dihapus!');
loadArticleList();

}else{

alert('Gagal menghapus artikel.');

}

}catch(e){

alert('Error: ' + e.message);

}

}

/* ===============================
   UPLOAD GAMBAR KE EDITOR
================================= */

quill.getModule('toolbar').addHandler('image', function(){

const input = document.createElement('input');
input.type = 'file';
input.accept = 'image/*';
input.click();

input.onchange = async function(){

const file = input.files[0];
if(!file) return;

const reader = new FileReader();

reader.onload = function(e){

const range = quill.getSelection(true);

quill.insertEmbed(
range.index,
'image',
e.target.result
);

};

reader.readAsDataURL(file);

};

});

/* ===============================
   DRAG DROP IMAGE
================================= */

quill.root.addEventListener('drop', function(e){

e.preventDefault();

const file = e.dataTransfer.files[0];

if(file && file.type.startsWith('image/')){

const reader = new FileReader();

reader.onload = function(ev){

quill.insertEmbed(
quill.getSelection(true).index,
'image',
ev.target.result
);

};

reader.readAsDataURL(file);

}

});

/* ===============================
   AUTO LOAD LIST
================================= */

setTimeout(function(){

const token = document.getElementById('ghToken').value;

if(token){
loadArticleList();
}

},800);

</script>
</body>
